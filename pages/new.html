<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yangi chiqmalar — CINEPLEX</title>
  <meta name="description" content="CINEPLEX'dagi eng yangi chiqqan filmlar va seriallar ro'yxati — birinchilardan bo'lib tomosha qiling." />
  <link rel="canonical" href="https://www.cineplex.uz/pages/new.html" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/perf-lite.js?v=3"></script>
  <link rel="stylesheet" href="../css/main.css?v=5">
  <style>
    /* ── 3D FILM REEL (immersiv galereya) ── */
    .reel3d-section {
      position: relative;
      /* TO'LIQ EKRAN: navbar (logo) pastidan viewport oxirigacha.
         main'ning 22px tepki paddingi manfiy margin bilan yutiladi. */
      height: calc(100svh - var(--navbar-h));
      min-height: 420px;
      margin: -22px 0 28px;
      background: #0a0a0a;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .reel3d-section canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .reel3d-tooltip {
      position: absolute;
      top: 0; left: 0;
      z-index: 3;
      pointer-events: none;
      background: rgba(16, 16, 20, 0.86);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 13.5px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.16s ease;
      will-change: transform;
    }
    .reel3d-tooltip.on { opacity: 1; }
    .reel3d-hint {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      transition: opacity 0.6s ease;
    }
    .reel3d-fade {
      position: absolute;
      inset: 0;
      z-index: 4;
      background: #000000;
      opacity: 0;
      pointer-events: none;
      /* zoom davomiyligiga mos — sekin qorayadi */
      transition: opacity 0.95s ease;
    }
    .reel3d-fade.on { opacity: 1; }
  </style>
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/aurora-catalog.css">
</head>
<body class="catalog-page">
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <!-- 3D film globe — to'liq ekran immersiv galereya (WebGL bo'lmasa/
         perf-lite'da yashirin qoladi, pastdagi grid fallback bo'ladi) -->
    <section class="reel3d-section" id="reel3d-section" hidden>
      <div class="reel3d-tooltip" id="reel3d-tooltip"></div>
      <div class="reel3d-hint">Sichqoncha bilan suring — kadrga 2 marta bosing · pastda barcha yangi kinolar</div>
      <div class="reel3d-fade" id="reel3d-fade"></div>
    </section>

    <!-- Klassik "Yangi chiqmalar" kontenti — 3D devor ostida doim
         ko'rinadi (pastga scroll qilib kartalarga tushiladi) -->
    <div id="new-classic">
      <div class="catalog-header animate-in">
        <div>
          <h1 class="catalog-title">Yangi chiqmalar</h1>
          <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
        </div>
      </div>

      <!-- Genre filter -->
      <div class="catalog-genre-bar animate-in" id="genre-bar" style="transition-delay:0.1s">
        <button class="genre-pill active" data-genre="all">Barchasi</button>
        <button class="genre-pill" data-genre="action">Jangovar</button>
        <button class="genre-pill" data-genre="drama">Drama</button>
        <button class="genre-pill" data-genre="comedy">Komediya</button>
        <button class="genre-pill" data-genre="scifi">Fantastika</button>
        <button class="genre-pill" data-genre="fantasy">Fantaziya</button>
        <button class="genre-pill" data-genre="historical">Tarixiy</button>
      </div>

      <!-- All new grid -->
      <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.16s"></div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <!-- ?v= — brauzer keshi eski modulni ushlab qolmasligi uchun -->
  <script type="module" src="../js/film-reel.js?v=14"></script>
  <script>
    App.initNavbar('new', '../');
    App.initAnimations();

    function render(list) {
      document.getElementById('catalog-grid').innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta yangi film';
    }

    let newList = [];
    (async () => {
      try {
        /* 100 ta — 3D devor ~95 slotining har biri unikal film bo'lishi uchun */
        const data = await MoviesAPI.newMovies(100);
        newList = data || [];
      } catch {
        newList = [];
      }
      /* Pastdagi grid oxirgi 50 ta yangi bilan ishlaydi */
      const gridList = newList.slice(0, 50);
      render(gridList);
      App.initGenrePills('genre-bar', genre => {
        const filtered = genre === 'all' ? gridList : gridList.filter(m => (m.genre || []).includes(genre));
        render(filtered);
      });

      /* ── 3D film reel — muvaffaqiyatli ishga tushsa featured band
         yashiriladi (u fallback), aks holda hammasi eskicha qoladi ── */
      const startReel = () => {
        const sec = document.getElementById('reel3d-section');
        /* Devorda FAQAT kinolar — seriallar grid/hero'da qoladi */
        const reelList = newList.filter(m => m.type !== 'series');
        if (!sec || !reelList.length) return;
        try {
          sec.hidden = false; /* init'dan OLDIN — o'lcham 0 bo'lmasligi uchun */
          const ok = window.FilmReel && FilmReel.init(
            sec,
            document.getElementById('reel3d-tooltip'),
            document.getElementById('reel3d-fade'),
            reelList,
            /* wheel: false — g'ildirak SAHIFANI scroll qiladi (galereyadan
               chiqib pastdagi kartalarga tushish mumkin), devor drag bilan */
            { root: '../', wheel: false }
          );
          if (!ok) sec.hidden = true;
        } catch (e) {
          sec.hidden = true;
          console.warn('[FilmReel] ishga tushmadi:', e);
        }
      };
      if (window.FilmReel) startReel();
      else document.addEventListener('filmreel:ready', startReel, { once: true });
    })();
  </script>
</body>
</html>
