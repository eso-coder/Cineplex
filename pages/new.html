<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Yangi chiqmalar — CINEPLEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .new-hero-band {
      padding: 0 28px 24px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }
    .new-featured {
      position: relative; border-radius: 16px; overflow: hidden;
      height: 220px; cursor: pointer; background: #181818;
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1);
    }
    .new-featured:first-child { grid-column: span 2; height: 240px; }
    .new-featured:hover { transform: translateY(-4px); }
    .new-featured img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s; }
    .new-featured:hover img { transform: scale(1.04); }
    .new-featured-grad { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%); }
    .new-featured-info { position: absolute; bottom: 16px; left: 18px; right: 60px; z-index: 2; }
    .new-feat-badge { display: inline-block; background: rgba(255,255,255,0.18); color: #ffffff; font-size: 13.5px; font-weight: 800; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.25); }
    .new-feat-title { font-size: 27px; font-weight: 800; line-height: 1.1; letter-spacing: -0.3px; }
    .new-feat-meta { font-size: 16.5px; color: rgba(255,255,255,0.55); margin-top: 4px; }
    .new-play-mini {
      position: absolute; right: 14px; bottom: 14px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      z-index: 2; transition: background 0.2s, transform 0.2s;
    }
    .new-play-mini:hover { background: rgba(255,255,255,0.25); transform: scale(1.08); }
    .new-play-mini svg { color: #ffffff; margin-left: 2px; }
  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="catalog-header animate-in">
      <div>
        <div class="catalog-title">Yangi chiqmalar</div>
        <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
      </div>
    </div>

    <!-- Featured band (top 3 new) -->
    <div class="new-hero-band animate-in" id="new-hero-band" style="transition-delay:0.06s"></div>

    <!-- Genre filter -->
    <div class="catalog-genre-bar animate-in" id="genre-bar" style="transition-delay:0.1s">
      <button class="genre-pill active" data-genre="all">Barchasi</button>
      <button class="genre-pill" data-genre="action">Jangovar</button>
      <button class="genre-pill" data-genre="drama">Drama</button>
      <button class="genre-pill" data-genre="comedy">Komediya</button>
      <button class="genre-pill" data-genre="scifi">Fantastika</button>
      <button class="genre-pill" data-genre="fantasy">Fantaziya</button>
      <button class="genre-pill" data-genre="historical">Tarixiy</button>
    </div>

    <!-- All new grid -->
    <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.16s"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('new', '../');
    App.initAnimations();

    function buildHeroBand(list) {
      const top3 = list.slice(0, 3);
      document.getElementById('new-hero-band').innerHTML = top3.map(m => `
        <div class="new-featured" onclick="App.go('../pages/movie.html?id=${m.id}')">
          <img src="${m.img}" alt="${m.title}" loading="lazy">
          <div class="new-featured-grad"></div>
          <div class="new-featured-info">
            <span class="new-feat-badge">YANGI</span>
            <div class="new-feat-title">${m.title}</div>
            <div class="new-feat-meta">${m.year} · ${m.rating} IMDB · ${m.age}+</div>
          </div>
          <div class="new-play-mini" onclick="event.stopPropagation(); App.go('../pages/watch.html?id=${m.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      `).join('');
    }

    function render(list) {
      document.getElementById('catalog-grid').innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta yangi film';
    }

    let newList = [];
    (async () => {
      try {
        const data = await MoviesAPI.newMovies();
        newList = (data && data.length) ? data : getNew();
      } catch {
        newList = getNew();
      }
      buildHeroBand(newList);
      render(newList);
      App.initGenrePills('genre-bar', genre => {
        const filtered = genre === 'all' ? newList : newList.filter(m => (m.genre || []).includes(genre));
        render(filtered);
      });
    })();
  </script>
</body>
</html>
