<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile — CINEPLEX</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/perf-lite.js?v=2"></script>
  <link rel="stylesheet" href="../css/main.css?v=2">
  <link rel="stylesheet" href="../css/auth-modal.css">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/aurora-profile.css">
  <style>
    /* ══════════════════════════════════════════════════
       PROFILE v2 — Letterboxd-style
    ══════════════════════════════════════════════════ */
    /* Sayt bilan bir xil monoxrom iOS palitra */
    :root {
      --pf-ease: cubic-bezier(0.23, 1, 0.32, 1);
      --pf-bg: #0a0a0c;
      --pf-panel: #17171b;
      --pf-line: rgba(255,255,255,0.08);
      --pf-dim: rgba(235,235,245,0.64);
      --pf-muted: rgba(235,235,245,0.4);
      --pf-green: #ffffff;
      --pf-blue: #ffffff;
      --pf-star: #f5c518;
      --pf-red: #ff453a;
      --pf-cover-h: 340px;
    }

    body { background: var(--pf-bg); }

    .pf2 { min-height: 100vh; }

    /* ── Settings tab ── */
    .pf2-settings { display: flex; flex-direction: column; gap: 10px; }
    .pf2-set-row {
      display: flex; align-items: center; gap: 14px; width: 100%;
      padding: 15px 18px; background: var(--pf-panel);
      border: 1px solid var(--pf-line); border-radius: 14px;
      color: #fff; text-align: left; cursor: pointer; text-decoration: none;
      transition: background .18s var(--pf-ease), border-color .18s var(--pf-ease), transform .18s var(--pf-ease);
    }
    .pf2-set-row:hover { background: #1f1f24; border-color: rgba(255,255,255,0.16); transform: translateY(-1px); }
    .pf2-set-row:active { transform: scale(0.99); }
    .pf2-set-ic {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06); color: var(--pf-dim);
    }
    .pf2-set-txt { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .pf2-set-txt b { font-size: 17px; font-weight: 600; }
    .pf2-set-txt small { font-size: 13.5px; color: var(--pf-muted); }
    .pf2-set-arr { color: var(--pf-muted); flex-shrink: 0; }
    /* iOS systemRed — faqat xavfli amal (chiqish) uchun */
    .pf2-set-danger { color: var(--pf-red); }
    .pf2-set-danger .pf2-set-ic { background: rgba(255,69,58,0.12); color: var(--pf-red); }
    .pf2-set-danger:hover { background: rgba(255,69,58,0.08); border-color: rgba(255,69,58,0.35); }
    .pf2-set-danger .pf2-set-txt b { color: var(--pf-red); }

    /* ── Cover banner ── */
    .pf2-cover {
      position: relative;
      width: 100%;
      height: var(--pf-cover-h);
      overflow: hidden;
      background:
        radial-gradient(120% 80% at 70% 10%, rgba(210,210,225,0.4), transparent 60%),
        radial-gradient(90% 70% at 20% 30%, rgba(150,150,165,0.3), transparent 55%),
        linear-gradient(180deg, #5c5c66 0%, #3e3e46 40%, #232328 75%, var(--pf-bg) 100%);
    }
    .pf2-cover-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .pf2-cover-img.loaded { display: block; }
    /* gradient blend into the profile section below */
    .pf2-cover::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 60%;
      background: linear-gradient(180deg, transparent 0%, rgba(20,24,28,0.55) 55%, var(--pf-bg) 100%);
      pointer-events: none;
    }
    .pf2-cover-edit {
      position: absolute; top: 60px; right: 38px; z-index: 3;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff; font-size: 14.5px; font-weight: 600;
      cursor: pointer;
      transition: background 160ms var(--pf-ease), transform 140ms var(--pf-ease);
    }
    .pf2-cover-edit:hover { background: rgba(0,0,0,0.7); }
    .pf2-cover-edit:active { transform: scale(0.96); }

    /* ── Profile container ── */
    .pf2-wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
    }

    /* ── Header row (avatar + identity) ── */
    .pf2-head {
      position: relative;
      margin-top: calc(-1 * var(--pf-cover-h) + 200px); /* pull up to overlap cover */
      display: flex;
      align-items: flex-end;
      gap: 22px;
      padding-bottom: 22px;
    }

    .pf2-av-wrap { position: relative; flex-shrink: 0; }
    .pf2-av {
      width: 118px; height: 118px;
      border-radius: 50%;
      background: linear-gradient(135deg, #46464e, #1a1a1f);
      border: 4px solid var(--pf-bg);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: transform 200ms var(--pf-ease);
    }
    .pf2-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pf2-av-fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 45px; font-weight: 800; color: rgba(255,255,255,0.85);
    }
    .pf2-av-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      background: rgba(0,0,0,0.5);
      color: #fff; font-size: 11.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
      opacity: 0;
      transition: opacity 180ms var(--pf-ease);
    }
    @media (hover: hover) and (pointer: fine) {
      .pf2-av:hover { transform: scale(1.03); }
      .pf2-av:hover .pf2-av-overlay { opacity: 1; }
    }

    .pf2-identity { flex: 1; min-width: 0; padding-bottom: 4px; }
    .pf2-name-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .pf2-username {
      font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.1;
    }
    .pf2-patron {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 6px;
      background: rgba(255,255,255,0.14); color: #ffffff;
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 12.5px; font-weight: 800; letter-spacing: 0.8px;
    }
    .pf2-meta {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
      margin-top: 10px;
      color: var(--pf-dim); font-size: 16px;
    }
    .pf2-meta a { color: var(--pf-dim); transition: color 160ms var(--pf-ease); }
    .pf2-meta a:hover { color: #fff; }
    .pf2-meta-item { display: inline-flex; align-items: center; gap: 6px; }
    .pf2-meta-item svg { opacity: 0.8; flex-shrink: 0; }

    /* ── Stats ── */
    .pf2-stats {
      display: flex; align-items: flex-start; gap: 0;
      flex-shrink: 0;
      padding-bottom: 6px;
    }
    .pf2-stat {
      text-align: center;
      padding: 0 16px;
      border-left: 1px solid var(--pf-line);
    }
    .pf2-stat:first-child { border-left: none; }
    .pf2-stat-num { font-size: 22.5px; font-weight: 800; color: #fff; line-height: 1; }
    .pf2-stat-label {
      font-size: 11.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--pf-muted); margin-top: 5px;
    }

    /* ── Tabs ── */
    .pf2-tabs {
      display: flex; align-items: center; gap: 4px;
      border-bottom: 1px solid var(--pf-line);
      margin-bottom: 28px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .pf2-tabs::-webkit-scrollbar { display: none; }
    .pf2-tab {
      position: relative;
      padding: 13px 16px;
      background: none; border: none;
      color: var(--pf-dim);
      font-family: inherit; font-size: 14.5px; font-weight: 700;
      letter-spacing: 0.4px; text-transform: uppercase;
      cursor: pointer; white-space: nowrap;
      transition: color 160ms var(--pf-ease);
    }
    .pf2-tab:hover { color: #fff; }
    .pf2-tab::after {
      content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px;
      height: 2px; border-radius: 2px; background: var(--pf-green);
      transform: scaleX(0); transform-origin: center;
      transition: transform 200ms var(--pf-ease);
    }
    .pf2-tab.active { color: #fff; }
    .pf2-tab.active::after { transform: scaleX(1); }

    /* ── Section header ── */
    .pf2-section { margin-bottom: 40px; }
    .pf2-sec-head {
      display: flex; align-items: baseline; justify-content: space-between;
      border-bottom: 1px solid var(--pf-line);
      padding-bottom: 8px; margin-bottom: 16px;
    }
    .pf2-sec-title {
      font-size: 13.5px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase;
      color: var(--pf-dim);
    }
    .pf2-sec-link {
      font-size: 12.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--pf-muted); cursor: pointer; background: none; border: none; font-family: inherit;
      transition: color 160ms var(--pf-ease);
    }
    .pf2-sec-link:hover { color: var(--pf-green); }

    /* ── Poster grids ── */
    .pf2-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }
    .pf2-grid.activity { gap: 14px; }

    /* poster card */
    .pf2-poster {
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      aspect-ratio: 2 / 3;
      background: linear-gradient(150deg, #232328, #141418);
      border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: transform 220ms var(--pf-ease), box-shadow 220ms var(--pf-ease);
    }
    .pf2-poster img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 1; }
    .pf2-poster-fallback {
      position: absolute; inset: 0; z-index: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 14px; text-align: center;
    }
    .pf2-poster-fallback .pf-fb-title { font-size: 14.5px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.25; }
    .pf2-poster-fallback .pf-fb-year { font-size: 12.5px; color: var(--pf-muted); }
    @media (hover: hover) and (pointer: fine) {
      .pf2-poster:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(0,0,0,0.5); border-color: var(--pf-green); }
      .pf2-poster:hover .pf2-poster-hover { opacity: 1; transform: translateY(0); }
    }
    .pf2-poster-hover {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
      padding: 22px 10px 9px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.92));
      color: #fff;
      opacity: 0; transform: translateY(8px);
      transition: opacity 200ms var(--pf-ease), transform 200ms var(--pf-ease);
    }
    .pf2-poster-hover .ph-title { font-size: 14.5px; font-weight: 700; line-height: 1.25; }
    .pf2-poster-hover .ph-year { font-size: 12.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }

    /* "Show more" 5th-card label */
    .pf2-showmore-wrap { position: relative; }
    .pf2-showmore {
      position: absolute; top: -26px; right: 0;
      font-size: 12.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
      color: var(--pf-muted); cursor: pointer; background: none; border: none; font-family: inherit;
      transition: color 160ms var(--pf-ease);
    }
    .pf2-showmore:hover { color: var(--pf-green); }

    /* activity card extras */
    .pf2-act-card .pf2-meta-under {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 7px; padding: 0 1px;
    }
    .pf2-stars { display: inline-flex; gap: 1px; color: var(--pf-star); }
    .pf2-stars svg { display: block; }
    .pf2-like { color: #ff5c8a; display: inline-flex; }
    .pf2-like.off { color: var(--pf-muted); }

    /* enter stagger */
    .pf2-poster, .pf2-act-card {
      opacity: 0; transform: translateY(10px);
      animation: pf2In 360ms var(--pf-ease) forwards;
    }
    @keyframes pf2In { to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      .pf2-poster, .pf2-act-card { animation: none; opacity: 1; transform: none; }
      .pf2-poster, .pf2-cover-edit, .pf2-av, .pf2-tab::after { transition: opacity 160ms ease; }
    }

    /* empty state */
    .pf2-empty {
      padding: 48px 0; text-align: center; color: var(--pf-muted);
      font-size: 16px;
    }

    .pf2-demo-badge {
      display: inline-flex; align-items: center; gap: 7px;
      margin-left: 8px; padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.75); font-size: 12.5px; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .pf2-grid { grid-template-columns: repeat(4, 1fr); }
      .pf2-head { flex-wrap: wrap; }
      .pf2-stats { width: 100%; justify-content: flex-start; margin-top: 6px; }
      .pf2-stat:first-child { padding-left: 0; }
    }
    @media (max-width: 640px) {
      :root { --pf-cover-h: 220px; }
      .pf2-head { margin-top: calc(-1 * var(--pf-cover-h) + 130px); gap: 16px; }
      .pf2-av { width: 88px; height: 88px; }
      .pf2-username { font-size: 27px; }
      .pf2-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .pf2-stat { padding: 0 12px; }
      .pf2-stat-num { font-size: 19px; }
      /* Telefon: faqat kamera ikonkasi, pastki o'ng burchakda (ism qatori bilan bir tekis).
         Fon — yonidagi qalam tugmasi (pf2-name-edit-btn) bilan bir xil. */
      .pf2-cover-edit {
        top: auto;
        bottom: 13px;
        right: 12px;
        width: 35px;
        height: 35px;
        padding: 9px;
        gap: 0;
        border-radius: 50%;
        justify-content: center;
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.13);
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
      }
      .pf2-cover-edit:hover,
      .pf2-cover-edit:active { background: rgba(255,255,255,0.18); }
      .pf2-cover-edit .pf2-cover-edit-txt { display: none; }
      .pf2-cover-edit svg { width: 16px; height: 16px; }
    }
    @media (max-width: 440px) {
      .pf2-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── Edit Profile Modal ────────────────────────────── */
    .pf2-edit-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,13,16,0.78);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; box-sizing: border-box;
      opacity: 0; pointer-events: none;
      transition: opacity 220ms var(--pf-ease);
    }
    .pf2-edit-overlay.open { opacity: 1; pointer-events: all; }
    .pf2-edit-modal {
      background: #1b2228;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      width: 100%; max-width: 460px;
      max-height: calc(100vh - 40px); overflow-y: auto;
      transform: translateY(20px) scale(0.97);
      transition: transform 280ms var(--pf-ease);
    }
    .pf2-edit-overlay.open .pf2-edit-modal { transform: translateY(0) scale(1); }
    .pf2-edit-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 22px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .pf2-edit-head h3 { font-size: 18px; font-weight: 700; color: #fff; margin: 0; }
    .pf2-edit-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: #9ab; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 160ms, color 160ms;
    }
    .pf2-edit-close:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .pf2-edit-body { padding: 22px 22px 24px; }
    .pf2-edit-av-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .pf2-edit-av {
      width: 68px; height: 68px; border-radius: 50%;
      background: linear-gradient(135deg, #46464e, #1a1a1f);
      overflow: hidden; flex-shrink: 0; position: relative;
      border: 3px solid rgba(255,255,255,0.1); cursor: pointer;
    }
    .pf2-edit-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pf2-edit-av-fb {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 27px; font-weight: 800; color: rgba(255,255,255,0.85);
    }
    .pf2-edit-av-col { display: flex; flex-direction: column; gap: 6px; }
    .pf2-edit-av-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 9px; color: #fff; font-size: 14.5px; font-weight: 600;
      padding: 8px 16px; cursor: pointer; font-family: inherit;
      transition: background 160ms;
    }
    .pf2-edit-av-btn:hover { background: rgba(255,255,255,0.15); }
    .pf2-edit-av-hint { font-size: 12.5px; color: var(--pf-muted); }
    .pf2-edit-field { margin-bottom: 14px; }
    .pf2-edit-label {
      display: block; font-size: 12.5px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--pf-muted); margin-bottom: 6px;
    }
    .pf2-edit-input {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px; padding: 11px 14px;
      color: #fff; font-size: 16px; font-family: inherit; outline: none;
      transition: border-color 160ms;
    }
    .pf2-edit-input:focus { border-color: rgba(255,255,255,0.4); }
    .pf2-edit-input::placeholder { color: var(--pf-muted); }
    .pf2-edit-actions { display: flex; gap: 10px; margin-top: 20px; }
    .pf2-edit-save {
      flex: 1; padding: 12px;
      background: #ffffff; border: none; border-radius: 10px;
      color: #0a0a0c; font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 160ms, transform 120ms;
    }
    .pf2-edit-save:hover { background: rgba(255,255,255,0.86); }
    .pf2-edit-save:active { transform: scale(0.98); }
    .pf2-edit-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .pf2-edit-cancel {
      padding: 12px 20px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: var(--pf-dim); font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 160ms;
    }
    .pf2-edit-cancel:hover { background: rgba(255,255,255,0.11); }

    /* ── Pencil button next to username ── */
    .pf2-name-edit-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.13);
      color: var(--pf-muted); cursor: pointer;
      opacity: 1;
      transition: background 160ms, color 160ms, transform 120ms;
    }
    .pf2-name-edit-btn:hover { background: rgba(255,255,255,0.18); color: #fff; transform: scale(1.08); }
  </style>
</head>
<body class="profile-page">
  <div id="navbar-placeholder"></div>

  <!-- hidden upload inputs -->
  <input type="file" id="pf2-avatar-input" accept="image/*" style="display:none">
  <input type="file" id="pf2-cover-input" accept="image/*" style="display:none">

  <div class="pf2">
    <!-- Cover -->
    <div class="pf2-cover" id="pf2-cover">
      <img class="pf2-cover-img" id="pf2-cover-img" alt="">
      <button class="pf2-cover-edit" id="pf2-cover-edit" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span class="pf2-cover-edit-txt">Edit cover</span>
      </button>
    </div>

    <div class="pf2-wrap">
      <!-- Header -->
      <div class="pf2-head">
        <div class="pf2-av-wrap">
          <div class="pf2-av" id="pf2-avatar" title="Change profile photo">
            <div class="pf2-av-fallback" id="pf2-av-fallback">L</div>
            <div class="pf2-av-overlay">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <span>Edit</span>
            </div>
          </div>
        </div>

        <div class="pf2-identity">
          <div class="pf2-name-row">
            <span class="pf2-username" id="pf2-username">—</span>
            <span class="pf2-patron" id="pf2-patron" style="display:none">PATRON</span>
            <span class="pf2-demo-badge" id="pf2-demo" style="display:none" title="Sign in to see your own profile">DEMO · Sign in</span>
            <button class="pf2-name-edit-btn" id="pf2-name-edit-btn" type="button" title="Profilni tahrirlash" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
          <div class="pf2-meta" id="pf2-meta"></div>
        </div>

        <div class="pf2-stats" id="pf2-stats"></div>
      </div>

      <!-- Tabs -->
      <div class="pf2-tabs" id="pf2-tabs">
        <button class="pf2-tab active" data-tab="profile">Profile</button>
        <button class="pf2-tab" data-tab="films">Films</button>
        <button class="pf2-tab" data-tab="activity">Activity</button>
        <button class="pf2-tab" data-tab="reviews">Reviews</button>
        <button class="pf2-tab" data-tab="watchlist">Watchlist</button>
        <button class="pf2-tab" data-tab="likes">Likes</button>
        <button class="pf2-tab" data-tab="settings">Sozlamalar</button>
      </div>

      <!-- ── PROFILE tab (default) ── -->
      <div class="pf2-view" id="view-profile">
        <!-- Favourite Films -->
        <div class="pf2-section">
          <div class="pf2-sec-head">
            <span class="pf2-sec-title">Favourite Films</span>
          </div>
          <div class="pf2-grid" id="pf2-fav-grid"></div>
        </div>

        <!-- Recent Activity -->
        <div class="pf2-section">
          <div class="pf2-sec-head">
            <span class="pf2-sec-title">Recent Activity</span>
            <button class="pf2-sec-link" id="pf2-activity-all">All</button>
          </div>
          <div class="pf2-grid activity" id="pf2-act-grid"></div>
        </div>
      </div>

      <!-- ── Other tabs share a generic grid view ── -->
      <div class="pf2-view" id="view-generic" style="display:none">
        <div class="pf2-section">
          <div class="pf2-sec-head">
            <span class="pf2-sec-title" id="pf2-generic-title">Films</span>
          </div>
          <div class="pf2-grid" id="pf2-generic-grid"></div>
          <div class="pf2-empty" id="pf2-generic-empty" style="display:none">Nothing here yet.</div>
        </div>
      </div>

      <!-- ── SETTINGS tab ── -->
      <div class="pf2-view" id="view-settings" style="display:none">
        <!-- Hisob -->
        <div class="pf2-section">
          <div class="pf2-sec-head"><span class="pf2-sec-title">Hisob</span></div>
          <div class="pf2-settings">
            <button class="pf2-set-row" id="set-edit">
              <span class="pf2-set-ic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </span>
              <span class="pf2-set-txt"><b>Profilni tahrirlash</b><small>Ism, rasm va ma'lumotlar</small></span>
              <svg class="pf2-set-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <button class="pf2-set-row" id="set-password">
              <span class="pf2-set-ic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <span class="pf2-set-txt"><b>Parolni o'zgartirish</b><small>Hisob xavfsizligi</small></span>
              <svg class="pf2-set-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </button>
          </div>
        </div>

        <!-- Yordam -->
        <div class="pf2-section">
          <div class="pf2-sec-head"><span class="pf2-sec-title">Yordam</span></div>
          <div class="pf2-settings">
            <a class="pf2-set-row" id="set-support" href="https://t.me/cineplex_support" target="_blank" rel="noopener">
              <span class="pf2-set-ic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.49 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.4 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.4a16 16 0 0 0 5.72 5.72l1.7-1.7a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92z"/></svg>
              </span>
              <span class="pf2-set-txt"><b>Qo'llab-quvvatlash</b><small>Biz bilan bog'laning</small></span>
              <svg class="pf2-set-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </a>
            <a class="pf2-set-row" id="set-help" href="#" >
              <span class="pf2-set-ic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </span>
              <span class="pf2-set-txt"><b>Yordam markazi</b><small>Tez-tez so'raladigan savollar</small></span>
              <svg class="pf2-set-arr" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
            </a>
          </div>
        </div>

        <!-- Chiqish -->
        <div class="pf2-section">
          <div class="pf2-settings">
            <button class="pf2-set-row pf2-set-danger" id="set-logout">
              <span class="pf2-set-ic">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </span>
              <span class="pf2-set-txt"><b>Chiqish</b></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Edit Profile Modal ────────────────────────────── -->
  <div class="pf2-edit-overlay" id="pf2-edit-overlay" role="dialog" aria-modal="true" aria-labelledby="pf2-edit-title">
    <div class="pf2-edit-modal">
      <div class="pf2-edit-head">
        <h3 id="pf2-edit-title">Profilni tahrirlash</h3>
        <button class="pf2-edit-close" id="pf2-edit-close" type="button" aria-label="Yopish">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="pf2-edit-body">
        <!-- Avatar -->
        <div class="pf2-edit-av-row">
          <div class="pf2-edit-av" id="pf2-edit-av" title="Rasmni o'zgartirish">
            <div class="pf2-edit-av-fb" id="pf2-edit-av-fb">?</div>
          </div>
          <div class="pf2-edit-av-col">
            <button class="pf2-edit-av-btn" id="pf2-edit-av-btn" type="button">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:5px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Rasmni o'zgartirish
            </button>
            <span class="pf2-edit-av-hint">400×400 px · JPEG yoki PNG</span>
          </div>
        </div>

        <!-- Ism -->
        <div class="pf2-edit-field">
          <label class="pf2-edit-label" for="pf2-edit-name">Ism</label>
          <input class="pf2-edit-input" id="pf2-edit-name" type="text" placeholder="Ismingiz" maxlength="60" autocomplete="name">
        </div>

        <!-- Joylashuv -->
        <div class="pf2-edit-field">
          <label class="pf2-edit-label" for="pf2-edit-location">Joylashuv</label>
          <input class="pf2-edit-input" id="pf2-edit-location" type="text" placeholder="Shahar yoki davlat" maxlength="80">
        </div>

        <!-- Veb-sayt -->
        <div class="pf2-edit-field">
          <label class="pf2-edit-label" for="pf2-edit-website">Veb-sayt</label>
          <input class="pf2-edit-input" id="pf2-edit-website" type="text" placeholder="example.com" maxlength="100">
        </div>

        <!-- Ijtimoiy tarmoq -->
        <div class="pf2-edit-field">
          <label class="pf2-edit-label" for="pf2-edit-social">Ijtimoiy tarmoq</label>
          <input class="pf2-edit-input" id="pf2-edit-social" type="text" placeholder="@username" maxlength="60">
        </div>

        <!-- Harakatlar -->
        <div class="pf2-edit-actions">
          <button class="pf2-edit-cancel" id="pf2-edit-cancel" type="button">Bekor qilish</button>
          <button class="pf2-edit-save" id="pf2-edit-save" type="button">Saqlash</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth-modal.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
