<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tomosha — CINEPLEX</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="../js/perf-lite.js?v=3"></script>
  <link rel="stylesheet" href="../css/main.css?v=5">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/aurora-watch.css">
  <style>
    /* Solid fon aurora-watch.css'dagi ikki qatlamli (--aurora-rgb) fonga
       qoldirildi — bu yerda opaque background bermaymiz, aks holda
       body darhol pastdagi aurora div'larini bosib qo'yadi. */
    body.watch-page {
      background: transparent;
    }

    body.watch-page .ambient-bg {
      display: none;
    }

    body.watch-page main {
      padding-top: var(--navbar-h);
    }

    /* Floating, ixcham overlay — player ustida, boshqaruvlar bilan birga
       avtomatik yashiriladi/ko'rinadi (show-ui), statik joy egallamaydi. */
    .watch-top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 11;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .player-wrapper.show-ui .watch-top-bar {
      opacity: 1;
      pointer-events: all;
    }

    .watch-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px; height: 38px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--glass-2, rgba(25,30,37,0.62));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.15s;
    }

    .watch-back:hover {
      background: var(--glass-3, rgba(25,30,37,0.78));
      color: #ffffff;
      transform: scale(1.06);
    }

    .watch-top-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.25;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .watch-top-year {
      font-size: 13.5px;
      color: rgba(255,255,255,0.55);
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    /* ═══ CINEPLEX PLAYER ═══ */
    .player-wrapper {
      position: relative;
      width: 100%;
      background: #000000;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .player-wrapper:fullscreen,
    .player-wrapper:-webkit-full-screen {
      aspect-ratio: unset;
      height: 100vh;
    }

    /* Fullscreen tugmasi bosilganda video kattalashib ekranni
       qoplayotgandek his qildiradigan qisqa "o'sish" animatsiyasi.
       Haqiqiy Fullscreen API/pseudo-fs qaysi birini ishlatishidan
       qat'iy nazar, bosilgan zahoti ishga tushadi. */
    @keyframes fsGrow {
      0%   { transform: scale(0.92); filter: brightness(0.6); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .player-wrapper.fs-grow {
      animation: fsGrow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── iOS uchun "soxta" fullscreen ──
       iOS Safari'da <div> uchun haqiqiy fullscreen yo'q — native pleyer ochiladi
       va sifat/subtitr/til tugmalari yo'qoladi. Shuning uchun SAYT pleyerini
       CSS bilan butun ekranga yoyamiz (video `playsinline` — inline qoladi). */
    /* Oxirgi chora fallback (native ham, real FS ham yo'q) — ekranni to'liq
       qoplaydi. `inset:0` fixed viewport'ni to'ldiradi; boshqaruvlar (bottom:0)
       ekranning eng pastida turadi. */
    .player-wrapper.pseudo-fs {
      position: fixed;
      inset: 0;
      z-index: 100000;
      aspect-ratio: unset;
      margin: 0;
      background: #000;
    }
    body.player-fs-lock {
      overflow: hidden;
    }

    /* ══ MULTI-WINDOW — Document Picture-in-Picture ══
       Pleyer alohida OS oynasiga ko'chganda butun oynani egallaydi.
       O'lchamni foydalanuvchi oynaning o'z chetlaridan cho'zib boshqaradi —
       shuning uchun bu yerda hech qanday qat'iy o'lcham/nisbat yo'q. */
    body.pip-body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    .player-wrapper.pip-mode {
      position: static;
      width: 100vw;
      height: 100vh;
      max-height: none;
      aspect-ratio: unset;
      border: none;
      border-radius: 0;
      box-shadow: none;
      cursor: auto;
      touch-action: auto;
    }
    /* PiP oynasida OS'ning o'z boshqaruvlari bor — sahifa ichidagi mini
       oynaga tegishli elementlar keraksiz */
    .player-wrapper.pip-mode .watch-top-bar,
    .player-wrapper.pip-mode .mini-actions,
    .player-wrapper.pip-mode .mini-resize-handle,
    .player-wrapper.pip-mode .player-mini-btn,
    .player-wrapper.pip-mode .player-fs-btn,
    .player-wrapper.pip-mode .player-rotate-btn {
      display: none;
    }

    /* ══ MINI PLAYER (multi-screen) ══
       Pleyer sahifadan "uzilib" chiqib, pastki-o'ng burchakda suzuvchi
       kichik oynaga aylanadi — foydalanuvchi film ijro etilayotganda
       sahifani (qismlar, o'xshash filmlar) ko'rib chiqa oladi. */
    .player-wrapper.mini-mode {
      position: fixed;
      right: 20px;
      bottom: 20px;
      left: auto;
      top: auto;
      width: 380px;
      max-width: 46vw;
      aspect-ratio: 16/9;
      z-index: 9000;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 18px 50px rgba(0,0,0,0.62), inset 0 1px 0 rgba(255,255,255,0.06);
      /* Barmoq bilan surishda sahifa scroll bo'lib ketmasin */
      touch-action: none;
      cursor: grab;
    }

    /* Kirish animatsiyasi ATAYIN alohida klassda: agar u .mini-mode'ning
       o'zida tursa, boshqa klass (masalan .is-dragging) qo'shilib-olinganda
       QAYTA ishga tushadi va oyna surishdan keyin "sakrab" kichrayadi.
       Klass animatsiya tugashi bilan olib tashlanadi (bir martalik). */
    .player-wrapper.mini-mode.mini-enter {
      animation: miniIn 0.34s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes miniIn {
      from { opacity: 0; transform: translateY(26px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Surish/o'lchash paytida matn tanlash xalaqit bermasin */
    .player-wrapper.mini-mode.is-dragging,
    .player-wrapper.mini-mode.is-resizing {
      user-select: none;
      -webkit-user-select: none;
    }
    .player-wrapper.mini-mode.is-dragging { cursor: grabbing; }
    .player-wrapper.mini-mode.is-resizing { cursor: nwse-resize; }

    /* ── O'lcham dastagi (yuqori-chap burchak) ──
       Oyna pastki-o'ng burchakda turgani uchun cho'zish yuqori-chapdan
       bo'ladi: pastki-o'ng burchak qotib turadi, oyna ichkariga o'sadi. */
    .mini-resize-handle {
      position: absolute;
      top: 0; left: 0;
      width: 24px; height: 24px;
      z-index: 13;
      display: none;
      cursor: nwse-resize;
      touch-action: none;
    }
    .player-wrapper.mini-mode .mini-resize-handle { display: block; }
    .mini-resize-handle::before {
      content: '';
      position: absolute;
      top: 7px; left: 7px;
      width: 9px; height: 9px;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-radius: 3px 0 0 0;
      opacity: 0;
      transition: opacity 0.2s ease;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    }
    .player-wrapper.mini-mode.show-ui .mini-resize-handle::before { opacity: 0.9; }

    /* Mini rejimda joy egallamaydigan/mos kelmaydigan elementlar */
    .player-wrapper.mini-mode .watch-top-bar,
    .player-wrapper.mini-mode .sub-overlay,
    .player-wrapper.mini-mode .volume-hud,
    .player-wrapper.mini-mode .seek-hud,
    .player-wrapper.mini-mode .psd-group,
    .player-wrapper.mini-mode .player-vol-wrap,
    .player-wrapper.mini-mode .player-time,
    .player-wrapper.mini-mode .player-rotate-btn,
    .player-wrapper.mini-mode .player-fs-btn,
    .player-wrapper.mini-mode .player-mini-btn {
      display: none;
    }

    /* Mini oynaga kadr preview'i sig'maydi (158px) — mavjud .no-thumb
       ko'rinishiga tushamiz: faqat vaqt puzirchasi qoladi. */
    .player-wrapper.mini-mode .player-seek-preview {
      width: auto;
      border: none;
      border-radius: 6px;
    }
    .player-wrapper.mini-mode .player-seek-preview video { display: none; }
    .player-wrapper.mini-mode .player-seek-preview .spv-time { padding: 4px 10px; }

    /* Ixcham boshqaruvlar */
    .player-wrapper.mini-mode .player-controls { padding: 0 8px 8px; }
    .player-wrapper.mini-mode .player-progress-wrap { margin-bottom: 8px; height: 3px; }
    .player-wrapper.mini-mode .player-ctrl-btn { padding: 5px 6px; }
    .player-wrapper.mini-mode .player-ctrl-btn svg { width: 17px; height: 17px; }
    .player-wrapper.mini-mode .player-grad-overlay { height: 110px; }
    .player-wrapper.mini-mode .player-center-btn { width: 50px; height: 50px; }
    .player-wrapper.mini-mode .player-center-btn svg { width: 20px; height: 20px; }

    /* Mini oynadagi "kattalashtirish" va "yopish" tugmalari — boshqaruvlar
       bilan birga ko'rinadi/yashiriladi (show-ui). */
    .mini-actions {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 12;
      display: none;
      justify-content: flex-end;
      gap: 6px;
      padding: 8px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .player-wrapper.mini-mode .mini-actions { display: flex; }
    .player-wrapper.mini-mode.show-ui .mini-actions { opacity: 1; pointer-events: all; }

    .mini-action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(25,30,37,0.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: background 0.16s, color 0.16s, transform 0.14s;
    }
    .mini-action-btn:hover {
      background: rgba(25,30,37,0.85);
      color: #ffffff;
      transform: scale(1.08);
    }

    /* Mini rejimda pleyer sahifa oqimidan chiqadi — bu element uning
       o'rnini egallab, sahifa "sakrab" ketishining oldini oladi. */
    .player-placeholder {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      /* O'lchamlar main.css'dagi .player-wrapper bilan bir xil bo'lishi shart —
         aks holda mini rejimga o'tganda sahifa pastga "sakraydi". */
      aspect-ratio: 16/9;
      max-height: calc(100vh - var(--navbar-h) - 80px);
      background: #0a0a0b;
      border-bottom: 1px solid var(--border, rgba(255,255,255,0.08));
    }
    body.mini-active .player-placeholder { display: flex; }
    .player-placeholder__box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.4);
      font-size: 14.5px;
      font-weight: 600;
    }

    /* Hide cursor when controls are not visible (playing state) */
    .player-wrapper:not(.show-ui),
    .player-wrapper:not(.show-ui) * {
      cursor: none !important;
    }
    .player-bg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(50px) brightness(0.25) saturate(1.3);
      transform: scale(1.1);
      z-index: 0;
    }
    #real-player {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; z-index: 1; background: #000000;
    }
    .player-poster {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
      transition: opacity 0.5s;
    }
    .player-poster.hidden { opacity: 0; pointer-events: none; }
    .player-poster img {
      height: 100%; width: auto; max-width: 100%; object-fit: contain;
      box-shadow: 0 0 80px rgba(0,0,0,0.7);
    }

    /* Bottom gradient */
    .player-grad-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .player-wrapper.show-ui .player-grad-overlay { opacity: 1; }

    /* Center play/pause button */
    .player-center-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 76px; height: 76px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.22);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, opacity 0.3s;
    }
    .player-center-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: translate(-50%,-50%) scale(1.08);
    }
    .player-center-btn:active {
      transform: translate(-50%,-50%) scale(1.0);
    }
    .player-center-btn.playing {
      opacity: 0;
      pointer-events: none;
    }
    .player-center-icon { display: flex; align-items: center; justify-content: center; }

    /* Controls bar */
    .player-controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 20px 18px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .player-wrapper.show-ui .player-controls { opacity: 1; }

    /* Progress bar */
    .player-progress-wrap {
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 99px;
      cursor: pointer;
      margin-bottom: 14px;
      position: relative;
      transition: height 0.18s;
      /* Barmoq bilan surishda sahifa scroll bo'lib ketmasin */
      touch-action: none;
    }
    .player-progress-wrap:hover,
    .player-progress-wrap.seeking { height: 6px; }
    /* Surish paytida thumb doim ko'rinadi */
    .player-progress-wrap.seeking .player-progress-fill::after { opacity: 1; }

    /* ── Seek preview (YouTube kabi) — surganda tepada kichik ekran ── */
    .player-seek-preview {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 158px;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      border: 2px solid rgba(255,255,255,0.85);
      box-shadow: 0 8px 24px rgba(0,0,0,0.65);
      display: none;
      pointer-events: none;
      z-index: 30;
    }
    .player-seek-preview.visible { display: block; }
    .player-seek-preview video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #000;
    }
    .player-seek-preview .spv-time {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      padding: 3px 0 4px;
      background: rgba(0,0,0,0.9);
      letter-spacing: 0.04em;
    }
    /* Kadr olib bo'lmasa (yoki lite rejim) — faqat vaqt puzirchasi */
    .player-seek-preview.no-thumb { width: auto; border: none; border-radius: 6px; }
    .player-seek-preview.no-thumb video { display: none; }
    .player-seek-preview.no-thumb .spv-time { padding: 4px 10px; }
    @media (max-width: 640px) {
      .player-seek-preview { width: 126px; }
    }
    .player-progress-fill {
      height: 100%; background: #ffffff;
      border-radius: 99px; width: 0%;
      pointer-events: none;
      position: relative;
      transition: background 0.2s;
    }
    .player-progress-wrap:hover .player-progress-fill { background: #ffffff; }
    .player-progress-fill::after {
      content: '';
      position: absolute; right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      background: #ffffff; border-radius: 50%;
      opacity: 0; transition: opacity 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .player-progress-wrap:hover .player-progress-fill::after { opacity: 1; }

    /* Buffered bar */
    .player-progress-buffered {
      position: absolute; top: 0; left: 0; height: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 99px; pointer-events: none;
      transition: width 0.5s;
    }

    /* Control buttons */
    .player-bar {
      display: flex; align-items: center; gap: 2px;
    }
    .player-ctrl-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.82);
      cursor: pointer; padding: 7px 8px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
      font-size: 12.5px; font-weight: 800; letter-spacing: 0.3px;
    }
    .player-ctrl-btn:hover { color: #ffffff; background: rgba(255,255,255,0.1); }
    .player-ctrl-btn:active { transform: scale(var(--press-scale)); }
    .player-ctrl-btn.active-ctrl {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.14);
    }
    /* Faqat mobilda ko'rinadi — bosilganda video landscape (gorizontal)ga aylanadi */
    .player-rotate-btn { display: none; }
    .player-time {
      font-size: 13.5px; font-weight: 600;
      color: rgba(255,255,255,0.65);
      padding: 0 10px; white-space: nowrap;
    }
    .player-spacer { flex: 1; }
    .player-vol-wrap { display: flex; align-items: center; gap: 6px; }
    .player-vol-slider {
      width: 72px; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.3);
      border-radius: 99px; outline: none; cursor: pointer;
    }
    .player-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%; background: #ffffff; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .psd-cc-icon {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 15px;
      border: 1.8px solid currentColor; border-radius: 3px;
      font-size: 11.5px; font-weight: 800; letter-spacing: 0.2px;
    }
    .psd-label-btn { min-width: 40px; justify-content: center; }
    .psd-group { display: flex; align-items: center; gap: 2px; }
    .psd-btn-wrap { position: relative; }

    /* Episode list for series */
    .episode-list {
      padding: 0 28px;
    }

    .episode-list-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    /* Season selector tabs */
    .season-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .season-tab {
      padding: 7px 16px;
      border-radius: 50px;
      background: var(--glass-1);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .season-tab:hover { background: var(--glass-2); color: #fff; }
    .season-tab.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }
    .ep-title-num { color: rgba(255,255,255,0.4); font-weight: 800; margin-right: 4px; }

    .episode-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 14px;
      border-radius: var(--r-md);
      background: var(--glass-1);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.18s, border-color 0.18s;
    }

    .episode-item:hover {
      background: var(--glass-2);
      border-color: var(--border-h);
    }

    .episode-item.active {
      border-color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.07);
    }

    .ep-num {
      font-size: 20.5px;
      font-weight: 800;
      color: rgba(255,255,255,0.2);
      width: 32px;
      flex-shrink: 0;
      text-align: center;
    }

    .ep-thumb {
      width: 88px;
      height: 54px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-elev);
    }

    .ep-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ep-info {
      flex: 1;
    }

    .ep-title {
      font-size: 14.5px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .ep-duration {
      font-size: 12.5px;
      color: var(--text-dim);
    }

    .related-section {
      padding: 28px 28px 0;
    }

    /* ── Player Settings Dropdowns ── */
    .psd-group {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .psd-btn-wrap {
      position: relative;
    }

    .psd-label-btn {
      font-size: 11.5px !important;
      font-weight: 800 !important;
      letter-spacing: 0.3px;
      min-width: 38px;
      justify-content: center;
    }

    .psd-cc-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 14px;
      border: 1.5px solid currentColor;
      border-radius: 3px;
      font-size: 11.5px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1;
    }

    .player-settings-dd {
      position: absolute;
      bottom: calc(100% + 12px);
      right: 0;
      min-width: 170px;
      background: rgba(9,9,9,0.92);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.07);
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px) scale(0.96);
      transition: opacity 0.2s cubic-bezier(0.16,1,0.3,1), transform 0.2s cubic-bezier(0.16,1,0.3,1);
    }

    .player-settings-dd.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }

    .psd-head {
      font-size: 11.5px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1.1px;
      padding: 11px 14px 9px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .psd-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      font-size: 14.5px;
      color: rgba(255,255,255,0.62);
      cursor: pointer;
      transition: background 0.14s, color 0.14s;
    }

    .psd-item:hover { background: rgba(255,255,255,0.07); color: #ffffff; }
    .psd-item:active { background: rgba(255,255,255,0.12); }

    .psd-item.active {
      color: #ffffff;
      font-weight: 600;
    }

    .psd-item.active::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      flex-shrink: 0;
    }

    /* ══ Custom Subtitle Overlay ══ */
    .sub-overlay {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 8;
      text-align: center;
      pointer-events: none;
      width: max-content;
      max-width: 78%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: bottom 0.2s ease;
    }
    /* Nudge up when controls are visible */
    .player-wrapper.show-ui .sub-overlay { bottom: 112px; }

    .sub-line {
      display: inline-block;
      background: rgba(10, 11, 13, 0.72);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(21px, 3vw, 33px);
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: 0.01em;
      padding: 7px 22px 8px;
      border-radius: 14px;
      box-shadow: 0 6px 22px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      animation: subIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes subIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); filter: blur(3px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* ══ Volume HUD — "Minimal Arc" (dome shaklidagi SVG progress) ══
       ArrowUp/ArrowDown/M paytida chiqadigan ovoz balandligi ko'rsatkichi. */
    .volume-hud {
      position: absolute;
      left: 50%;
      bottom: 64px;
      z-index: 60;
      width: 180px;
      height: 100px;
      margin-left: -90px;
      pointer-events: none;
    }

    /* Tashqi element faqat joylashuvni, ichki element harakatni boshqaradi —
       shunda translate() va scale() bir-biriga xalaqit bermaydi. */
    .volume-hud__inner {
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scale(0.9);
    }

    .volume-hud.is-visible .volume-hud__inner {
      animation: hudArcIn 0.28s ease-out forwards;
    }

    .volume-hud.is-hiding .volume-hud__inner {
      animation: hudArcOut 0.4s ease-in forwards;
    }

    @keyframes hudArcIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes hudArcOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.94); }
    }

    .volume-hud__inner svg { width: 100%; height: 100%; display: block; overflow: visible; }

    .volume-hud__arc-track,
    .volume-hud__arc-fill {
      fill: none;
      stroke-width: 9;
      stroke-linecap: round;
    }
    .volume-hud__arc-track { stroke: rgba(255, 255, 255, 0.14); }
    .volume-hud__arc-fill {
      stroke: #ffffff;
      transition: stroke-dashoffset 0.15s ease;
    }
    .volume-hud.is-muted .volume-hud__arc-fill { stroke: #6b7280; }

    .volume-hud__label {
      position: absolute;
      left: 50%;
      top: 58px;
      transform: translateX(-50%);
      font: 600 22px/1 'Outfit', sans-serif;
      letter-spacing: 0.01em;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
    }
    .volume-hud.is-muted .volume-hud__label { color: #6b7280; }

    @media (max-width: 640px) {
      .volume-hud { bottom: 50px; width: 140px; height: 78px; margin-left: -70px; }
      .volume-hud__label { top: 45px; font-size: 19px; }
    }

    /* ══ Seek HUD — YouTube uslubida "ripple + chevron sweep" ══ */
    .seek-hud {
      position: absolute;
      top: 50%;
      z-index: 60;
      width: 108px; height: 108px;
      border-radius: 50%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: var(--glass-solid, rgba(12, 12, 14, 0.8));
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.03);
      color: #ffffff;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) scale(0.7);
      filter: blur(6px);
      transition: opacity 0.18s ease, filter 0.28s ease;
      overflow: visible;
    }
    .seek-hud--left  { left: 40px; }
    .seek-hud--right { right: 40px; }

    /* Tashqi kengayib-yo'qoluvchi halqa — "ripple" effekti */
    .seek-hud::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      opacity: 0;
      transform: scale(1);
      pointer-events: none;
    }
    .seek-hud.is-pulse::before {
      animation: seekRipple 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes seekRipple {
      0%   { opacity: 0.8; transform: scale(0.9); }
      100% { opacity: 0; transform: scale(1.35); }
    }

    .seek-hud.is-visible {
      opacity: 1;
      filter: blur(0px);
      transform: translateY(-50%) scale(1);
    }
    .seek-hud.is-pulse {
      animation: seekPulse 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes seekPulse {
      0%   { transform: translateY(-50%) scale(0.82); }
      55%  { transform: translateY(-50%) scale(1.1); }
      100% { transform: translateY(-50%) scale(1); }
    }
    .seek-hud.is-hiding {
      opacity: 0;
      filter: blur(8px);
      transform: translateY(-50%) scale(0.85);
      transition: opacity 0.35s ease, filter 0.4s ease, transform 0.4s ease;
    }

    /* Ketma-ket "sirg'anib o'tuvchi" 3 ta chevron — tezlik/harakat hissi uchun */
    .seek-hud__chevrons {
      display: flex;
      align-items: center;
      gap: -2px;
      color: #ffffff;
    }
    .seek-hud--left .seek-hud__chevrons {
      transform: scaleX(-1); /* orqaga — chevronlar chapga qarab "oqadi" */
    }
    .seek-hud__chevrons svg {
      width: 15px; height: 15px;
      margin-left: -5px;
      opacity: 0.25;
    }
    .seek-hud__chevrons svg:first-child { margin-left: 0; }
    .seek-hud.is-pulse .seek-hud__chevrons svg {
      animation: chevSweep 0.9s ease-in-out infinite;
    }
    .seek-hud.is-pulse .seek-hud__chevrons svg:nth-child(1) { animation-delay: 0ms; }
    .seek-hud.is-pulse .seek-hud__chevrons svg:nth-child(2) { animation-delay: 120ms; }
    .seek-hud.is-pulse .seek-hud__chevrons svg:nth-child(3) { animation-delay: 240ms; }
    @keyframes chevSweep {
      0%   { opacity: 0.25; transform: translateX(-3px); }
      35%  { opacity: 1;    transform: translateX(0); }
      70%  { opacity: 0.25; transform: translateX(3px); }
      100% { opacity: 0.25; transform: translateX(3px); }
    }

    .seek-hud__text {
      font: 700 18px/1 'Outfit', sans-serif;
      color: #f4f4f5;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 640px) {
      .seek-hud { width: 84px; height: 84px; }
      .seek-hud--left  { left: 18px; }
      .seek-hud--right { right: 18px; }
      .seek-hud__chevrons svg { width: 12px; height: 12px; }
      .seek-hud__text { font-size: 11.5px; }
    }

    /* ── Responsive: tablet ── */
    @media (max-width: 860px) {
      .watch-top-bar { padding: 12px 16px; }
      .related-section { padding: 24px 16px 0; }
    }

    /* ── Responsive: mobile (≤640px) ── */
    @media (max-width: 640px) {
      .watch-top-bar { padding: 10px 12px; gap: 10px; }
      .watch-top-title { font-size: 14.5px; }

      .player-controls { padding: 0 10px 12px; }
      .player-progress-wrap { margin-bottom: 10px; }
      .player-bar { gap: 0; }
      .player-ctrl-btn { padding: 6px 5px; }
      .player-ctrl-btn svg { width: 18px; height: 18px; }
      .player-time { font-size: 12.5px; padding: 0 6px; }
      /* Hide the volume slider on phones — keep the mute toggle */
      .player-vol-slider { display: none; }
      .player-center-btn { width: 70px; height: 70px; }
      .player-center-btn svg { width: 27px; height: 27px; }
      .psd-label-btn { min-width: 30px; font-size: 11.5px !important; }
      .player-settings-dd { min-width: 180px; }
      .player-rotate-btn { display: flex; }

      /* Mini pleyer telefonda ixchamroq va chekkalarga yaqinroq turadi */
      .player-wrapper.mini-mode {
        width: 224px;
        max-width: 64vw;
        right: 10px;
        bottom: 10px;
        border-radius: 12px;
      }
      .player-wrapper.mini-mode .player-ctrl-btn svg { width: 15px; height: 15px; }
      .player-wrapper.mini-mode .player-center-btn { width: 42px; height: 42px; }
      .player-wrapper.mini-mode .player-center-btn svg { width: 17px; height: 17px; }
      .mini-action-btn { width: 26px; height: 26px; }

      .related-section { padding: 20px 12px 0; }
      .episode-item { gap: 10px; padding: 9px 10px; }
      .ep-thumb { width: 68px; height: 42px; }
      .ep-num { width: 22px; font-size: 17px; }
      .ep-title { font-size: 13.5px; }
      .sub-overlay { max-width: 90%; }
    }

    /* ── Responsive: small phone (≤400px) ── */
    @media (max-width: 400px) {
      /* Drop the +10s/-10s skip buttons to avoid control overflow */
      .player-bar .player-ctrl-btn[onclick="skipBackHud()"],
      .player-bar .player-ctrl-btn[onclick="skipFwdHud()"] { display: none; }
      .player-ctrl-btn { padding: 6px 4px; }
      .watch-top-title { font-size: 13.5px; }
      .player-center-btn { width: 56px; height: 56px; }
      .player-center-btn svg { width: 22px; height: 22px; }
    }
  </style>
</head>

<body class="watch-page">
  <div class="watch-aurora-base"></div>
  <div class="watch-aurora-dynamic" id="watch-aurora-dynamic"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <!-- ── PLAYER ── -->
    <div class="player-wrapper" id="player-wrapper">
      <!-- ── TOP BAR (player ustida floating, boshqaruvlar bilan yashiriladi) ── -->
      <div class="watch-top-bar">
        <div class="watch-back" onclick="history.back()" title="Orqaga">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </div>
        <div style="flex:1;min-width:0">
          <div class="watch-top-title" id="watch-top-title">Yuklanmoqda…</div>
          <div class="watch-top-year" id="watch-top-year"></div>
        </div>
        <button class="btn-secondary" id="top-fav-btn" style="padding:7px 14px;font-size: 13.5px;" onclick="toggleFavAPI()">
          <span id="top-fav-icon"></span>
          <span id="top-fav-label">Saqlangan</span>
        </button>
      </div>

      <!-- O'lcham dastagi — yuqori-chap burchakdan cho'ziladi -->
      <div class="mini-resize-handle" id="mini-resize" title="O'lchamni o'zgartirish"></div>

      <!-- ── MINI REJIM tugmalari (faqat mini-mode'da ko'rinadi) ── -->
      <div class="mini-actions" id="mini-actions">
        <button class="mini-action-btn" onclick="toggleMiniPlayer()" title="Kattalashtirish">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
          </svg>
        </button>
        <button class="mini-action-btn" onclick="closeMiniPlayer()" title="Yopish">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
            stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <img class="player-bg" id="player-bg" src="" alt="">
      <div class="player-poster" id="player-poster-wrap">
        <img id="player-poster-img" src="" alt="" style="height:100%;width:auto;max-width:100%;object-fit:contain;">
      </div>
      <!-- Real video element — playsinline: iOS da fullscreen chiqmaydi -->
      <video id="real-player"
        style="display:none;"
        preload="metadata"
        playsinline
        webkit-playsinline
        x5-playsinline
        x5-video-player-type="h5"
        x5-video-player-fullscreen="false">
      </video>

      <!-- Custom subtitle overlay (VTT rendered in JS, not native <track>) -->
      <div class="sub-overlay" id="sub-overlay"></div>

      <!-- Volume HUD (ArrowUp/ArrowDown paytida chiqadi) — "Minimal Arc" -->
      <div id="volumeHud" class="volume-hud" aria-hidden="true">
        <div class="volume-hud__inner">
          <svg viewBox="0 0 180 100">
            <path class="volume-hud__arc-track" id="volumeArcTrack" d="M 25 90 A 65 65 0 1 1 155 90" />
            <path class="volume-hud__arc-fill" id="volumeArcFill" d="M 25 90 A 65 65 0 1 1 155 90" />
          </svg>
          <div class="volume-hud__label" id="volumeLabel">0%</div>
        </div>
      </div>

      <!-- Seek HUD (ArrowLeft/ArrowRight yoki +10/-10 tugmasi paytida chiqadi) -->
      <div id="seekHud" class="seek-hud" aria-hidden="true">
        <div class="seek-hud__text" id="seekHudText">10s</div>
        <div class="seek-hud__chevrons" id="seekHudChevrons">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59 13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59 13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59 13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </div>
      </div>

      <!-- Bottom gradient overlay -->
      <div class="player-grad-overlay"></div>

      <!-- Center play/pause -->
      <div class="player-center-btn" id="center-btn" onclick="togglePlay()">
        <div class="player-center-icon" id="center-icon">
          <svg id="center-svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
        </div>
      </div>

      <!-- Controls -->
      <div class="player-controls" id="player-controls">
        <div class="player-progress-wrap" id="progress-wrap" onclick="seekTo(event)">
          <div class="player-progress-buffered" id="progress-buffered" style="width:0%"></div>
          <div class="player-progress-fill" id="progress-fill"></div>
          <!-- YouTube kabi: surganda tepada kichik kadr + vaqt -->
          <div class="player-seek-preview" id="seek-preview">
            <video id="seek-preview-video" muted playsinline preload="none"></video>
            <div class="spv-time" id="seek-preview-time">0:00</div>
          </div>
        </div>
        <div class="player-bar">
          <button class="player-ctrl-btn" onclick="togglePlay()" title="Play/Pause">
            <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button class="player-ctrl-btn" onclick="skipBackHud()" title="-10s">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-4.08" /><text x="8" y="15" font-size="5" fill="currentColor"
                stroke="none">10</text>
            </svg>
          </button>
          <button class="player-ctrl-btn" onclick="skipFwdHud()" title="+10s">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-.49-4.08" /><text x="8" y="15" font-size="5" fill="currentColor"
                stroke="none">10</text>
            </svg>
          </button>
          <span class="player-time" id="player-time">0:00 / 0:00</span>
          <div class="player-spacer"></div>
          <div class="player-vol-wrap">
            <button class="player-ctrl-btn" onclick="toggleMute()" id="vol-btn">
              <svg id="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
              </svg>
            </button>
            <input class="player-vol-slider" type="range" min="0" max="100" value="80" id="vol-slider"
              oninput="setVol(this.value)">
          </div>
          <!-- ── Settings: Subtitle / Quality / Audio ── -->
          <div class="psd-group">

            <!-- Subtitle -->
            <div class="psd-btn-wrap" id="sub-wrap">
              <button class="player-ctrl-btn" onclick="togglePsd('sub-dd')" title="Subtitle">
                <div class="psd-cc-icon">CC</div>
              </button>
              <div class="player-settings-dd" id="sub-dd">
                <div class="psd-head">Subtitle</div>
                <div class="psd-item active" onclick="selectPsd(this,'sub-dd','sub-lbl','O\'chiq')">O'chiq</div>
                <div class="psd-item" onclick="selectPsd(this,'sub-dd','sub-lbl','O\'zbek')">O'zbek</div>
                <div class="psd-item" onclick="selectPsd(this,'sub-dd','sub-lbl','Rus')">Rus</div>
                <div class="psd-item" onclick="selectPsd(this,'sub-dd','sub-lbl','Ingliz')">Ingliz</div>
              </div>
            </div>

            <!-- Quality -->
            <div class="psd-btn-wrap" id="qual-wrap">
              <button class="player-ctrl-btn psd-label-btn" onclick="togglePsd('qual-dd')" title="Sifat">
                <span id="qual-lbl">4K</span>
              </button>
              <div class="player-settings-dd" id="qual-dd">
                <div class="psd-head">Sifat</div>
                <div class="psd-item" onclick="selectPsd(this,'qual-dd','qual-lbl','Avto')">Avto</div>
                <div class="psd-item active" onclick="selectPsd(this,'qual-dd','qual-lbl','4K')">Ultra HD 4K</div>
                <div class="psd-item" onclick="selectPsd(this,'qual-dd','qual-lbl','1080p')">Full HD 1080p</div>
                <div class="psd-item" onclick="selectPsd(this,'qual-dd','qual-lbl','720p')">HD 720p</div>
                <div class="psd-item" onclick="selectPsd(this,'qual-dd','qual-lbl','480p')">SD 480p</div>
              </div>
            </div>

            <!-- Audio -->
            <div class="psd-btn-wrap" id="audio-wrap">
              <button class="player-ctrl-btn" onclick="togglePsd('audio-dd')" title="Audio">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                </svg>
              </button>
              <div class="player-settings-dd" id="audio-dd">
                <div class="psd-head">Audio</div>
                <div class="psd-item active" onclick="selectPsd(this,'audio-dd','audio-lbl','Asl')">Asl nusxa</div>
                <div class="psd-item" onclick="selectPsd(this,'audio-dd','audio-lbl','O\'zbek')">O'zbek</div>
                <div class="psd-item" onclick="selectPsd(this,'audio-dd','audio-lbl','Rus')">Rus</div>
                <div class="psd-item" onclick="selectPsd(this,'audio-dd','audio-lbl','Ingliz')">Ingliz</div>
              </div>
            </div>

          </div>

          <!-- Multi-window: pleyerni alohida, doim ustida turuvchi oynaga o'tkazadi -->
          <button class="player-ctrl-btn player-mini-btn" id="mini-btn" onclick="toggleMiniPlayer()"
            title="Alohida oynada ochish (i)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2.5" />
              <rect x="12" y="12" width="8" height="6" rx="1.5" fill="currentColor" stroke="none" />
            </svg>
          </button>
          <button class="player-ctrl-btn player-rotate-btn" onclick="toggleFullscreen()" title="Rotate">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="13.5" height="9.5" rx="2" />
              <path d="M8.5 6.5A8.5 8.5 0 0 1 20.5 9" />
              <path d="M20.5 4v5h-5" />
            </svg>
          </button>
          <button class="player-ctrl-btn player-fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Mini rejimda pleyer o'rnini egallab turadi (sahifa sakramasligi uchun) -->
    <div class="player-placeholder" id="player-placeholder">
      <div class="player-placeholder__box">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="4" width="20" height="16" rx="2.5" />
          <rect x="12" y="12" width="8" height="6" rx="1.5" fill="currentColor" stroke="none" />
        </svg>
        <div>Alohida oynada ijro etilmoqda</div>
        <button class="btn-secondary" style="padding:7px 14px;font-size:13.5px" onclick="toggleMiniPlayer()">
          Sahifaga qaytarish
        </button>
      </div>
    </div>

    <!-- ── MOVIE INFO ── -->
    <div class="watch-info-section" id="watch-info"></div>

    <!-- ── EPISODES (series only) ── -->
    <div id="episodes-section"></div>

    <!-- ── RELATED ── -->
    <div class="related-section" id="related-section"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/aurora-color.js"></script>
  <script>
    App.initNavbar('', '../');

    const id = App.getParam('id');
    let movie = null;
    let relatedList = [];
    const videoEl = document.getElementById('real-player');

    /* ── "Davom ettirish" — saqlangan joydan davom etish + progress saqlash ── */
    (function initResumeAndProgress() {
      if (typeof ProgressAPI === 'undefined' || !id) return;
      let resumeApplied = false;
      let savedProgress = 0;

      ProgressAPI.get(id).then((data) => {
        savedProgress = data && data.progress > 5 ? data.progress : 0;
      });

      videoEl.addEventListener('loadedmetadata', function () {
        if (resumeApplied) return;
        resumeApplied = true;
        // Video oxiriga yaqin bo'lsa (95%+) — boshidan boshlaymiz, aks holda davom ettiramiz
        if (savedProgress > 0 && videoEl.duration && savedProgress < videoEl.duration * 0.95) {
          videoEl.currentTime = savedProgress;
        }
      });

      let lastSaved = 0;
      videoEl.addEventListener('timeupdate', function () {
        const now = videoEl.currentTime;
        if (Math.abs(now - lastSaved) < 15) return; // har ~15 soniyada bir marta saqlaymiz
        lastSaved = now;
        ProgressAPI.save(id, now, videoEl.duration || 0);
      });

      window.addEventListener('beforeunload', function () {
        if (videoEl.currentTime > 0) ProgressAPI.save(id, videoEl.currentTime, videoEl.duration || 0);
      });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden && videoEl.currentTime > 0) {
          ProgressAPI.save(id, videoEl.currentTime, videoEl.duration || 0);
        }
      });
    })();

    /* ── Series episodes (mavsumlarga bo'lingan) ── */
    let EPISODES = [];          // movie.episodeList
    let curSeason = 1;          // tanlangan mavsum
    let curEpKey = '';          // aktiv qism: "season-number"

    function initEpisodes(list) {
      EPISODES = (list || []).filter(e => e && e.videoUrl);
      if (!EPISODES.length) return;
      const seasons = [...new Set(EPISODES.map(e => e.season || 1))].sort((a, b) => a - b);
      curSeason = seasons[0];
      const first = EPISODES.filter(e => (e.season || 1) === curSeason)
        .sort((a, b) => (a.number || 0) - (b.number || 0))[0];
      if (first) curEpKey = `${first.season || 1}-${first.number || 1}`;
      renderEpisodesSection(seasons);
    }

    function renderEpisodesSection(seasons) {
      const eps = EPISODES
        .filter(e => (e.season || 1) === curSeason)
        .sort((a, b) => (a.number || 0) - (b.number || 0));
      const tabs = seasons.length > 1
        ? `<div class="season-tabs">${seasons.map(s =>
            `<button class="season-tab ${s === curSeason ? 'active' : ''}" onclick="selectSeason(${s})">${s}-Mavsum</button>`
          ).join('')}</div>`
        : '';
      document.getElementById('episodes-section').innerHTML = `
        <div class="episode-list">
          <div class="episode-list-title">Qismlar${seasons.length > 1 ? '' : ' · ' + curSeason + '-Mavsum'}</div>
          ${tabs}
          ${eps.map(ep => {
            const key = `${ep.season || 1}-${ep.number || 1}`;
            const active = key === curEpKey;
            const thumb = ep.thumb || movie.img;
            const title = ep.title || `${ep.number || 1}-qism`;
            return `
              <div class="episode-item ${active ? 'active' : ''}" onclick="playEp(${ep.season || 1}, ${ep.number || 1})">
                <div class="ep-num">${ep.number || 1}</div>
                <div class="ep-thumb"><img src="${thumb}" alt="${title}" loading="lazy" onerror="this.src='${movie.img}'"></div>
                <div class="ep-info">
                  <div class="ep-title"><span class="ep-title-num">${ep.number || 1}.</span>${title}</div>
                  <div class="ep-duration">${ep.duration || ''}</div>
                </div>
                ${active ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:rgba(255,255,255,0.5)"><path d="M8 5v14l11-7z"/></svg>` : ''}
              </div>`;
          }).join('')}
        </div>`;
    }

    window.selectSeason = function (s) {
      curSeason = s;
      const seasons = [...new Set(EPISODES.map(e => e.season || 1))].sort((a, b) => a - b);
      renderEpisodesSection(seasons);
    };

    /* CloudFront signed cookie orqali video himoyasi — /watch/:id/start
       chaqiriladi va shu S3 papka uchun 6 soatlik cookie olinadi. Xato
       bo'lsa (tizimga kirilmagan, CloudFront sozlanmagan va h.k.) asl
       (S3) manzil bilan davom etiladi — pleer har doim ishlab turadi. */
    async function loadAndInitVideo(rawUrl) {
      if (!rawUrl) return;
      let finalUrl = rawUrl;
      try {
        if (movie && typeof WatchAPI !== 'undefined' && typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
          const resp = await WatchAPI.start(movie.id, rawUrl);
          if (resp && resp.data && resp.data.videoUrl) finalUrl = resp.data.videoUrl;
        }
      } catch (e) { /* fallback — asl manzil bilan davom etamiz */ }
      videoEl.style.display = 'block';
      initVideo(finalUrl);
    }

    window.playEp = async function (season, number) {
      const ep = EPISODES.find(e => (e.season || 1) === season && (e.number || 1) === number);
      if (!ep) return;
      curEpKey = `${season}-${number}`;
      const seasons = [...new Set(EPISODES.map(e => e.season || 1))].sort((a, b) => a - b);
      renderEpisodesSection(seasons);
      /* Tanlangan qism videosini yuklash */
      await loadAndInitVideo(ep.videoUrl);
      videoEl.play().catch(() => {});
      showToast((ep.title || `${number}-qism`) + ' boshlanmoqda');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function renderWatchPage() {
      if (!movie) {
        document.getElementById('watch-info').innerHTML = '<p style="padding:40px 28px;color:rgba(255,255,255,0.4)">Film topilmadi. <a href="../index.html" style="color:#ffffff;text-decoration:underline">Bosh sahifaga qaytish</a></p>';
        return;
      }

      document.title = 'Tomosha: ' + movie.title + ' — CINEPLEX';

      /* ── Populate header ── */
      document.getElementById('watch-top-title').textContent = movie.title;
      document.getElementById('watch-top-year').textContent = movie.year + (movie.type === 'series' ? ` · ${movie.seasons} seasons` : ` · ${(movie.duration || '')}`);

      /* ── Populate player — bannerUrl ustunlik qiladi, aks holda poster ── */
      const watchPoster = movie.banner_img || movie.bannerUrl || movie.img || '';
      document.getElementById('player-bg').src = watchPoster;
      document.getElementById('player-poster-img').src = watchPoster;
      document.getElementById('player-poster-img').alt = movie.title;

      /* ── Real video: use videoUrl from backend ── */
      /* Serial bo'lsa, birinchi qism videosidan boshlaymiz */
      let videoUrl = movie.videoUrl || movie.video_url || '';
      if (movie.type === 'series' && Array.isArray(movie.episodeList) && movie.episodeList.length) {
        const firstEp = [...movie.episodeList]
          .filter(e => e && e.videoUrl)
          .sort((a, b) => (a.season || 1) - (b.season || 1) || (a.number || 0) - (b.number || 0))[0];
        if (firstEp) videoUrl = firstEp.videoUrl;
      }
      if (videoUrl) {
        loadAndInitVideo(videoUrl); // CloudFront himoyasi + HLS/MP4 ishga tushirish
      }

      /* ── Movie info section ── */
      const fav = isFavorite(movie.id);
      document.getElementById('top-fav-icon').innerHTML = fav ? App.icons.heartFill : App.icons.heart;
      document.getElementById('top-fav-label').textContent = fav ? 'In Watchlist' : 'Watchlist';
      document.getElementById('top-fav-btn').classList.toggle('active', fav);

      document.getElementById('watch-info').innerHTML = `
        <div class="watch-title">${movie.title}</div>
        <div class="watch-meta">
          <span>${movie.year || ''}</span><span>·</span>
          <span style="color:var(--gold);font-weight:600">★ ${movie.rating || 0} IMDB</span><span>·</span>
          <span>${movie.type === 'series' ? (movie.seasons || 1) + ' mavsum' : (movie.duration || '')}</span>
          ${(movie.genre || []).map(g => `<span style="background:rgba(255,255,255,0.07);padding:2px 9px;border-radius:50px;font-size: 12.5px">${g}</span>`).join('')}
        </div>
        <div class="watch-desc">${movie.description || ''}</div>
      `;

      /* ── Episodes (series) ── */
      if (movie.type === 'series' && Array.isArray(movie.episodeList) && movie.episodeList.length) {
        initEpisodes(movie.episodeList);
      }

      /* ── Related — bosh sahifadagi "Yangi chiqmalar" bilan bir xil:
         standart karta o'lchami, o'ngga drag-scroll, "Barchasini ko'rish" ── */
      const related = relatedList.slice(0, 18);
      if (related.length) {
        document.getElementById('related-section').innerHTML = `
          <div class="section-header">
            <div class="section-title">Shunga o'xshash</div>
            <a href="#" class="section-link" id="watch-related-toggle">Barchasini ko'rish</a>
          </div>
          <div class="movies-row" id="watch-related">${related.map(m => App.buildCard(m, '../')).join('')}</div>`;
        App.initDragScroll('watch-related');
        (function () {
          const toggle = document.getElementById('watch-related-toggle');
          const row = document.getElementById('watch-related');
          let expanded = false;
          toggle.addEventListener('click', function (e) {
            e.preventDefault();
            expanded = !expanded;
            row.classList.toggle('catalog-grid', expanded);
            row.classList.toggle('movies-row', !expanded);
            toggle.textContent = expanded ? 'Yopish' : "Barchasini ko'rish";
          });
        })();
      }
    }

    /* ── Load from API ── */
    (async () => {
      if (!movie && typeof MoviesAPI !== 'undefined') {
        try {
          const resp = await MoviesAPI.getById(id);
          movie = resp.movie;
          relatedList = resp.related || [];
        } catch {}
      }
      renderWatchPage();
      /* Tashqi VTT subtitle fayllarini darhol yuklash (MP4 va HLS uchun ham) */
      if (movie?.subtitles?.length) {
        buildSubtitleMenu([], movie.subtitles);
      }
    })();

    /* ═══ PLAYER LOGIC ═══ */

    let hls = null; // HLS.js instance (M3U8 streams)

    /* ── Helpers ── */
    function hasRealVideo() {
      return !!(hls) || !!(videoEl && videoEl.src && videoEl.src !== window.location.href && videoEl.src !== '');
    }

    /* ── URL sanitizer: removes stray " characters that get %22-encoded in HLS segment URLs ── */
    function sanitizeHlsUrl(url) {
      if (!url) return url;
      // Strip surrounding quotes (can appear if videoUrl was saved with quotes in DB)
      url = url.trim().replace(/^["']+|["']+$/g, '');
      // Remove any remaining encoded or literal double-quotes in the path
      // e.g. https://...belle/%22stream_Uzbek/... → https://...belle/stream_Uzbek/...
      url = url.replace(/%22/gi, '').replace(/"/g, '');
      return url;
    }

    /* ── Custom HLS.js loader that sanitizes every segment/playlist URL ──
       Root cause: HLS.js (especially @latest builds) sometimes fails to strip
       surrounding quotes from URI="..." attributes in #EXT-X-MEDIA tags,
       producing URLs like .../belle/%22stream_Uzbek/playlist.m3u8
       This loader strips %22 before each XHR request fires. ── */
    function buildSanitizingLoader() {
      const Base = Hls.DefaultConfig.loader;
      return class SanitizingLoader extends Base {
        load(context, config, callbacks) {
          if (context.url) context.url = sanitizeHlsUrl(context.url);
          super.load(context, config, callbacks);
        }
      };
    }

    /* ── HLS / MP4 video initializer ── */
    function initVideo(rawUrl) {
      // Destroy previous HLS instance if exists
      if (hls) { hls.destroy(); hls = null; }

      // Audio tanlash tugmasini boshda yashiramiz — faqat HLS'da bir nechta
      // audio trek topilsa buildAudioMenu uni ko'rsatadi (soxta menyu chiqmaydi)
      const _aw = document.getElementById('audio-wrap');
      if (_aw) _aw.style.display = 'none';

      // Strip any surrounding/embedded quotes from the stored videoUrl
      const url = sanitizeHlsUrl(rawUrl);
      if (!url) return;
      /* Seek-preview (kichik ekran) shu manbadan kadr oladi */
      window._cpVideoUrl = url;

      const isHLS = /\.m3u8/i.test(url) || url.includes('m3u8');

      if (isHLS) {
        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          hls = new Hls({
            enableWorker: true,
            startLevel: -1,
            capLevelToPlayerSize: false,   // o'lcham asosida sifatni cheklamaslik
            abrEwmaDefaultEstimate: 8e6,   // 8 Mbps deb hisoblaydi → 1080p dan boshlaydi
            loader: buildSanitizingLoader(),
          });
          hls.loadSource(url);
          hls.attachMedia(videoEl);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            videoEl.volume = 0.8;
            buildQualityMenu(hls.levels);
            buildAudioMenu(hls.audioTracks);
            // HLS ichidagi subtitle treklarini tashqi VTT bilan birlashtirish
            buildSubtitleMenu(hls.subtitleTracks, movie?.subtitles || []);
          });

          hls.on(Hls.Events.LEVEL_SWITCHED, (e, data) => {
            const lvl = hls.levels[data.level];
            const lbl = document.getElementById('qual-lbl');
            if (lbl && lvl) lbl.textContent = heightLabel(lvl.height);
            // Aktiv sifatni menudan ham yangilash
            document.querySelectorAll('#qual-dd .psd-item[data-lvl]').forEach(el => {
              el.classList.toggle('active', +el.dataset.lvl === data.level);
            });
          });

          hls.on(Hls.Events.ERROR, (e, data) => {
            if (!data.fatal) return;
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
            else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
            else { hls.destroy(); hls = null; }
          });

        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
          // Safari native HLS — url is already sanitized above
          videoEl.src = url;
          videoEl.volume = 0.8;
        }
      } else {
        // Plain MP4 / direct URL — url is already sanitized above
        videoEl.src = url;
        videoEl.volume = 0.8;
      }
    }

    /* ── Quality label helper ── */
    function heightLabel(h) {
      if (!h) return 'Avto';
      if (h >= 2160) return '4K';
      if (h >= 1440) return '1440p';
      if (h >= 1080) return '1080p';
      if (h >= 720)  return '720p';
      if (h >= 480)  return '480p';
      if (h >= 360)  return '360p';
      return h + 'p';
    }
    function heightFullLabel(h) {
      if (!h) return 'Avto';
      if (h >= 2160) return 'Ultra HD 4K';
      if (h >= 1440) return 'QHD 1440p';
      if (h >= 1080) return 'Full HD 1080p';
      if (h >= 720)  return 'HD 720p';
      if (h >= 480)  return 'SD 480p';
      return h + 'p';
    }

    /* ── Build dropdown menus from HLS tracks ── */
    function buildQualityMenu(levels) {
      if (!levels || !levels.length) return;
      const dd  = document.getElementById('qual-dd');
      const lbl = document.getElementById('qual-lbl');
      // Sort highest quality first
      const sorted = levels.map((l, i) => ({ ...l, origIndex: i }))
                           .sort((a, b) => (b.height || 0) - (a.height || 0));
      dd.innerHTML = `
        <div class="psd-head">Sifat</div>
        <div class="psd-item" onclick="setHlsQuality(-1)">Avto <span style="font-size: 11.5px;opacity:.5">AI tanlaydi</span></div>
        ${sorted.map(l => `
          <div class="psd-item" data-lvl="${l.origIndex}" onclick="setHlsQuality(${l.origIndex})">
            ${heightFullLabel(l.height)}
            ${l.bitrate ? `<span style="font-size: 11.5px;opacity:.45">${Math.round(l.bitrate/1000)}k</span>` : ''}
          </div>`).join('')}
      `;
      // Default: highest quality
      hls.currentLevel = sorted[0].origIndex;
      if (lbl) lbl.textContent = heightLabel(sorted[0].height);
      dd.querySelectorAll('.psd-item')[1]?.classList.add('active');
    }

    function buildAudioMenu(tracks) {
      const wrap = document.getElementById('audio-wrap');
      const dd = document.getElementById('audio-dd');
      // Bitta yoki undan kam audio trek bo'lsa — tanlash shart emas.
      // Soxta statik menyuni ko'rsatmaslik uchun butun tugmani yashiramiz.
      if (!tracks || tracks.length <= 1) {
        if (wrap) wrap.style.display = 'none';
        return;
      }
      if (wrap) wrap.style.display = '';
      dd.innerHTML = `
        <div class="psd-head">Audio</div>
        ${tracks.map((t, i) => `
          <div class="psd-item ${i === 0 ? 'active' : ''}" onclick="setHlsAudio(${t.id})">
            ${t.name || t.lang || 'Audio ' + (i + 1)}
          </div>`).join('')}
      `;
    }

    /* externalSubs = movie.subtitles massivi: [{lang, label, url}, ...] */
    function buildSubtitleMenu(hlsTracks, externalSubs) {
      // Avvalgi <track> elementlarni tozalash
      videoEl.querySelectorAll('track[data-ext-sub]').forEach(t => t.remove());

      // Tashqi VTT fayllarni <track> sifatida qo'shish (hidden holatda)
      (externalSubs || []).forEach((sub, idx) => {
        if (!sub.url) return;
        const tr = document.createElement('track');
        tr.kind     = 'subtitles';
        tr.src      = sub.url;
        tr.srclang  = sub.lang  || 'und';
        tr.label    = sub.label || sub.lang || ('Sub ' + (idx + 1));
        tr.dataset.extSub = idx;
        videoEl.appendChild(tr);
      });

      const dd = document.getElementById('sub-dd');
      const hlsItems = (hlsTracks || []).map(t => `
        <div class="psd-item" data-sub-type="hls" data-sub-id="${t.id}" onclick="setSubtitle('hls',${t.id})">
          ${t.name || t.lang || 'Sub'}
        </div>`).join('');

      const extItems = (externalSubs || []).filter(s => s.url).map((s, i) => `
        <div class="psd-item" data-sub-type="ext" data-sub-id="${i}" onclick="setSubtitle('ext',${i})">
          ${s.label || s.lang || ('Sub ' + (i + 1))}
        </div>`).join('');

      dd.innerHTML = `
        <div class="psd-head">Subtitle</div>
        <div class="psd-item active" onclick="setSubtitle('off',-1)">O'chiq</div>
        ${hlsItems}${extItems}
      `;
    }

    /* ── HLS switching controls ── */
    window.setHlsQuality = function(level) {
      if (!hls) return;
      // -1 = ABR auto; boshqa = foydalanuvchi tanladi → darhol o'zgartirish
      hls.currentLevel = level;
      const lbl = document.getElementById('qual-lbl');
      const name      = level === -1 ? 'Avto' : heightFullLabel(hls.levels[level]?.height);
      const shortName = level === -1 ? 'Avto' : heightLabel(hls.levels[level]?.height);
      if (lbl) lbl.textContent = shortName;
      document.querySelectorAll('#qual-dd .psd-item').forEach((el, i) => {
        el.classList.toggle('active', level === -1 ? i === 0 : el.dataset.lvl == level);
      });
      document.getElementById('qual-dd').classList.remove('open');
      showToast('Sifat: ' + name);
    };

    window.setHlsAudio = function(trackId) {
      if (!hls) return;
      hls.audioTrack = trackId;
      document.querySelectorAll('#audio-dd .psd-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick')?.includes('(' + trackId + ')'));
      });
      document.getElementById('audio-dd').classList.remove('open');
      const t = hls.audioTracks.find(t => t.id === trackId);
      showToast('Audio: ' + (t?.name || t?.lang || 'O\'zgartirildi'));
    };

    /* ══════════════════════════════════════════
       CUSTOM VTT SUBTITLE ENGINE
       Native <track> ishlatmaymiz — o'zimiz
       VTT ni parse qilib, overlay div ga render.
    ══════════════════════════════════════════ */

    let _subCues    = [];     // [{start, end, text}]
    let _subOn      = false;
    let _lastSubKey = '';     // DOM update ni kamaytirish uchun

    /* VTT vaqtini soniyaga aylantirish  "00:01:23.456" */
    function vttTimeToSec(s) {
      const p = s.trim().split(':');
      if (p.length === 3) return +p[0] * 3600 + +p[1] * 60 + parseFloat(p[2]);
      return +p[0] * 60 + parseFloat(p[1]);
    }

    /* VTT matnini parse qilish */
    function parseVTT(raw) {
      const cues = [];
      const lines = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split(/\n{2,}/);
      for (const block of lines) {
        const rows = block.trim().split('\n');
        const ti = rows.findIndex(l => /-->/.test(l));
        if (ti < 0) continue;
        const [a, b] = rows[ti].split('-->');
        const start = vttTimeToSec(a);
        const end   = vttTimeToSec(b.trim().split(/\s/)[0]);
        const text  = rows.slice(ti + 1).join('\n')
          .replace(/<[^>]+>/g, '')   // VTT/HTML tag lar
          .replace(/\{[^}]+\}/g, '') // ASS/SSA override
          .trim();
        if (text) cues.push({ start, end, text });
      }
      return cues;
    }

    /* timeupdate da chaqiriladi — overlay ni yangilash */
    function renderSubtitle() {
      const overlay = document.getElementById('sub-overlay');
      if (!overlay) return;
      if (!_subOn || !_subCues.length) {
        if (_lastSubKey) { overlay.innerHTML = ''; _lastSubKey = ''; }
        return;
      }
      const t   = videoEl.currentTime;
      const cue = _subCues.find(c => t >= c.start && t < c.end);
      const key = cue ? cue.text : '';
      if (key === _lastSubKey) return;   // o'zgarmagan — DOM ga tegmaymiz
      _lastSubKey = key;
      if (!key) { overlay.innerHTML = ''; return; }
      overlay.innerHTML = key
        .split('\n')
        .filter(Boolean)
        .map(l => `<span class="sub-line">${l}</span>`)
        .join('');
    }

    /* Subtitle tanlash (async — VTT fetch qiladi) */
    window.setSubtitle = async function(type, id) {
      // Video davom etayotganini saqlab qolish
      const wasPlaying = !videoEl.paused;
      // Native track larni o'chirish (to'xtatmasdan)
      Array.from(videoEl.textTracks).forEach(t => { t.mode = 'hidden'; });
      if (hls) hls.subtitleTrack = -1;

      // Overlay ni tozalash
      _subCues = []; _subOn = false; _lastSubKey = '';
      const overlay = document.getElementById('sub-overlay');
      if (overlay) overlay.innerHTML = '';

      let label = "O'chirildi";

      if (type === 'hls' && hls) {
        // HLS manifest subtitle (TYPE=SUBTITLES) — hls.js o'zi ko'rsatadi
        hls.subtitleTrack = id;
        const t = (hls.subtitleTracks || []).find(t => t.id === id);
        label = t?.name || t?.lang || 'Subtitle';

      } else if (type === 'ext') {
        const sub = (movie?.subtitles || [])[id];
        if (sub?.url) {
          label = sub.label || sub.lang || 'Subtitle';
          showToast('Subtitle yuklanmoqda…');
          try {
            const resp = await fetch(sub.url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const text = await resp.text();
            _subCues = parseVTT(text);
            _subOn   = true;
            // Fetch paytida video to'xtagan bo'lsa — qayta boshlash
            if (wasPlaying && videoEl.paused) videoEl.play().catch(() => {});
          } catch (e) {
            showToast('Subtitle yuklanmadi: ' + e.message);
            if (wasPlaying && videoEl.paused) videoEl.play().catch(() => {});
            return;
          }
        }
      }

      // Menudagi aktiv holatni yangilash
      document.querySelectorAll('#sub-dd .psd-item').forEach(el => {
        const t = el.dataset.subType;
        const i = el.dataset.subId != null ? +el.dataset.subId : null;
        el.classList.toggle('active',
          (type === 'off' && !t) ||
          (type === 'hls' && t === 'hls' && i === id) ||
          (type === 'ext' && t === 'ext' && i === id)
        );
      });
      document.getElementById('sub-dd').classList.remove('open');
      showToast('Subtitle: ' + label);
    };

    /* Eski nom bilan chaqirishlar uchun alias */
    window.setHlsSubtitle = (id) => window.setSubtitle(id === -1 ? 'off' : 'hls', id);

    function parseDuration(str) {
      if (!str) return 5400;
      const h = str.match(/(\d+)h/), m = str.match(/(\d+)m/);
      return (h ? +h[1] * 3600 : 0) + (m ? +m[1] * 60 : 0);
    }

    function fmtTime(s) {
      s = s || 0;
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
      return h > 0
        ? `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`
        : `${m}:${String(sec).padStart(2, '0')}`;
    }

    /* Fake-simulation state (used only when no real video src) */
    let playing  = false;
    let progress = 0;    // 0–100
    let duration = movie ? parseDuration(movie.duration) : 5400;
    let raf;
    let muted = false;

    /* ── UI updater ── */
    function updateUI() {
      const fill = document.getElementById('progress-fill');
      const time = document.getElementById('player-time');
      const buf  = document.getElementById('progress-buffered');

      if (hasRealVideo() && !isNaN(videoEl.duration)) {
        const cur = videoEl.currentTime || 0;
        const dur = videoEl.duration;
        const pct = dur > 0 ? (cur / dur * 100) : 0;
        /* Barmoq bilan surish paytida fill'ni timeupdate bosib yubormasin */
        if (fill && !window._cpSeekDragging) fill.style.width = pct + '%';
        if (time) time.textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
        if (buf && videoEl.buffered.length > 0) {
          const buffEnd = videoEl.buffered.end(videoEl.buffered.length - 1);
          buf.style.width = (buffEnd / dur * 100) + '%';
        }
      } else {
        if (fill) fill.style.width = progress + '%';
        if (time) time.textContent = fmtTime(progress / 100 * duration) + ' / ' + fmtTime(duration);
      }
    }

    /* ── Fake simulation tick (no real video) ── */
    function tick() {
      if (!playing || hasRealVideo()) return;
      progress = Math.min(progress + (100 / (duration * 60)), 100);
      updateUI();
      if (progress >= 100) { playing = false; updatePlayIcons(); return; }
      raf = requestAnimationFrame(tick);
    }

    function updatePlayIcons() {
      const playPath  = 'M8 5v14l11-7z';
      const pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
      [document.getElementById('play-icon'), document.getElementById('center-svg')].forEach(el => {
        if (el) el.querySelector('path').setAttribute('d', playing ? pausePath : playPath);
      });
      const cb = document.getElementById('center-btn');
      if (cb) cb.classList.toggle('playing', playing);
    }

    /* ── Real video event listeners ── */
    if (videoEl) {
      videoEl.volume = 0.8;

      videoEl.addEventListener('loadedmetadata', () => {
        duration = videoEl.duration;
        updateUI();
      });

      videoEl.addEventListener('timeupdate', updateUI);
      videoEl.addEventListener('timeupdate', renderSubtitle); // subtitle sync
      videoEl.addEventListener('progress',   updateUI); // buffered bar

      videoEl.addEventListener('play', () => {
        playing = true;
        updatePlayIcons();
        // Hide poster overlay once playback starts
        const poster = document.getElementById('player-poster-wrap');
        if (poster) poster.classList.add('hidden');
        // Show controls briefly then auto-hide
        showControls();
      });

      videoEl.addEventListener('pause', () => {
        playing = false;
        updatePlayIcons();
        clearTimeout(hideTimer);
        // Always show controls when paused
        const _pw = getPW();
        if (_pw) _pw.classList.add('show-ui');
      });

      videoEl.addEventListener('ended', () => {
        playing = false;
        updatePlayIcons();
        clearTimeout(hideTimer);
        const _pw = getPW();
        if (_pw) _pw.classList.add('show-ui');
      });
    }

    /* ── Controls ── */
    window.togglePlay = function () {
      if (hasRealVideo()) {
        if (videoEl.paused || videoEl.ended) videoEl.play().catch(() => {});
        else videoEl.pause();
      } else {
        playing = !playing;
        updatePlayIcons();
        if (playing) {
          cancelAnimationFrame(raf);
          tick();
          showControls(); // will auto-hide after 3s
        } else {
          cancelAnimationFrame(raf);
          clearTimeout(hideTimer);
          // Show controls permanently when paused
          const _pw = getPW();
          if (_pw) _pw.classList.add('show-ui');
        }
      }
    };

    window.seekTo = function (e) {
      const wrap = document.getElementById('progress-wrap');
      const rect = wrap.getBoundingClientRect();
      const pct  = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
      if (hasRealVideo()) {
        videoEl.currentTime = pct / 100 * (videoEl.duration || duration);
      } else {
        progress = pct;
        updateUI();
      }
      showControls();
    };

    /* ══════════════════════════════════════════
       SEEK DRAG + PREVIEW (YouTube kabi)
       Progress bar'ni qo'l/sichqoncha bilan surib seek qilish.
       Surish paytida tepada kichik ekranda o'sha joydagi kadr + vaqt
       ko'rinadi. Kadr uchun alohida yashirin <video> ishlatiladi
       (HLS bo'lsa eng past sifatda alohida hls.js instansi).
       perf-lite (kuchsiz qurilma)da kadr o'rniga faqat vaqt chiqadi.
    ══════════════════════════════════════════ */
    (function initSeekDrag() {
      const wrap    = document.getElementById('progress-wrap');
      const fill    = document.getElementById('progress-fill');
      const prev    = document.getElementById('seek-preview');
      const prevVid = document.getElementById('seek-preview-video');
      const prevLbl = document.getElementById('seek-preview-time');
      if (!wrap || !fill) return;

      let dragging = false;
      let previewHls = null, previewInit = false, previewOk = false;
      let lastFrameSeek = 0;

      /* Preview videoni birinchi ehtiyojda (lazy) tayyorlaymiz */
      function ensurePreview() {
        /* Mini rejimda kadr ko'rinmaydi — ikkinchi video oqimini ochmaymiz.
           previewInit belgilanmaydi: kattalashtirilganda odatdagidek tayyorlanadi. */
        if (previewInit || window.CP_LITE || (window.isMiniMode && window.isMiniMode())) return;
        previewInit = true;
        const src = window._cpVideoUrl;
        if (!src || !prevVid) return;
        try {
          if (/m3u8/i.test(src) && typeof Hls !== 'undefined' && Hls.isSupported()) {
            previewHls = new Hls({
              startLevel: 0,               /* eng past sifat — kadr uchun yetadi */
              capLevelToPlayerSize: true,
              maxBufferLength: 4,          /* uzun buffer keraksiz */
              loader: buildSanitizingLoader(),
            });
            previewHls.loadSource(src);
            previewHls.attachMedia(prevVid);
          } else {
            prevVid.preload = 'metadata';
            prevVid.src = src;
          }
          prevVid.muted = true;
          prevVid.addEventListener('loadeddata', function () { previewOk = true; }, { once: true });
        } catch (e) { /* kadr bo'lmasa vaqt puzirchasi qoladi */ }
      }

      function curDuration() {
        return (hasRealVideo() && !isNaN(videoEl.duration) && videoEl.duration)
          ? videoEl.duration : duration;
      }

      /* Pozitsiyani hisoblab preview'ni ko'rsatadi; pct (0–1) qaytaradi */
      function showAt(clientX) {
        const rect = wrap.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        const t    = pct * curDuration();

        if (dragging) fill.style.width = (pct * 100) + '%';

        if (prev) {
          prev.classList.add('visible');
          prev.classList.toggle('no-thumb', !previewOk);
          if (prevLbl) prevLbl.textContent = fmtTime(t);
          /* Puzircha bar chetidan chiqib ketmasin */
          const half = (prev.offsetWidth || 158) / 2;
          const x = Math.max(half, Math.min(rect.width - half, clientX - rect.left));
          prev.style.left = x + 'px';
          prev.style.transform = 'translateX(-50%)';
          /* Kadrni ~150ms dan tez-tez so'ramaymiz (dekoderni bo'g'masin) */
          const now = Date.now();
          if (previewOk && now - lastFrameSeek > 150 && Math.abs((prevVid.currentTime || 0) - t) > 0.5) {
            lastFrameSeek = now;
            try { prevVid.currentTime = t; } catch (e) {}
          }
        }
        return pct;
      }

      function hidePreview() {
        if (prev) prev.classList.remove('visible');
      }

      wrap.addEventListener('pointerdown', function (e) {
        dragging = true;
        window._cpSeekDragging = true;
        wrap.classList.add('seeking');
        ensurePreview();
        try { wrap.setPointerCapture(e.pointerId); } catch (err) {}
        showAt(e.clientX);
        showControls();
        e.preventDefault();
      });

      wrap.addEventListener('pointermove', function (e) {
        if (dragging) { showAt(e.clientX); showControls(); }
        else if (e.pointerType === 'mouse') {
          /* Desktop hover — YouTube kabi kursor ostidagi kadr ko'rinadi */
          ensurePreview();
          showAt(e.clientX);
        }
      });

      function endDrag(e) {
        if (!dragging) return;
        dragging = false;
        window._cpSeekDragging = false;
        wrap.classList.remove('seeking');
        const pct = showAt(e.clientX);
        const dur = curDuration();
        if (hasRealVideo() && dur) videoEl.currentTime = pct * dur;
        else { progress = pct * 100; updateUI(); }
        hidePreview();
        showControls();
      }

      wrap.addEventListener('pointerup', endDrag);
      wrap.addEventListener('pointercancel', function () {
        dragging = false;
        window._cpSeekDragging = false;
        wrap.classList.remove('seeking');
        hidePreview();
      });
      wrap.addEventListener('pointerleave', function () {
        if (!dragging) hidePreview();
      });
    })();
