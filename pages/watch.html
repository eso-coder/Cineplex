    window.skipBack = function () {
      if (hasRealVideo()) videoEl.currentTime = Math.max(0, videoEl.currentTime - 10);
      else { progress = Math.max(0, progress - (10 / duration * 100)); updateUI(); }
      showControls();
    };

    window.skipFwd = function () {
      if (hasRealVideo()) videoEl.currentTime = Math.min(videoEl.duration || duration, videoEl.currentTime + 10);
      else { progress = Math.min(100, progress + (10 / duration * 100)); updateUI(); }
      showControls();
    };

    window.toggleMute = function () {
      if (hasRealVideo()) { videoEl.muted = !videoEl.muted; muted = videoEl.muted; }
      else muted = !muted;
      document.getElementById('vol-icon').style.opacity = muted ? '0.35' : '1';
      const vs = document.getElementById('vol-slider');
      if (vs) vs.value = muted ? 0 : 80;
    };

    window.setVol = function (v) {
      if (hasRealVideo()) { videoEl.volume = v / 100; videoEl.muted = +v === 0; }
      muted = +v === 0;
      document.getElementById('vol-icon').style.opacity = muted ? '0.35' : '1';
    };

    /* ══════════════════════════════════════════
       VOLUME HUD — "Minimal Arc"
       ArrowUp/ArrowDown/M paytida chiqadigan ovoz balandligi ko'rsatkichi.
    ══════════════════════════════════════════ */
    const volumeHud     = document.getElementById('volumeHud');
    const volumeArcFill = document.getElementById('volumeArcFill');
    const volumeLabel   = document.getElementById('volumeLabel');

    // Arc path uzunligini bir marta o'lchab olamiz — fill matematikasi aniq bo'lishi uchun
    const VOL_ARC_LEN = volumeArcFill ? volumeArcFill.getTotalLength() : 0;
    if (volumeArcFill) {
      volumeArcFill.style.strokeDasharray = `${VOL_ARC_LEN}`;
      volumeArcFill.style.strokeDashoffset = `${VOL_ARC_LEN}`;
    }

    let hudHideTimer = null;

    function showVolumeHud(vol, isMuted) {
      if (!volumeHud) return;
      const pct = isMuted ? 0 : Math.max(0, Math.min(100, vol));
      volumeArcFill.style.strokeDashoffset = `${VOL_ARC_LEN * (1 - pct / 100)}`;
      volumeLabel.textContent = isMuted ? 'MUTE' : Math.round(pct) + '%';
      volumeHud.classList.toggle('is-muted', isMuted || vol === 0);

      volumeHud.classList.remove('is-hiding');
      volumeHud.classList.add('is-visible');
      volumeHud.setAttribute('aria-hidden', 'false');

      clearTimeout(hudHideTimer);
      hudHideTimer = setTimeout(() => {
        volumeHud.classList.remove('is-visible');
        volumeHud.classList.add('is-hiding');
        volumeHud.setAttribute('aria-hidden', 'true');
      }, 1100);
    }

    /* ArrowUp/ArrowDown → real videoEl yoki soxta simulyatsiya holatini o'zgartiradi,
       so'ng mavjud vol-slider/vol-icon bilan sinxronlab HUD'ni ko'rsatadi. */
    window.adjustVolumeHud = function (deltaPercent) {
      const vs  = document.getElementById('vol-slider');
      const cur = hasRealVideo() ? (videoEl.muted ? 0 : videoEl.volume * 100) : (vs ? +vs.value : 80);
      const next = Math.max(0, Math.min(100, Math.round(cur + deltaPercent)));
      setVol(next);
      if (vs) vs.value = next;
      showVolumeHud(next, next === 0);
    };

    /* ══════════════════════════════════════════
       SEEK HUD — +10s / -10s ko'rsatkichi
       Tez-tez bosilsa soniyalar jamlanib ko'rsatiladi (YouTube uslubida).
    ══════════════════════════════════════════ */
    let seekHudHideTimer = null;
    let seekAccum = 0;
    let seekDir   = 0; // -1 orqaga, +1 oldinga

    function showSeekHud(deltaSeconds) {
      const hud  = document.getElementById('seekHud');
      const text = document.getElementById('seekHudText');
      if (!hud) return;
      const dir = deltaSeconds > 0 ? 1 : -1;
      if (dir !== seekDir) { seekAccum = 0; seekDir = dir; }
      seekAccum += Math.abs(deltaSeconds);

      hud.classList.toggle('seek-hud--left', dir < 0);
      hud.classList.toggle('seek-hud--right', dir > 0);
      text.textContent = seekAccum + 's';

      hud.classList.remove('is-hiding', 'is-pulse');
      void hud.offsetWidth; // reflow — pulse animatsiyasini qayta boshlash uchun
      hud.classList.add('is-visible', 'is-pulse');
      hud.setAttribute('aria-hidden', 'false');

      clearTimeout(seekHudHideTimer);
      seekHudHideTimer = setTimeout(() => {
        hud.classList.remove('is-visible');
        hud.classList.add('is-hiding');
        hud.setAttribute('aria-hidden', 'true');
        seekAccum = 0; seekDir = 0;
      }, 700);
    }

    window.skipBackHud = function () { skipBack(); showSeekHud(-10); };
    window.skipFwdHud  = function () { skipFwd();  showSeekHud(10); };

    /* ══════════════════════════════════════════
       MINI PLAYER (multi-screen)
       Pleyerni kichik oynaga o'tkazadi — video to'xtamaydi, sifat/subtitr/
       audio holati saqlanib qoladi.
    ══════════════════════════════════════════ */

    /* PiP oynasi ochiq bo'lsa, pleyer BOSHQA hujjatda turadi va asosiy
       document.getElementById(...) uni TOPA OLMAYDI. Shu sabab hamma joyda
       shu yordamchi ishlatiladi. */
    let pipWin = null;
    function getPW() {
      return document.getElementById('player-wrapper') ||
             (pipWin && pipWin.document.getElementById('player-wrapper')) || null;
    }

    window.isMiniMode = function () {
      return getPW()?.classList.contains('mini-mode') || false;
    };

    /* Mini oyna o'lchami/joylashuvi chegaralari */
    const MINI_MIN_W = 180;   // undan kichikda boshqaruvlar sig'maydi
    const MINI_MAX_W = 720;
    const MINI_EDGE  = 8;     // ekran chetidan minimal masofa

    /* Foydalanuvchi surgan/o'lchagan holat — sessiya davomida eslab qolinadi,
       shunda mini rejimga qayta kirilganda oyna o'sha joyda ochiladi. */
    let _miniSaved   = null;  // {left, top, width}
    let _miniDragged = false; // surishdan keyingi "click" play/pause qilmasligi uchun

    const miniClamp = (v, min, max) => Math.min(Math.max(v, min), Math.max(min, max));

    /* CSS'dagi right/bottom joylashuvini inline left/top ga o'tkazadi —
       surish uchun bitta izchil model kerak. max-width ham olib tashlanadi,
       aks holda CSS va JS o'lcham ustida "kurashadi". */
    function miniMaterialize(el) {
      if (el.style.left) return;
      const r = el.getBoundingClientRect();
      el.style.width    = r.width + 'px';
      el.style.maxWidth = 'none';
      el.style.left     = r.left + 'px';
      el.style.top      = r.top + 'px';
      el.style.right    = 'auto';
      el.style.bottom   = 'auto';
    }

    /* Saqlangan holatni (yoki oyna o'lchami o'zgargach mavjud holatni)
       ekran ichida ushlab turadi */
    function miniApplyRect(el, rect) {
      if (!rect) return;
      const w = miniClamp(rect.width, MINI_MIN_W, Math.min(MINI_MAX_W, innerWidth - 2 * MINI_EDGE));
      const h = w * 9 / 16;
      el.style.width    = w + 'px';
      el.style.maxWidth = 'none';
      el.style.right    = 'auto';
      el.style.bottom   = 'auto';
      el.style.left     = miniClamp(rect.left, MINI_EDGE, innerWidth  - w - MINI_EDGE) + 'px';
      el.style.top      = miniClamp(rect.top,  MINI_EDGE, innerHeight - h - MINI_EDGE) + 'px';
    }

    /* Inline joylashuvni butunlay tozalash — mini rejimdan chiqqanda SHART,
       aks holda fixed/left/top qiymatlari oddiy (katta) pleyerga o'tib ketadi. */
    function miniClearInline(el) {
      ['left', 'top', 'width', 'right', 'bottom', 'maxWidth'].forEach(p => { el.style[p] = ''; });
    }

    /* ── Sahifa ichidagi mini oyna (zaxira yo'l) ── */
    function enterInlineMini(el) {
      // Fullscreen va mini rejim birga ishlamaydi — avval fullscreen'dan chiqamiz
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
      el.classList.remove('pseudo-fs');
      document.body.classList.remove('player-fs-lock');
      el.classList.add('mini-mode');
      document.body.classList.add('mini-active');
      miniApplyRect(el, _miniSaved);   // oldingi joy/o'lcham bo'lsa — tiklaymiz
      // Kirish animatsiyasi — bir marta o'ynab, klass olib tashlanadi
      el.classList.add('mini-enter');
      el.addEventListener('animationend', function onEnd(ev) {
        if (ev.animationName !== 'miniIn') return;
        el.classList.remove('mini-enter');
        el.removeEventListener('animationend', onEnd);
      });
    }

    function exitInlineMini(el) {
      // Joriy holatni eslab qolamiz, so'ng inline stillarni tozalaymiz
      if (el.style.left) {
        _miniSaved = {
          left:  parseFloat(el.style.left),
          top:   parseFloat(el.style.top),
          width: parseFloat(el.style.width),
        };
      }
      miniClearInline(el);
      el.classList.remove('mini-mode', 'mini-enter', 'is-dragging', 'is-resizing');
      document.body.classList.remove('mini-active');
    }

    /* ══════════════════════════════════════════
       MULTI-WINDOW — Document Picture-in-Picture
       Haqiqiy alohida OS oynasi: brauzerdan chiqilsa yoki u yig'ilsa ham
       ekranda "pin" bo'lib, boshqa dasturlar USTIDA qoladi; chetlaridan
       istalgancha cho'ziladi. Sahifa ichidagi div buni QILA OLMAYDI —
       u brauzer oynasidan chiqa olmaydi.
       Chrome/Edge 116+. Qo'llab-quvvatlanmasa (Safari/Firefox) — yuqoridagi
       sahifa ichidagi mini oynaga qaytamiz.
    ══════════════════════════════════════════ */
    const PIP_SUPPORTED = 'documentPictureInPicture' in window;

    /* Inline onclick="..." lar element hujjatining GLOBAL obyektida qidiriladi.
       PiP — boshqa hujjat, shuning uchun kerakli funksiyalarni unga ulaymiz,
       aks holda PiP ichidagi barcha tugmalar ishlamay qoladi. */
    const PIP_BRIDGE_FNS = [
      'togglePlay', 'seekTo', 'skipBackHud', 'skipFwdHud', 'toggleMute', 'setVol',
      'togglePsd', 'selectPsd', 'setHlsQuality', 'setHlsAudio', 'setSubtitle',
      'setHlsSubtitle', 'toggleFullscreen', 'toggleMiniPlayer', 'closeMiniPlayer',
    ];

    /* Pleyerni boshqa hujjatga ko'chirish (yoki qaytarish).
       HTML spetsifikatsiyasiga ko'ra media element boshqa hujjatga
       "adopt" qilinganda to'xtab qolishi mumkin. Chrome'ning PiP oynasi
       odatda ijroni saqlaydi, lekin BUNGA TAYANMAYMIZ — ko'chirishdan
       oldingi holatni o'lchab, kerak bo'lsa qaytaramiz. */
    function moveKeepingPlayback(insert) {
      const wasPlaying = videoEl && !videoEl.paused;
      const t = videoEl ? videoEl.currentTime : 0;
      insert();
      if (!videoEl || !wasPlaying || !videoEl.paused) return;
      if (t > 0 && Math.abs(videoEl.currentTime - t) > 0.5) {
        try { videoEl.currentTime = t; } catch (e) { /* seek imkonsiz — davom etamiz */ }
      }
      videoEl.play().catch(() => {});
    }

    /* PiP hujjatida CSS yo'q — barcha stillarni ko'chiramiz */
    function pipCopyStyles(win) {
      [...document.styleSheets].forEach(sheet => {
        try {
          const css = [...sheet.cssRules].map(r => r.cssText).join('');
          const style = win.document.createElement('style');
          style.textContent = css;
          win.document.head.appendChild(style);
        } catch (e) {
          /* CORS bilan yopiq tashqi fayl (masalan Google Fonts) — <link> orqali */
          if (!sheet.href) return;
          const link = win.document.createElement('link');
          link.rel = 'stylesheet';
          link.href = sheet.href;
          win.document.head.appendChild(link);
        }
      });
    }

    async function openPipWindow(el) {
      const w = Math.round(_miniSaved?.width || 480);
      pipWin = await documentPictureInPicture.requestWindow({
        width:  w,
        height: Math.round(w * 9 / 16),
      });

      pipCopyStyles(pipWin);
      PIP_BRIDGE_FNS.forEach(n => {
        if (typeof window[n] === 'function') pipWin[n] = window[n];
      });

      pipWin.document.body.classList.add('watch-page', 'pip-body');
      // Pleyerni butunligicha ko'chiramiz — video, boshqaruvlar, subtitr
      // overlay'i va sozlama menyulari birga ketadi (native PiP'da bular yo'q).
      // Ko'chirish ijroni to'xtatib qo'ysa — moveKeepingPlayback qaytaradi.
      moveKeepingPlayback(() => pipWin.document.body.append(el));
      el.classList.add('pip-mode');
      document.body.classList.add('mini-active');   // sahifada placeholder chiqsin

      /* Sozlama menyulari PiP ichida ham tashqariga bosilganda yopilsin
         (asosiy hujjatdagi listener bu yerda ishlamaydi) */
      pipWin.document.addEventListener('click', e => {
        if (!e.target.closest('.psd-btn-wrap'))
          pipWin.document.querySelectorAll('.player-settings-dd').forEach(dd => dd.classList.remove('open'));
      });
      /* Klaviatura yorliqlari PiP oynasi fokusda bo'lganda ham ishlasin */
      pipWin.document.addEventListener('keydown', onPlayerKeydown);

      /* Oyna yopilganda (foydalanuvchi X bosdi yoki "orqaga qaytish") —
         pleyerni sahifadagi asl joyiga qaytaramiz. */
      pipWin.addEventListener('pagehide', () => { restoreFromPip(); });

      showControls();
    }

    /* Pleyerni PiP oynasidan sahifaga qaytarish. Placeholder DOM'da aynan
       pleyerdan keyin turadi — shuning uchun before() asl joyni tiklaydi. */
    function restoreFromPip() {
      const el = getPW();
      if (el) {
        el.classList.remove('pip-mode');
        moveKeepingPlayback(() => document.getElementById('player-placeholder').before(el));
      }
      document.body.classList.remove('mini-active');
      document.getElementById('mini-btn')?.classList.remove('active-ctrl');
      pipWin = null;
      showControls();
    }

    window.isPipOpen = function () { return !!pipWin; };

    /* Tugma/'i' → PiP oynasini ochadi; imkoni bo'lmasa sahifa ichidagi mini. */
    window.toggleMiniPlayer = async function () {
      const el = getPW();
      if (!el) return;

      // 1) PiP oynasi ochiq bo'lsa — yopamiz (pagehide o'zi qaytaradi)
      if (pipWin) { pipWin.close(); return; }

      // 2) Sahifa ichidagi mini ochiq bo'lsa — chiqamiz
      if (el.classList.contains('mini-mode')) {
        exitInlineMini(el);
        document.getElementById('mini-btn')?.classList.remove('active-ctrl');
        showControls();
        return;
      }

      // 3) Yangi oyna ochamiz
      document.querySelectorAll('.player-settings-dd').forEach(dd => dd.classList.remove('open'));
      if (PIP_SUPPORTED) {
        try {
          await openPipWindow(el);
          document.getElementById('mini-btn')?.classList.add('active-ctrl');
          return;
        } catch (e) {
          /* Foydalanuvchi rad etdi yoki oyna ochilmadi — zaxira yo'l bilan
             davom etamiz (pleyer sahifada qolgan bo'lishi kerak). */
          pipWin = null;
          if (el.classList.contains('pip-mode')) restoreFromPip();
        }
      }
      enterInlineMini(el);
      document.getElementById('mini-btn')?.classList.add('active-ctrl');
      showControls();
    };

    /* Yopish: oynadan chiqadi va videoni to'xtatadi */
    window.closeMiniPlayer = function () {
      if (hasRealVideo()) videoEl.pause();
      else { playing = false; updatePlayIcons(); }
      const el = getPW();
      if (pipWin) { pipWin.close(); return; }
      if (el && el.classList.contains('mini-mode')) {
        exitInlineMini(el);
        document.getElementById('mini-btn')?.classList.remove('active-ctrl');
      }
    };

    /* ══ Mini oynani SURISH va O'LCHAMINI o'zgartirish ══
       Surish: oynaning istalgan joyidan (tugmalar va boshqaruvlardan tashqari).
       O'lcham: yuqori-chap dastagi — pastki-o'ng burchak qotib turadi,
       nisbat 16:9 saqlanadi (CSS aspect-ratio balandlikni o'zi hisoblaydi). */
    (function initMiniDragResize() {
      const el = document.getElementById('player-wrapper');
      const handle = document.getElementById('mini-resize');
      if (!el || !handle) return;

      let mode = null;          // 'drag' | 'resize'
      let sx = 0, sy = 0;
      let start = null;

      function onDown(e, m) {
        if (!el.classList.contains('mini-mode')) return;
        if (e.button != null && e.button !== 0) return;   // faqat chap tugma
        // Kirish animatsiyasidagi transform (scale/translate) o'lchovni buzadi —
        // klassni olib tashlab, oynani yakuniy holatiga qo'yamiz, keyin o'lchaymiz.
        el.classList.remove('mini-enter');
        miniMaterialize(el);

        const r = el.getBoundingClientRect();
        start = { left: r.left, top: r.top, right: r.right, bottom: r.bottom, width: r.width };
        sx = e.clientX; sy = e.clientY;
        mode = m;
        _miniDragged = false;
        el.classList.add(m === 'drag' ? 'is-dragging' : 'is-resizing');

        // Dastakda preventDefault xavfsiz; surishda YO'Q — touch'da u
        // keyingi "click" (play/pause) hodisasini yo'q qilib yuboradi.
        if (m === 'resize') e.preventDefault();

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
      }

      function onMove(e) {
        if (!mode) return;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) _miniDragged = true;

        if (mode === 'drag') {
          const h = start.bottom - start.top;
          el.style.left = miniClamp(start.left + dx, MINI_EDGE, innerWidth  - start.width - MINI_EDGE) + 'px';
          el.style.top  = miniClamp(start.top  + dy, MINI_EDGE, innerHeight - h - MINI_EDGE) + 'px';
        } else {
          // Kenglik kursor bilan birga o'sadi; chegaralar oyna ekrandan
          // chiqib ketmasligini kafolatlaydi (pastki-o'ng burchak qotgan).
          const maxW = Math.min(
            MINI_MAX_W,
            start.right - MINI_EDGE,                    // chapga chiqib ketmasin
            (start.bottom - MINI_EDGE) * 16 / 9,        // tepaga chiqib ketmasin
            innerWidth - 2 * MINI_EDGE
          );
          const w = miniClamp(start.right - e.clientX, MINI_MIN_W, maxW);
          el.style.width = w + 'px';
          el.style.left  = (start.right  - w) + 'px';
          el.style.top   = (start.bottom - w * 9 / 16) + 'px';
        }
        showControls();
      }

      function onUp() {
        if (!mode) return;
        mode = null;
        el.classList.remove('is-dragging', 'is-resizing');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onUp);
        // _miniDragged'ni bu yerda tozalamaymiz — undan keyin keladigan
        // "click" hodisasi uni o'zi o'qib, o'chiradi (play/pause bo'lmasin).
      }

      el.addEventListener('pointerdown', e => {
        if (!el.classList.contains('mini-mode')) return;
        // Boshqaruvlar, tugmalar va dastak o'z vazifasini bajarsin
        if (e.target.closest('.player-controls') ||
            e.target.closest('.mini-action-btn') ||
            e.target.closest('.mini-resize-handle')) return;
        onDown(e, 'drag');
      });
      handle.addEventListener('pointerdown', e => onDown(e, 'resize'));

      /* Brauzer oynasi kichraysa — mini oyna ko'rinmay qolmasin */
      window.addEventListener('resize', () => {
        if (!el.classList.contains('mini-mode') || !el.style.left) return;
        miniApplyRect(el, {
          left:  parseFloat(el.style.left),
          top:   parseFloat(el.style.top),
          width: parseFloat(el.style.width),
        });
      });
    })();

    window.toggleFullscreen = async function () {
      const el = getPW();
      // Mini rejimda fullscreen'ga o'tishdan oldin pleyerni sahifaga qaytaramiz
      if (el && el.classList.contains('mini-mode')) toggleMiniPlayer();
      const reqFs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      // iOS: <div> uchun haqiqiy fullscreen YO'Q. VIDEO elementining native
      // fullscreen'i — HAQIQIY to'liq ekran (ikkala orientatsiyada), boshqaruvlar
      // PASTDA (native), subtitr <track> va til (audio trek) native CC/audio
      // tugmasida ko'rinadi. Bu — iOS'dagi yagona to'g'ri "haqiqiy fullscreen".
      if (isIOS && videoEl && typeof videoEl.webkitEnterFullscreen === 'function') {
        try { videoEl.webkitEnterFullscreen(); return; } catch (e) {}
      }

      // Android / desktop: haqiqiy div-fullscreen (custom boshqaruvlar saqlanadi)
      if (reqFs) {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          try {
            el.classList.remove('fs-grow');
            void el.offsetWidth;
            el.classList.add('fs-grow');
            await reqFs.call(el);
            // Mobilda video landscape (gorizontal)ga aylanadi — ekran to'liq qoplanadi
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(() => {});
            }
            if (typeof showControls === 'function') showControls();
          } catch(e) {}
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen).call(document);
        }
        return;
      }

      // Oxirgi chora (haqiqiy fullscreen ham, native ham yo'q): CSS pseudo-fullscreen
      const on = el.classList.toggle('pseudo-fs');
      document.body.classList.toggle('player-fs-lock', on);
      if (on) {
        el.classList.remove('fs-grow');
        void el.offsetWidth;
        el.classList.add('fs-grow');
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
        if (typeof showControls === 'function') showControls();
      } else if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
      }
    };

    // Fullscreendan tashqaridan chiqilganda ham orientatsiyani qaytarish
    document.addEventListener('fullscreenchange', function () {
      if (!document.fullscreenElement) {
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      }
    });
    document.addEventListener('webkitfullscreenchange', function () {
      if (!document.webkitFullscreenElement) {
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      }
    });

    /* ── Settings dropdowns ── */
    window.togglePsd = function (id) {
      document.querySelectorAll('.player-settings-dd').forEach(dd => {
        if (dd.id !== id) dd.classList.remove('open');
      });
      document.getElementById(id).classList.toggle('open');
    };

    window.selectPsd = function (el, ddId, lblId, val) {
      el.parentElement.querySelectorAll('.psd-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      const lbl = document.getElementById(lblId);
      if (lbl) lbl.textContent = val;
      document.getElementById(ddId).classList.remove('open');
      const type = ddId === 'sub-dd' ? 'Subtitle' : ddId === 'qual-dd' ? 'Sifat' : 'Audio';
      showToast(type + ': ' + val);
    };

    document.addEventListener('click', e => {
      if (!e.target.closest('.psd-btn-wrap'))
        document.querySelectorAll('.player-settings-dd').forEach(dd => dd.classList.remove('open'));
    });

    /* ── Auto-hide controls (show-ui class on wrapper) ── */
    let hideTimer;
    function showControls() {
      const pw = getPW();
      if (!pw) return;
      pw.classList.add('show-ui');
      clearTimeout(hideTimer);
      // Playing → auto-hide after 3s of inactivity
      // Paused  → keep controls visible permanently
      if (playing) {
        hideTimer = setTimeout(() => {
          if (playing) pw.classList.remove('show-ui');
        }, 3000);
      }
    }

    function hideControls() {
      if (!playing) return; // never hide when paused
      const pw = getPW();
      if (pw) pw.classList.remove('show-ui');
    }

    const pw = document.getElementById('player-wrapper');
    if (pw) {
      // Show controls on page load (video starts paused)
      pw.classList.add('show-ui');

      pw.addEventListener('mousemove', showControls);
      pw.addEventListener('mouseleave', () => {
        if (playing) {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(hideControls, 1000);
        }
      });
      // Video maydoniga teginish: mobilda boshqaruv yashiringan bo'lsa — avval
      // uni ko'rsatadi (3s keyin yana yashirinadi); ko'rinib turganda play/pause.
      // Desktopda esa har doim play/pause (sichqoncha mousemove bilan ko'rsatadi).
      const isTouchDev = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

      /* Mobilda: ekranning chap/o'ng yarmiga qo'sh-bosish → 10s orqaga/oldinga.
         Bitta bosish (play/pause yoki boshqaruvlarni ko'rsatish) DOUBLE_TAP_MS
         kechiktiriladi — shu vaqt ichida ikkinchi bosish kelsa, seek ishga tushadi
         va yagona-bosish harakati bekor qilinadi. */
      const DOUBLE_TAP_MS = 300;
      let lastTapTime = 0;
      let lastTapSide = null;
      let tapTimer = null;

      pw.addEventListener('click', e => {
        // Mini oyna surilgan/o'lchangan bo'lsa — bu "click" surishning davomi,
        // play/pause qilmaymiz (bayroqni shu yerda o'qib, tozalaymiz).
        if (_miniDragged) { _miniDragged = false; return; }
        if (e.target.closest('.player-controls') || e.target.closest('.player-center-btn') || e.target.closest('.watch-top-bar')) return;
        const isPlayerArea = e.target === pw || e.target === videoEl || e.target.closest('#player-poster-wrap');
        if (!isPlayerArea) return;

        if (!isTouchDev) { togglePlay(); return; }

        const rect = pw.getBoundingClientRect();
        const side = (e.clientX - rect.left) < rect.width / 2 ? 'left' : 'right';
        const now = Date.now();

        if (tapTimer && (now - lastTapTime) < DOUBLE_TAP_MS && side === lastTapSide) {
          clearTimeout(tapTimer);
          tapTimer = null;
          lastTapTime = 0; lastTapSide = null;
          if (side === 'left') skipBackHud(); else skipFwdHud();
          return;
        }

        lastTapTime = now; lastTapSide = side;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => {
          tapTimer = null;
          if (!pw.classList.contains('show-ui')) { showControls(); return; }
          togglePlay();
        }, DOUBLE_TAP_MS);
      });
    }

    /* ── Keyboard shortcuts ──
       Nomlangan funksiya: PiP oynasi o'z hujjatiga ega, unga ham shu
       listener ulanadi (openPipWindow ichida). */
    function onPlayerKeydown(e) {
      const tag = e.target.tagName;
      // Faqat matn kiritish maydonlarida bloklaymiz — vol-slider (range) bunga kirmaydi,
      // aks holda u fokusda bo'lganda Up/Down HUD ishlamay qolardi.
      const isTypingField = (tag === 'INPUT' && e.target.type !== 'range') || tag === 'TEXTAREA';
      if (isTypingField) return;
      try {
        if (e.code === 'Space' || e.code === 'KeyK') { e.preventDefault(); togglePlay(); }
        else if (e.code === 'ArrowLeft')  { e.preventDefault(); skipBackHud(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); skipFwdHud(); }
        else if (e.code === 'ArrowUp')    { e.preventDefault(); adjustVolumeHud(5); }
        else if (e.code === 'ArrowDown')  { e.preventDefault(); adjustVolumeHud(-5); }
        else if (e.code === 'KeyM')       { toggleMute(); const vs = document.getElementById('vol-slider'); showVolumeHud(muted ? 0 : (vs ? +vs.value : 80), muted); }
        else if (e.code === 'KeyF')       { toggleFullscreen(); }
        else if (e.code === 'KeyI')       { toggleMiniPlayer(); }
      } catch (err) { console.error('Player keyboard shortcut xato:', err); }
    }
    document.addEventListener('keydown', onPlayerKeydown);

    /* ── Favorite toggle (local) ── */
    window.toggleFav = function () {
      if (!movie) return;
      const added = typeof toggleWatchlistLocal === 'function'
        ? toggleWatchlistLocal(movie)
        : toggleFavorite(movie.id);
      document.getElementById('top-fav-icon').innerHTML = added ? App.icons.heartFill : App.icons.heart;
      document.getElementById('top-fav-label').textContent = added ? 'Saqlandi' : 'Saqlangan';
      document.getElementById('top-fav-btn').classList.toggle('active', added);
    };

    updateUI();

    /* ── Watchlist toggle via API ── */
    window.toggleFavAPI = async function () {
      if (!movie) return;
      if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
        try {
          const data = await WatchlistAPI.toggle(movie.id);
          const added = data.added;
          document.getElementById('top-fav-icon').innerHTML = added ? App.icons.heartFill : App.icons.heart;
          document.getElementById('top-fav-label').textContent = added ? 'Saqlandi' : 'Saqlangan';
          document.getElementById('top-fav-btn').classList.toggle('active', added);
          showToast(data.message);
        } catch (e) { showToast('Xato: ' + e.message); }
      } else {
        window.toggleFav();
      }
    };
  </script>
