<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aktyorlar — CINEPLEX</title>
  <meta name="description" content="CINEPLEX filmlaridagi mashhur aktyorlar va aktrisalar haqida ma'lumot va ular ishtirok etgan filmlar." />
  <link rel="canonical" href="https://www.cineplex.uz/pages/actors.html" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    /* ── Actors Page ── */
    .actors-hero {
      padding: 110px 50px 52px;
      background: linear-gradient(180deg, rgba(120,40,200,0.12) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .actors-hero h1 {
      font-size: clamp(32px,5vw,54px);
      font-weight: 900;
      letter-spacing: -1.5px;
      margin-bottom: 10px;
    }
    /* ── Controls ── */
    .actors-controls {
      position: sticky;
      top: var(--navbar-h);
      z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 50px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .actors-search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 380px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--glass-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 9px 18px;
      transition: border-color 0.2s;
    }
    .actors-search-wrap:focus-within {
      border-color: rgba(255,255,255,0.28);
    }
    .actors-search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
    .actors-search-wrap input {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit;
      font-size: 14px; width: 100%;
    }
    .actors-search-wrap input::placeholder { color: var(--text-muted); }

    /* ── Grid ── */
    .actors-main {
      padding: 36px 50px 80px;
    }
    .actors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 18px;
    }

    /* ── Actor Card ── */
    .actor-card {
      background: var(--glass-1);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.22s,
                  box-shadow 0.22s;
      position: relative;
    }
    .actor-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
    }
    .actor-card-img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      object-position: top;
      display: block;
      background: var(--glass-2);
    }
    .actor-card-ph {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      color: #fff;
    }
    .actor-card-body {
      padding: 12px 12px 14px;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
    }
    .actor-card-name {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: #fff;
    }
    .actor-card-known {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actor-card-rank {
      position: absolute;
      top: 8px; left: 8px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 10px; font-weight: 800;
      color: var(--text-dim);
      padding: 2px 7px;
    }

    /* ── Empty ── */
    .actors-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      grid-column: 1/-1;
    }
    .actors-empty svg { margin: 0 auto 14px; display: block; opacity: 0.25; }
    .actors-empty p { font-size: 15px; }

    /* ── Load more ── */
    .load-more-wrap { text-align: center; margin-top: 36px; }
    .load-more-btn {
      padding: 13px 40px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--glass-2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .load-more-btn:hover { background: var(--glass-3); color: #fff; border-color: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .actors-hero { padding: 100px 20px 36px; }
      .actors-controls { padding: 12px 20px; }
      .actors-main { padding: 24px 20px 60px; }
      .actors-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <!-- Hero -->
    <div class="actors-hero animate-in">
      <h1>Aktyorlar va <br>Aktrisalar</h1>
    </div>

    <!-- Controls -->
    <div class="actors-controls">
      <div class="actors-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Aktyor qidiring…" autocomplete="off">
      </div>
    </div>

    <!-- Grid -->
    <div class="actors-main">
      <div class="actors-grid" id="actors-grid"></div>
      <div class="load-more-wrap" id="load-more-wrap" style="display:none">
        <button class="load-more-btn" id="load-more-btn">Ko'proq ko'rsatish</button>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <!-- actors_data.js ~1.5MB (1028 aktyor to'liq bio bilan) — bloklovchi
       yuklansa sekin tarmoqda sahifa "qotib qolgandek" ko'rinadi.
       defer bilan fonda yuklaymiz, iste'molchi kod DOMContentLoaded'da ishga tushadi. -->
  <script src="../js/actors_data.js" defer></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    App.initNavbar('actors', '../');
    App.initAnimations();

    const GRAD_PALETTE = [
      'linear-gradient(135deg,#1e3a8a,#7c3aed)',
      'linear-gradient(135deg,#9d174d,#ec4899)',
      'linear-gradient(135deg,#065f46,#0891b2)',
      'linear-gradient(135deg,#92400e,#b45309)',
      'linear-gradient(135deg,#1e40af,#06b6d4)',
      'linear-gradient(135deg,#6b21a8,#db2777)',
      'linear-gradient(135deg,#155e75,#0d9488)',
      'linear-gradient(135deg,#7f1d1d,#9d174d)',
      'linear-gradient(135deg,#3730a3,#7c3aed)',
      'linear-gradient(135deg,#064e3b,#059669)',
    ];
    function gradFor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return GRAD_PALETTE[Math.abs(h) % GRAD_PALETTE.length];
    }

    /* ── State ── */
    let currentSearch = '';
    let shownCount = 48;
    let filteredList = [];

    function filterActors() {
      filteredList = currentSearch
        ? ACTORS_DATA.filter(a => a.name.toLowerCase().includes(currentSearch.toLowerCase()))
        : ACTORS_DATA;
      renderGrid();
    }

    function buildCard(a, index) {
      const grad = gradFor(a.name);
      const initials = a.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const known = a.knownFor && a.knownFor.length ? a.knownFor[0] : '';
      const imgEl = a.photo
        ? `<img class="actor-card-img" src="${a.photo}" alt="${a.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const phEl = `<div class="actor-card-ph" style="background:${grad};display:${a.photo ? 'none' : 'flex'}">${initials}</div>`;
      return `
        <div class="actor-card" onclick="App.go('../pages/actor-profile.html?id=${encodeURIComponent(a.id)}')">
          <div class="actor-card-rank">#${index + 1}</div>
          ${imgEl}${phEl}
          <div class="actor-card-body">
            <div class="actor-card-name">${a.name}</div>
            <div class="actor-card-known">${known}</div>
          </div>
        </div>`;
    }

    function renderGrid() {
      const grid = document.getElementById('actors-grid');
      const slice = filteredList.slice(0, shownCount);
      if (!slice.length) {
        grid.innerHTML = `<div class="actors-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg><p>Aktyor topilmadi</p></div>`;
        document.getElementById('load-more-wrap').style.display = 'none';
        return;
      }
      grid.innerHTML = slice.map((a, i) => buildCard(a, i)).join('');
      document.getElementById('load-more-wrap').style.display = filteredList.length > shownCount ? '' : 'none';
    }

    /* ── Search ── */
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value.trim();
        shownCount = 48;
        filterActors();
      }, 250);
    });

    /* ── Load more ── */
    document.getElementById('load-more-btn').addEventListener('click', () => {
      shownCount += 48;
      filterActors();
    });

    /* ── Init ── */
    filterActors();
  });
  </script>
</body>
</html>
