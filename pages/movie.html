<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Film — CINEPLEX</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="../js/perf-lite.js?v=3"></script>
  <link rel="stylesheet" href="../css/main.css?v=5">
  <style>
    /* ═══════════════════════════════════════════════════
       MOVIE DETAIL — iOS Cinema Design (Mobile-first)
    ═══════════════════════════════════════════════════ */

    /* ── Fixed blurred poster background ── */
    #movie-bg-blur {
      position: fixed;
      inset: 0;
      z-index: -1; /* barcha kontentdan orqada turadi */
      background-size: cover;
      background-position: center top;
      /* brightness 0.28 → 0.18: poster-ghost matn orqasida sezilarli
         ko'rinib "xira dog'" bo'lib qolmasligi uchun (fon ambient bo'lib
         qoladi, lekin rasm sifatida o'qilmaydi) */
      filter: blur(32px) brightness(0.18) saturate(1.3);
      transform: scale(1.12);
      transition: background-image 0.6s ease;
    }

    body.movie-page {
      background: var(--bg);
      min-height: 100vh;
    }
    /* .ambient-bg (qattiq qora fon) #movie-bg-blur (poster blur fon)dan KEYIN
       DOM'da joylashgani uchun uni to'liq yopib qo'yardi — desktop'da blur
       banner umuman ko'rinmasdi. Shu sahifada ambient-bg o'chiriladi. */
    body.movie-page .ambient-bg {
      display: none;
    }

    /* ── Actor Modal ── */
    .actor-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 20px;
    }

    .actor-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .actor-modal {
      background: var(--glass-solid);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 0;
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      overflow: hidden;
      overflow-y: auto;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), 0 32px 80px rgba(0, 0, 0, 0.75);
      transform: translateY(18px) scale(0.97);
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .actor-modal-overlay.open .actor-modal {
      transform: translateY(0) scale(1);
    }

    .actor-modal::-webkit-scrollbar {
      width: 4px;
    }

    .actor-modal::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .actor-modal-header {
      position: relative;
      padding: 28px 28px 24px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.06));
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .actor-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      transition: background 0.18s;
    }

    .actor-modal-close:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
    }

    .actor-modal-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      font-weight: 900;
      color: #ffffff;
      flex-shrink: 0;
      box-shadow: 0 0 28px rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    .actor-modal-name {
      font-size: 25px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .actor-modal-role {
      font-size: 14.5px;
      color: rgba(255, 255, 255, 0.42);
    }

    .actor-modal-body {
      padding: 22px 28px 28px;
    }

    .actor-modal-bio {
      font-size: 16px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
    }

    .actor-modal-films-label {
      font-size: 12.5px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 14px;
    }

    .actor-modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px 10px;
    }

    .actor-modal-empty {
      text-align: center;
      padding: 28px 0;
      color: rgba(255, 255, 255, 0.3);
      font-size: 16px;
    }

    /* ══════════════════════════════════
       MOBILE CINEMA LAYOUT  ≤ 640px
    ══════════════════════════════════ */
    @media (max-width: 640px) {

      /* Mobilada z-index olib tashlanadi */
      #movie-bg-blur {
        z-index: unset;
      }

      /* ── Page wrapper ── */
      .mob-page {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
        padding-bottom: 60px;
      }

      /* ── Sticky top nav — main navbar pastida ── */
      .mob-nav {
        position: sticky;
        top: calc(var(--navbar-h) + 6px);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
      }

      .mob-back-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        background: rgba(0, 0, 0, 0.445);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 50px;
        color: #fff;
        font-size: 14.5px;
        font-weight: 600;
        padding: 10px 25px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.18s;
      }

      .mob-back-btn:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      .mob-nav-pills {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;
        flex-shrink: 0;
      }

      .mob-pill {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 13.5px;
        font-weight: 600;
        padding: 5px 10px;
        white-space: nowrap;
      }

      .mob-pill-rating {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* ── Hero poster ── */
      .mob-hero {
        position: relative;
        width: 100%;
        aspect-ratio: 3 / 4;
        overflow: visible;
        /* gradient pastga chiqishi uchun */
        z-index: 1;
      }

      .mob-hero-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
        position: relative;
        z-index: 1;
        overflow: hidden;
        border-radius: 0;
        -webkit-mask-image: linear-gradient(to bottom,
          black 0%,
          black 45%,
          rgba(0,0,0,0.6) 68%,
          transparent 88%
        );
        mask-image: linear-gradient(to bottom,
          black 0%,
          black 45%,
          rgba(0,0,0,0.6) 68%,
          transparent 88%
        );
      }

      /* ── Gradient blur: hero ham mob-info ni qoplaydi ── */

      .mob-hero-trailer-btn {
        position: absolute;
        z-index: 33;
        top: 9px;
        right: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(10, 10, 10, 0.489);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        color: #fff;
        font-size: 14.5px;
        font-weight: 700;
        padding: 9px 16px 9px 10px;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
      }

      .mob-hero-trailer-btn:hover {
        background: rgba(30, 30, 30, 0.9);
        transform: scale(1.03);
      }

      .mob-hero-trailer-btn:active {
        transform: scale(0.97);
      }

      .mob-play-circle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #ff0000;
      }

      .mob-play-circle svg {
        color: #ffffff;
        width: 11px;
        height: 11px;
      }

      /* Trailer overlay (full-screen on mobile) */
      .mob-trailer-overlay {
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: #000;
        display: none;
        flex-direction: column;
      }

      .mob-trailer-overlay.open {
        display: flex;
      }

      /* Yuqori panel — X tugmasi shu yerda, videoga xalaqit bermaydi */
      .mob-trailer-bar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        height: 52px;
        padding: 0 14px;
        padding-top: env(safe-area-inset-top, 0px);
        background: #000;
      }

      .mob-trailer-close {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .mob-trailer-frame {
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        border: none;
      }

      /* ══════════════════════════════════
         MOB-INFO  —  Cinema Card Redesign
      ══════════════════════════════════ */
      .mob-info {
        position: relative;
        z-index: 5;
        margin-top: -130px;
        padding: 0 20px 0;
      }

      .mob-info-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      .mob-info-poster {
        flex-shrink: 0;
        width: 112px;
        position: relative;
        z-index: 2;
      }
      .mob-info-poster img {
        width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
        border-radius: 14px;
        display: block;
        border: 1.5px solid rgba(255,255,255,0.16);
        box-shadow: 0 16px 40px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.5);
      }

      .mob-info-content {
        flex: 1;
        min-width: 0;
        padding-bottom: 4px;
      }

      .mob-title {
        font-size: 29.5px;
        font-weight: 900;
        color: #fff;
        line-height: 1.08;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Logo (rasm) bo'lsa — matn clamp o'rniga oddiy oqim, chapga tekislangan
         va posterga yopishib tursin */
      .mob-title:has(.mob-title-logo) {
        display: flex;
        align-items: flex-end;
        -webkit-line-clamp: unset;
        overflow: visible;
        margin-bottom: 6px;
      }
      .mob-title .mob-title-logo {
        margin: 0;
      }

      .mob-title-meta {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 8px;
      }
      .mob-title-rating {
        display: inline-flex; align-items: center; gap: 5px;
        color: #f5c518; font-size: 14.5px; font-weight: 800;
      }
      .mob-title-dur {
        display: inline-flex; align-items: center; gap: 5px;
        color: rgba(255,255,255,0.45); font-size: 13.5px; font-weight: 600;
      }

      .mob-meta-row {
        display: flex; align-items: center; flex-wrap: wrap; gap: 0;
        font-size: 13.5px; font-weight: 500;
        color: rgba(255,255,255,0.38);
        text-transform: uppercase; letter-spacing: 0.03em;
        margin-bottom: 0;
      }
      .mob-meta-dot { margin: 0 5px; opacity: 0.3; font-size: 11.5px; }
      .mob-imdb-badge { display: none; }

      .mob-desc-wrap { margin-bottom: 20px; }
      .mob-desc {
        font-size: 16px; line-height: 1.72;
        color: rgba(255,255,255,0.52);
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .mob-desc.expanded { display: block; -webkit-line-clamp: unset; }
      .mob-read-more {
        margin-top: 7px;
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 13.5px; font-weight: 700;
        color: rgba(255,255,255,0.42);
        background: none; border: none; padding: 0;
        cursor: pointer; font-family: inherit;
        letter-spacing: 0.05em; text-transform: uppercase;
        transition: color 0.18s;
      }
      .mob-read-more:hover { color: rgba(255,255,255,0.8); }

      .mob-actions {
        display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px;
      }
      .mob-actions-row {
        display: flex; gap: 9px;
      }
      .mob-btn-play {
        width: 100%;
        display: flex; align-items: center; justify-content: center; gap: 9px;
        background: #fff; color: #0a0a0a;
        font-size: 17px; font-weight: 800;
        border: none; border-radius: 14px; padding: 15px 20px;
        cursor: pointer; font-family: inherit; letter-spacing: -0.01em;
        box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        transition: background 0.18s, transform 0.12s;
      }
      .mob-btn-play:active { transform: scale(0.98); }
      .mob-btn-play:hover  { background: rgba(255,255,255,0.9); }

      /* Ko'rish tugmasi yonidagi Yuklab olish tugmasi + sifat tanlash oynasi */
      .mob-watch-row { display: flex; gap: 9px; position: relative; }
      .mob-watch-row .mob-btn-play { flex: 1; }
      .mob-btn-download {
        flex-shrink: 0; width: 54px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        color: #fff; border-radius: 14px;
        cursor: pointer; font-family: inherit;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        transition: background 0.18s, transform 0.12s;
      }
      .mob-btn-download:hover  { background: rgba(255,255,255,0.13); }
      .mob-btn-download:active { transform: scale(0.94); }
      .mob-btn-download.active { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.26); }
      .mob-download-dd {
        position: absolute; top: calc(100% + 8px); right: 0;
        min-width: 180px; padding: 6px;
        border-radius: 14px;
        border: 1px solid var(--border-h);
        background: var(--glass-solid);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        z-index: 30; display: none;
        box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      }
      .mob-download-dd.open { display: block; }
      .mob-download-dd .dl-head {
        font-size: 12.5px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; color: var(--text-muted);
        padding: 8px 10px 6px;
      }
      .mob-download-dd .dl-item {
        padding: 10px 12px; border-radius: 9px;
        font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.85);
        cursor: pointer; transition: background 0.15s;
      }
      .mob-download-dd .dl-item:hover { background: rgba(255,255,255,0.08); }

      .mob-btn-secondary {
        flex: 1;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.8); font-size: 14.5px; font-weight: 700;
        border-radius: 14px; padding: 13px 14px;
        cursor: pointer; font-family: inherit;
        backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        transition: background 0.18s;
      }
      .mob-btn-secondary:hover  { background: rgba(255,255,255,0.13); }
      .mob-btn-secondary:active { transform: scale(0.97); }
      .mob-btn-secondary.active {
        background: rgba(255,255,255,0.14);
        border-color: rgba(255,255,255,0.26); color: #fff;
      }
      /* Like aktiv holati */
      #mob-like-btn.active {
        background: rgba(255,255,255,0.14);
        border-color: rgba(255,255,255,0.26);
        color: #fff;
      }
      #mob-like-btn.active svg {
        fill: #fff;
        stroke: #fff;
      }

      /* ── Section header ── */
      .mob-section {
        padding: 0 18px;
        margin-bottom: 24px;
      }

      .mob-section-title {
        font-size: 20.5px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 14px;
      }

      /* ── Cast scroll ── */
      .mob-cast-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scroll-snap-type: x mandatory;
      }

      .mob-cast-scroll::-webkit-scrollbar {
        display: none;
      }

      /* ── View All tugmasi ── */
      .mob-view-all-btn {
        font-size: 13.5px; font-weight: 700;
        color: rgba(255,255,255,0.45);
        background: none; border: none; padding: 0;
        cursor: pointer; font-family: inherit;
        letter-spacing: 0.06em; text-transform: uppercase;
        transition: color 0.15s;
      }
      .mob-view-all-btn:hover { color: rgba(255,255,255,0.85); }

      /* ── Gallery scroll ── */
      .mob-gallery-scroll {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scroll-snap-type: x mandatory;
        padding-bottom: 4px;
      }
      .mob-gallery-scroll::-webkit-scrollbar { display: none; }
      .mob-gallery-item {
        flex-shrink: 0;
        width: 160px;
        height: 105px;
        border-radius: 10px;
        overflow: hidden;
        scroll-snap-align: start;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        cursor: pointer;
      }
      .mob-gallery-item img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.2s;
      }
      .mob-gallery-item:hover img { transform: scale(1.05); }

      .mob-cast-card {
        flex-shrink: 0;
        width: 88px;
        text-align: center;
        scroll-snap-align: start;
        cursor: pointer;
      }

      .mob-cast-photo-wrap {
        width: 80px;
        height: 80px;
        border-radius: 12px;
        overflow: hidden;
        margin: 0 auto 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: transform 0.2s, border-color 0.2s;
      }

      .mob-cast-card:hover .mob-cast-photo-wrap {
        transform: scale(1.05);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .mob-cast-photo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top;
      }

      .mob-cast-photo-fallback {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 25px;
        font-weight: 900;
        color: rgba(255, 255, 255, 0.6);
      }

      .mob-cast-name {
        font-size: 13.5px;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }

      .mob-cast-char {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.4);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Genre pills row ── */
      .mob-genres {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-bottom: 24px;
        padding: 0 18px;
      }

      .mob-genre-pill {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13.5px;
        font-weight: 600;
        padding: 5px 12px;
      }

      /* ── Related grid (2-col) ── */
      .mob-related-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 0 18px;
      }

      /* Yig'ilgan holat — bitta qator: 2 karta ko'rinadi, qolganlari
         O'NGGA SCROLL qilib ko'riladi (Gallereya kabi).
         "See All" bosilganda klass olib tashlanib to'liq grid yoyiladi.
         !important — JS inline style.display='grid' ustidan ishlashi uchun */
      .mob-related-grid.collapsed {
        display: flex !important;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scroll-snap-type: x mandatory;
      }
      .mob-related-grid.collapsed::-webkit-scrollbar {
        display: none;
      }
      .mob-related-grid.collapsed .mob-related-card {
        flex: 0 0 calc(50% - 5px);
        scroll-snap-align: start;
      }

      .mob-related-card {
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition: transform 0.2s;
      }

      .mob-related-card:hover {
        transform: scale(1.02);
      }

      .mob-related-img {
        width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
        display: block;
      }

      .mob-related-info {
        padding: 8px 10px 10px;
      }

      .mob-related-title {
        font-size: 14.5px;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
      }

      .mob-related-meta {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.4);
      }

      /* ── Reviews ── */
      .mob-reviews {
        padding: 0 18px;
      }

      .mob-reviews-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .mob-review-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
      }

      .mob-review-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .mob-review-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14.5px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        overflow: hidden;
      }

      .mob-review-name {
        font-size: 14.5px;
        font-weight: 700;
        color: #fff;
      }

      .mob-review-date {
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.4);
      }

      .mob-review-text {
        font-size: 14.5px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.65);
      }

      /* Review write */
      .mob-review-write {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 14px;
      }

      .mob-review-textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 12px;
        color: #fff;
        font-size: 16px;
        font-family: inherit;
        resize: none;
        min-height: 80px;
        margin: 10px 0;
        outline: none;
      }

      .mob-review-textarea::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      .mob-review-stars {
        display: flex;
        gap: 4px;
        margin-bottom: 4px;
      }

      .mob-star-btn {
        font-size: 25px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        padding: 0;
        transition: color 0.15s;
      }

      .mob-star-btn.active {
        color: #f5c518;
      }

      .mob-submit-btn {
        width: 100%;
        background: #fff;
        color: #000;
        font-size: 16px;
        font-weight: 800;
        font-family: inherit;
        border: none;
        border-radius: 10px;
        padding: 12px;
        cursor: pointer;
        transition: background 0.18s;
      }

      .mob-submit-btn:hover {
        background: rgba(255, 255, 255, 0.88);
      }

      /* ── Divider ── */
      .mob-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.07);
        margin: 0 18px 24px;
      }

      /* ── Hide original desktop layout on mobile ── */
      .dp-hero,
      .dp-info-section,
      .dp-gallery,
      .dp-cast-section,
      .dp-related-section,
      .reviews-section,
      #detail-root>* {
        display: none !important;
      }

      .mob-page {
        display: block !important;
      }
    }

    /* ── Gallery "View All" modal ── */
    .gallery-modal {
      position: fixed; inset: 0; z-index: 9400;
      background: rgba(8,9,11,0.97);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      display: none; flex-direction: column;
      overflow-y: auto;
    }
    .gallery-modal.open { display: flex; }
    .gallery-modal-head {
      position: sticky; top: 0; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: var(--glass-solid);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .gallery-modal-title { font-size: 17px; font-weight: 700; color: #fff; }
    .gallery-modal-close {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--glass-2); border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; transition: background 0.15s;
    }
    .gallery-modal-close:hover { background: var(--glass-3); }
    .gallery-modal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px; padding: 3px;
    }
    .gallery-modal-item {
      aspect-ratio: 1; overflow: hidden;
      cursor: pointer; background: rgba(255,255,255,0.04);
    }
    .gallery-modal-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.22s;
    }
    .gallery-modal-item:hover img { transform: scale(1.06); }

    /* ── Lightbox (har ikkala formatda) ── */
    .img-lightbox {
      position: fixed; inset: 0; z-index: 9500;
      background: rgba(8,9,11,0.94);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    }
    .img-lightbox.open { display: flex; }
    .img-lightbox-img {
      max-width: 94vw; max-height: 88vh;
      object-fit: contain; border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      animation: lbIn 0.22s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes lbIn {
      from { opacity:0; transform: scale(0.93); }
      to   { opacity:1; transform: scale(1); }
    }
    .img-lightbox-close {
      position: absolute; top: 18px; right: 18px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--glass-2);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; font-size: 20.5px;
      transition: background 0.15s;
    }
    .img-lightbox-close:hover { background: var(--glass-3); }
    .img-lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--glass-2);
      backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer; transition: background 0.15s;
    }
    .img-lightbox-nav:hover { background: var(--glass-3); }
    .img-lightbox-prev { left: 14px; }
    .img-lightbox-next { right: 14px; }
    .img-lightbox-counter {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════
       DESKTOP: keep existing styles,
       hide mobile layout
    ══════════════════════════════════ */
    @media (min-width: 641px) {
      .mob-page {
        display: none !important;
      }

      .mob-trailer-overlay {
        display: none !important;
      }
    }

    /* Cast photo on desktop detail page */
    .dp-cast-card img.dp-cast-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      display: block;
      margin: 0 auto 10px;
      border: 3px solid rgba(255, 255, 255, 0.09);
      transition: transform 0.22s, border-color 0.22s;
    }

    .dp-cast-card:hover img.dp-cast-photo {
      transform: scale(1.07);
      border-color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/seo.js"></script>
  <script>
    /* ─── Detect mobile ─── */
    const isMobile = () => window.innerWidth <= 640;

    App.initNavbar('', '../');

    const id = App.getParam('id');
    let movie = null;
    let _apiRelated = null;
    let _mobTrailerInfo = null;
    let selectedStars = 0;
    window._cpHeroTrailer = null;
    window._cpHeroMuted = true;

    /* ─── "More Like This" — See All ⇄ Close (default: faqat 2 karta) ─── */
    function toggleMobRelated() {
      const grid = document.getElementById('mob-related-grid');
      const btn  = document.getElementById('mob-related-toggle');
      if (!grid || !btn) return;
      const expanded = !grid.classList.contains('collapsed');
      grid.classList.toggle('collapsed', expanded);
      btn.textContent = expanded ? 'See All' : 'Close';
    }

    /* ─── Tavsiya (related) filmlarni KECH render qilish ───
       Sahifa CPCache'dan darhol chizilganda related hali API'dan kelmagan
       bo'ladi — fon so'rovi javob bergach shu funksiya bo'limni to'ldiradi. */
    function renderRelatedLate(related) {
      if (!related || !related.length) return;
      _apiRelated = related;
      /* Mobil layout */
      const mGrid = document.getElementById('mob-related-grid');
      const mPage = document.getElementById('mob-page');
      if (mGrid && mPage && mPage.style.display === 'block' && !mGrid.children.length) {
        document.getElementById('mob-related-section').style.display = '';
        mGrid.style.display = 'grid';
        document.getElementById('mob-related-divider').style.display = '';
        mGrid.innerHTML = related.slice(0, 6).map(m =>
          `<div class="mob-related-card" onclick="App.go('../pages/movie.html?id=${m.id}')">
            <img class="mob-related-img" src="${m.img || ''}" alt="${m.title}" loading="lazy">
            <div class="mob-related-info">
              <div class="mob-related-title">${m.title}</div>
              <div class="mob-related-meta">★ ${m.rating} · ${m.year}</div>
            </div>
          </div>`
        ).join('');
        const mToggle = document.getElementById('mob-related-toggle');
        if (mToggle) mToggle.style.display = related.length > 2 ? '' : 'none';
        return;
      }
      /* Desktop layout */
      /* Galereya bo'sh qolgan bo'lsa (filmning o'z rasmlari yo'q) —
         o'xshash filmlarning TAKRORLANMAYDIGAN posterlaridan to'ldiramiz.
         Oldingi xato: related hali kelmaganda bitta poster 6 marta
         takrorlanardi; endi faqat shu yerda, real data bilan chiziladi. */
      const gGrid = document.getElementById('dp-gallery-grid');
      if (gGrid && !gGrid.children.length) {
        const seen = new Set();
        const urls = related
          .map(m => m && m.img)
          .filter(u => u && u !== movie.img && !seen.has(u) && seen.add(u))
          .slice(0, 6);
        if (urls.length >= 3) {
          window._galleryUrls = urls;
          gGrid.innerHTML = urls.map((u, i) =>
            `<div class="dp-gallery-item" onclick="openLightbox(${i})" style="cursor:pointer"><img src="${u}" alt="" loading="lazy"></div>`).join('');
          const gSec = document.getElementById('dp-gallery-section');
          if (gSec) gSec.style.display = '';
        }
      }
      const row = document.getElementById('related-row');
      if (row) {
        if (!row.children.length) row.innerHTML = related.map(m => App.buildCard(m, '../')).join('');
        App.initDragScroll('related-row');
        return;
      }
      const root = document.getElementById('detail-root');
      const reviews = root ? root.querySelector('.reviews-section') : null;
      if (root && reviews) {
        const sec = document.createElement('div');
        sec.className = 'dp-related-section';
        sec.innerHTML = `
          <div class="dp-section-label">SHUNGA O'XSHASH</div>
          <div class="movies-row" id="related-row">
            ${related.map(m => App.buildCard(m, '../')).join('')}
          </div>`;
        root.insertBefore(sec, reviews);
        App.initDragScroll('related-row');
      }
    }

    /* ─── Haqiqiy galereyani KECH render qilish ───
       Bosh sahifa cache'ga ro'yxat (lite) obyektini yozadi — unda `gallery`
       maydoni YO'Q (backend LIST_EXCLUDE bilan kesib yuboradi). Shu sababli
       cache'dan darhol chizilgan sahifada galereya bo'sh yoki o'xshash-film
       posterlari bilan to'lgan bo'lardi. Fon so'rovi to'liq filmni keltirgach
       shu funksiya galereyani filmning O'Z rasmlari bilan almashtiradi. */
    function renderGalleryLate(fresh) {
      if (!fresh || !fresh.gallery || !fresh.gallery.length) return;
      const urls = fresh.gallery;
      if (movie) movie.gallery = urls;
      /* Allaqachon shu rasmlar chizilgan bo'lsa — tegmaymiz */
      if (window._galleryUrls && window._galleryUrls[0] === urls[0]
          && window._galleryUrls.length === urls.length) return;
      window._galleryUrls = urls;
      /* Mobil layout */
      const mPage = document.getElementById('mob-page');
      const mScroll = document.getElementById('mob-gallery-scroll');
      if (mScroll && mPage && mPage.style.display === 'block') {
        document.getElementById('mob-gallery-section').style.display = '';
        document.getElementById('mob-gallery-divider').style.display = '';
        mScroll.innerHTML = urls.map((url, i) =>
          `<div class="mob-gallery-item" onclick="openLightbox(${i})">
            <img src="${url}" alt="" loading="lazy">
          </div>`).join('');
        return;
      }
      /* Desktop layout */
      const gGrid = document.getElementById('dp-gallery-grid');
      if (gGrid) {
        gGrid.innerHTML = urls.slice(0, 6).map((url, i) =>
          `<div class="dp-gallery-item" onclick="openLightbox(${i})" style="cursor:pointer"><img src="${url}" alt="" loading="lazy"></div>`).join('');
        const gSec = document.getElementById('dp-gallery-section');
        if (gSec) gSec.style.display = '';
        const gHead = gSec ? gSec.querySelector('.dp-gallery-head') : null;
        if (gHead && urls.length > 6 && !gHead.querySelector('.dp-view-all-btn')) {
          const btn = document.createElement('button');
          btn.className = 'dp-view-all-btn';
          btn.onclick = () => window.openGalleryAll();
          btn.textContent = 'View All';
          gHead.appendChild(btn);
        }
      }
    }

    /* ─── Gradient palette for cast avatars ─── */
    const CAST_GRADS = Array(8).fill('linear-gradient(135deg,#3a3a3a,#121212)');

    /* ─── actors_data.js (1.4 MB) LAZY yuklanadi ───
       Sahifa avval initsiallar bilan chiziladi; fayl kelgach cast bo'limlari
       foto/profil-link bilan qayta to'ldiriladi. Render hech qachon bloklanmaydi. */
    (function loadActorsDataLazy() {
      const s = document.createElement('script');
      s.src = '../js/actors_data.js';
      s.async = true;
      s.onload = () => {
        if (!movie || !movie.cast || !movie.cast.length) return;
        const mob = document.getElementById('mob-cast-scroll');
        if (mob && mob.children.length) mob.innerHTML = buildMobCastHTML(movie.cast);
        const dp = document.getElementById('dp-cast-scroll');
        if (dp && dp.children.length) dp.innerHTML = buildDpCastHTML(movie.cast);
      };
      document.head.appendChild(s);
    })();

    /* ─── Cast HTML builderlar (birinchi render + actors_data kelgach qayta render) ─── */
    function buildMobCastHTML(cast) {
      return cast.map(name => {
        const inits = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const actorData = typeof ACTORS_DATA !== 'undefined'
          ? ACTORS_DATA.find(a => a.name.toLowerCase() === name.toLowerCase()) : null;
        const photo = actorData && actorData.photo ? actorData.photo : null;
        const actorId = actorData ? actorData.id : null;
        const clickFn = actorId
          ? `App.go('../pages/actor-profile.html?id=${actorId}')`
          : `openActorModal('${name.replace(/'/g,"\\'")}', 'linear-gradient(135deg,#3a3a3a,#121212)')`;
        return `<div class="mob-cast-card" onclick="${clickFn}">
          <div class="mob-cast-photo-wrap">
            ${photo ? `<img src="${photo}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
            <div class="mob-cast-photo-fallback" style="${photo ? 'display:none' : ''}">${inits}</div>
          </div>
          <div class="mob-cast-name">${name}</div>
          <div class="mob-cast-char">${actorData && actorData.character ? actorData.character : ''}</div>
        </div>`;
      }).join('');
    }

    function buildDpCastHTML(cast) {
      return cast.map((name, i) => {
        const inits = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const grad = CAST_GRADS[i % CAST_GRADS.length];
        const actorData = typeof ACTORS_DATA !== 'undefined'
          ? ACTORS_DATA.find(a => a.name.toLowerCase() === name.toLowerCase()) : null;
        const actorId = actorData ? actorData.id : null;
        const photo = actorData && actorData.photo ? actorData.photo : null;
        const avatarEl = photo
          ? `<img class="dp-cast-photo" src="${photo}" alt="${name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
             <div class="dp-cast-avatar" style="background:${grad};display:none">${inits}</div>`
          : `<div class="dp-cast-avatar" style="background:${grad}">${inits}</div>`;
        const clickTarget = actorId
          ? `App.go('../pages/actor-profile.html?id=${actorId}')`
          : `openActorModal('${name.replace(/'/g, "\\'")}', '${grad}')`;
        return `<div class="dp-cast-card" onclick="${clickTarget}" style="cursor:pointer">
          ${avatarEl}<div class="dp-cast-name">${name}</div></div>`;
      }).join('');
    }

    /* ─── Stars builder ─── */
    function buildStars(n, total = 5) {
      let html = '<div class="review-stars">';
      for (let i = 1; i <= total; i++) {
        html += i <= n
          ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="color:#ffffff"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'
          : '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="color:rgba(255,255,255,0.15)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
      }
      return html + '</div>';
    }

    /* XSS himoyasi: foydalanuvchi kiritgan matn (ism, sharh, avatar URL) innerHTML
       ga qo'yilishidan oldin HTML maxsus belgilarini zararsizlantiramiz. */
    function escHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    function buildReviews(reviews) {
      if (!reviews.length) {
        return `<div style="text-align:center;padding:24px 0;color:rgba(255,255,255,0.35);font-size: 16px">
          Hozircha sharhlar yo'q. Birinchi bo'lib fikr bildiring!</div>`;
      }
      return reviews.map(r => {
        const av = r.avatar
          ? `<div class="mob-review-avatar"><img src="${r.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
          : `<div class="mob-review-avatar">${(r.initials || '?')}</div>`;
        return `<div class="mob-review-card">
          <div class="mob-review-header">
            ${av}
            <div>
              <div class="mob-review-name">${r.name}</div>
              <div class="mob-review-date">${r.date}</div>
            </div>
            ${r.rating ? buildStars(r.rating) : ''}
          </div>
          <div class="mob-review-text">${r.text}</div>
        </div>`;
      }).join('');
    }

    /* ─── Trailer helpers ─── */
    window.openMobTrailer = function () {
      const ov = document.getElementById('mob-trailer-overlay');
      if (!ov || !_mobTrailerInfo) return;
      ov.classList.add('open');
      // Remove old frame if any
      const old = ov.querySelector('iframe,video');
      if (old) old.remove();
      if (_mobTrailerInfo.type === 'youtube') {
        const fr = document.createElement('iframe');
        fr.className = 'mob-trailer-frame';
        fr.src = `https://www.youtube-nocookie.com/embed/${_mobTrailerInfo.id}?autoplay=1&controls=1&rel=0&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}`;
        fr.allow = 'autoplay; fullscreen; encrypted-media';
        fr.allowFullscreen = true;
        ov.appendChild(fr);
      } else if (_mobTrailerInfo.type === 'video') {
        const v = document.createElement('video');
        v.className = 'mob-trailer-frame';
        v.src = _mobTrailerInfo.src;
        v.controls = true; v.autoplay = true;
        ov.appendChild(v);
      }
    };

    window.closeMobTrailer = function () {
      const ov = document.getElementById('mob-trailer-overlay');
      ov.classList.remove('open');
      const fr = ov.querySelector('iframe,video');
      if (fr) fr.remove();
    };

    /* ─── Read More toggle ─── */
    window.toggleReadMore = function () {
      const desc = document.getElementById('mob-desc');
      const btn = document.getElementById('mob-read-more');
      if (!desc) return;
      const expanded = desc.classList.toggle('expanded');
      btn.textContent = expanded ? 'Show Less' : 'Read More';
    };

    /* ─── Share ─── */
    window.shareMovie = function () {
      if (navigator.share) {
        navigator.share({ title: movie ? movie.title : '', url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied!'));
      }
    };

    /* ─── Main boot ─── */
    const _applyMovieDefaults = (m) => {
      if (!m) return m;
      m.genre = m.genre || [];
      m.cast = m.cast || [];
      m.description = m.description || '';
      try {
        const _castOv = JSON.parse(localStorage.getItem('cp_cast_overrides') || '{}');
        if (_castOv[m.id] && _castOv[m.id].length) m.cast = _castOv[m.id];
      } catch {}
      return m;
    };

    (async () => {
      /* 1) Cache'dan DARHOL chizamiz — API javobini kutmasdan poster/banner darrov chiqadi.
            (bosh sahifa kartochkalari allaqachon CPCache'ga saqlangan) */
      if (!movie && typeof CPCache !== 'undefined') {
        const c = CPCache.get('movie_' + id);
        if (c && c.v) {
          movie = _applyMovieDefaults(c.v);
          /* Fonda to'liq detalni olib cache'ni yangilaymiz (ko'rish soni ham shu yerda sanaladi).
             Related (tavsiya) filmlar ham shu javobda keladi — kelgach kech render qilamiz. */
          if (typeof MoviesAPI !== 'undefined') {
            MoviesAPI.getById(id)
              .then(resp => {
                if (resp && resp.movie) CPCache.set('movie_' + id, resp.movie);
                /* Avval haqiqiy galereya — shunda renderRelatedLate'dagi
                   "bo'sh galereyani posterlar bilan to'ldirish" fallback'i ishlamaydi */
                if (resp && resp.movie) renderGalleryLate(resp.movie);
                if (resp && resp.related) renderRelatedLate(resp.related);
              })
              .catch(() => {});
          }
        }
      }

      /* 2) Cache bo'lmasa — API'dan kutib olamiz (eski xatti-harakat) */
      if (!movie && typeof MoviesAPI !== 'undefined') {
        try {
          const resp = await MoviesAPI.getById(id);
          movie = _applyMovieDefaults(resp.movie);
          _apiRelated = resp.related || [];
          if (movie && typeof CPCache !== 'undefined') CPCache.set('movie_' + id, resp.movie);
        } catch { }
      }

      if (!movie) {
        if (isMobile()) {
          document.getElementById('mob-page').style.display = 'block';
          document.getElementById('mob-info').innerHTML = `
            <div style="text-align:center;padding:80px 0;color:rgba(255,255,255,0.4)">
              <p style="font-size: 20.5px;font-weight:700;margin-bottom:12px">Film topilmadi</p>
              <a href="../index.html" style="color:#fff;font-size: 16px">Bosh sahifaga qaytish</a>
            </div>`;
        } else {
          document.getElementById('detail-root').innerHTML = `
            <div style="text-align:center;padding:120px 20px;color:rgba(255,255,255,0.4);">
              <h2 style="font-size: 22.5px;font-weight:700;color:rgba(255,255,255,0.5);margin-bottom:8px;">Film topilmadi</h2>
              <a href="../index.html" style="color:#fff;font-size: 16px;text-decoration:underline">Bosh sahifaga qaytish</a>
            </div>`;
        }
        return;
      }

      if (typeof SEO !== 'undefined') SEO.applyMovie(movie);
      else document.title = movie.title + ' — CINEPLEX';

      /* ─── Trailer info ─── */
      _mobTrailerInfo = (function () {
        if (movie.trailerS3Url) return { type: 'video', src: movie.trailerS3Url };
        const raw = movie.trailer_id || movie.trailerUrl || movie.trailer_url;
        const ytid = raw && typeof extractYouTubeId === 'function' ? extractYouTubeId(raw) : null;
        if (ytid) return { type: 'youtube', id: ytid };
        return { type: 'none' };
      })();

      /* ─── Set blurred background ─── */
      const bgEl = document.getElementById('movie-bg-blur');
      if (bgEl) bgEl.style.backgroundImage = `url('${movie.banner_img || movie.img}')`;

      /* ══════════════════════════
         MOBILE LAYOUT RENDER
      ══════════════════════════ */
      if (isMobile()) {
        document.getElementById('mob-page').style.display = 'block';

        /* Nav — faqat Back, pills yo'q */
        document.getElementById('mob-nav-pills').innerHTML = '';

        /* Duration/genre (mob-info uchun) */
        const genre1 = movie.genre && movie.genre[0]
          ? movie.genre[0].charAt(0).toUpperCase() + movie.genre[0].slice(1) : '';
        const dur = movie.type === 'series'
          ? `${movie.seasons || 0} Mavsum`
          : (movie.duration || '');

        /* Hero image (banner) — banner buzilgan/yo'q bo'lsa posterga qaytamiz,
           u ham bo'lmasa yashiramiz (buzilgan "?" rasm chiqmasligi uchun) */
        const heroImg = document.getElementById('mob-hero-img');
        heroImg.alt = movie.title;
        let _heroFellBack = false;
        heroImg.onerror = function () {
          if (!_heroFellBack && movie.img) { _heroFellBack = true; this.src = movie.img; }
          else { this.style.display = 'none'; }
        };
        heroImg.src = movie.banner_img || movie.img || '';

        /* Info poster (kichik poster chap tomonda) */
        const infoPosterImg = document.getElementById('mob-info-poster-img');
        infoPosterImg.alt = movie.title;
        infoPosterImg.onerror = function () { this.style.display = 'none'; };
        infoPosterImg.src = movie.img || '';

        /* Trailer button */
        if (_mobTrailerInfo.type !== 'none') {
          document.getElementById('mob-trailer-btn').style.display = 'flex';
        }

        /* Title — logo mavjud bo'lsa rasm ko'rsatamiz */
        if (movie.logoUrl) {
          const mobLogoScale = (parseFloat(movie.logoScale) || 100) / 100;
          document.getElementById('mob-title').innerHTML = `<img src="${movie.logoUrl}" alt="${movie.title}" class="mob-title-logo" style="--logo-scale:${mobLogoScale}" onerror="this.outerHTML='<span>${movie.title}</span>'">`;
        } else {
          document.getElementById('mob-title').textContent = movie.title;
        }

        /* Rating + Duration — title tagida */
        document.getElementById('mob-title-meta').innerHTML = `
          ${movie.rating ? `<span class="mob-title-rating">
            <svg width="18" height="10" viewBox="0 0 40 20"><rect width="40" height="20" rx="4" fill="#f5c518"/><text x="20" y="14.5" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="11" fill="#000000" text-anchor="middle">IMDb</text></svg>
            ${movie.rating}
          </span>` : ''}
          ${dur ? `<span class="mob-title-dur">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${dur}
          </span>` : ''}`;

        /* Meta row (year, age, genre) */
        const metaItems = [
          movie.year,
          movie.age ? `${movie.age}+` : '',
          genre1,
        ].filter(Boolean);
        document.getElementById('mob-meta-row').innerHTML =
          metaItems.map((t, i) => `<span>${t}</span>${i < metaItems.length - 1 ? '<span class="mob-meta-dot">•</span>' : ''}`).join('');

        /* Description */
        document.getElementById('mob-desc').textContent = movie.description;
        if (!movie.description || movie.description.length < 120) {
          document.getElementById('mob-read-more').style.display = 'none';
        }

        /* Watch btn */
        document.getElementById('mob-watch-btn').onclick = () => App.go(`../pages/watch.html?id=${movie.id}`);

        /* Like holati */
        if (typeof isLiked === 'function' && isLiked(movie.id)) {
          document.getElementById('mob-like-btn').classList.add('active');
          document.getElementById('mob-like-icon').setAttribute('fill', 'currentColor');
          document.getElementById('mob-like-label').textContent = 'Yoqdi';
        }

        /* Watchlist state */
        const inWL = isInWatchlist(movie.id);
        if (inWL) {
          document.getElementById('mob-fav-btn').classList.add('active');
          document.getElementById('mob-fav-icon').innerHTML = '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="currentColor"/>';
          document.getElementById('mob-fav-label').textContent = 'Saqlandi';
        }

        /* Genres */
        document.getElementById('mob-genres').innerHTML =
          (movie.genre || []).map(g => `<span class="mob-genre-pill">${g.charAt(0).toUpperCase() + g.slice(1)}</span>`).join('');

        /* Cast */
        if (movie.cast && movie.cast.length) {
          document.getElementById('mob-cast-section').style.display = '';
          document.getElementById('mob-cast-divider').style.display = '';
          document.getElementById('mob-cast-scroll').innerHTML = buildMobCastHTML(movie.cast);
        }

        /* Gallery */
        const galleryUrls = movie.gallery && movie.gallery.length
          ? movie.gallery
          : (_apiRelated && _apiRelated.length
              ? _apiRelated.slice(0, 6).map(m => m.img)
              : [movie.img]).filter(Boolean);
        if (galleryUrls.length) {
          document.getElementById('mob-gallery-section').style.display = '';
          document.getElementById('mob-gallery-divider').style.display = '';
          window._galleryUrls = galleryUrls;
          document.getElementById('mob-gallery-scroll').innerHTML = galleryUrls.map((url, i) =>
            `<div class="mob-gallery-item" onclick="openLightbox(${i})">
              <img src="${url}" alt="" loading="lazy">
            </div>`
          ).join('');
        }

        /* Related */
        const related = _apiRelated || [];
        if (related.length) {
          document.getElementById('mob-related-section').style.display = '';
          document.getElementById('mob-related-grid').style.display    = 'grid';
          document.getElementById('mob-related-divider').style.display = '';
          document.getElementById('mob-related-grid').innerHTML = related.slice(0, 6).map(m =>
            `<div class="mob-related-card" onclick="App.go('../pages/movie.html?id=${m.id}')">
              <img class="mob-related-img" src="${m.img || ''}" alt="${m.title}" loading="lazy">
              <div class="mob-related-info">
                <div class="mob-related-title">${m.title}</div>
                <div class="mob-related-meta">★ ${m.rating} · ${m.year}</div>
              </div>
            </div>`
          ).join('');
          const relToggle = document.getElementById('mob-related-toggle');
          if (relToggle) relToggle.style.display = related.length > 2 ? '' : 'none';
        }

        /* Reviews write area */
        const u = typeof Auth !== 'undefined' ? Auth.getUser() : null;
        const loggedIn = typeof Auth !== 'undefined' && Auth.isLoggedIn() && u;
        if (loggedIn) {
          const name = u.name || 'Foydalanuvchi';
          const inits = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
          const avUrl = u.avatar ? (typeof u.avatar === 'object' ? u.avatar.url : u.avatar) : '';
          const avEl = avUrl
            ? `<div class="mob-review-avatar"><img src="${avUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
            : `<div class="mob-review-avatar">${inits}</div>`;
          document.getElementById('mob-review-write-area').innerHTML = `
            <div class="mob-review-write">
              <div class="mob-review-header" style="margin-bottom:10px">
                ${avEl}
                <span style="font-size: 14.5px;color:rgba(255,255,255,0.55)">${name}, fikringizni yozing…</span>
              </div>
              <div class="mob-review-stars" id="mob-star-input">
                ${[1,2,3,4,5].map(s => `<button class="mob-star-btn" data-s="${s}">★</button>`).join('')}
              </div>
              <textarea class="mob-review-textarea" id="mob-review-input" placeholder="Sharhingizni yozing…"></textarea>
              <button class="mob-submit-btn" onclick="mobSubmitReview()">Sharh qoldirish</button>
            </div>`;
          document.getElementById('mob-star-input').addEventListener('click', e => {
            const btn = e.target.closest('.mob-star-btn');
            if (!btn) return;
            selectedStars = +btn.dataset.s;
            document.querySelectorAll('.mob-star-btn').forEach((b, i) => {
              b.classList.toggle('active', i < selectedStars);
            });
          });
        } else {
          document.getElementById('mob-review-write-area').innerHTML = `
            <div class="mob-review-write" style="text-align:center">
              <p style="font-size: 14.5px;color:rgba(255,255,255,0.45);margin-bottom:12px">Sharh qoldirish uchun hisobingizga kiring</p>
              <a href="/pages/login.html" style="display:inline-block;background:#fff;color:#000;font-weight:700;font-size: 14.5px;border-radius:8px;padding:10px 22px;text-decoration:none">Kirish</a>
            </div>`;
        }

        loadMobReviews();
      }

      /* ══════════════════════════
         DESKTOP LAYOUT RENDER
      ══════════════════════════ */
      if (!isMobile()) {
        const fav   = isFavorite(movie.id);
        const liked = typeof isLiked === 'function' ? isLiked(movie.id) : false;
        const durationOrSeries = movie.type === 'series'
          ? `${movie.seasons} Seasons · ${movie.episodes} Episodes`
          : movie.duration;

        /* Galereya faqat filmning O'Z rasmlari bo'lsa ko'rsatiladi (mobil
           layout bilan bir xil qoida). Oldingi fallback bitta posterni 6
           marta takrorlab qo'yardi — o'chirildi. */
        let dpGalleryUrls = [];
        let galleryHTML = '';
        if (movie.gallery && movie.gallery.length) {
          dpGalleryUrls = movie.gallery;
          galleryHTML = movie.gallery.slice(0, 6).map((url, i) =>
            `<div class="dp-gallery-item" onclick="openLightbox(${i})" style="cursor:pointer"><img src="${url}" alt="" loading="lazy"></div>`).join('');
        }

    /* ─── Lightbox ─── */
    let _lbIndex = 0;
    window.openLightbox = function (idx) {
      const urls = window._galleryUrls || [];
      if (!urls.length) return;
      _lbIndex = idx || 0;
      _lbUpdate();
      document.getElementById('img-lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closeLightbox = function () {
      document.getElementById('img-lightbox').classList.remove('open');
      document.body.style.overflow = '';
    };
    window.lbClickOutside = function (e) {
      if (e.target === document.getElementById('img-lightbox')) closeLightbox();
    };
    window.lbNav = function (dir) {
      const urls = window._galleryUrls || [];
      _lbIndex = (_lbIndex + dir + urls.length) % urls.length;
      _lbUpdate();
    };
    function _lbUpdate() {
      const urls = window._galleryUrls || [];
      document.getElementById('lb-img').src = urls[_lbIndex] || '';
      document.getElementById('lb-counter').textContent = `${_lbIndex + 1} / ${urls.length}`;
      const hasPrev = document.querySelector('.img-lightbox-prev');
      const hasNext = document.querySelector('.img-lightbox-next');
      if (hasPrev) hasPrev.style.display = urls.length > 1 ? '' : 'none';
      if (hasNext) hasNext.style.display = urls.length > 1 ? '' : 'none';
    }
    window.openGalleryAll = function () {
      const urls = window._galleryUrls || [];
      if (!urls.length) return;
      const modal = document.getElementById('gallery-modal');
      const grid  = document.getElementById('gallery-modal-grid');
      const title = document.getElementById('gallery-modal-title');
      if (title) title.textContent = 'Gallereya · ' + urls.length + ' ta rasm';
      grid.innerHTML = urls.map((url, i) =>
        `<div class="gallery-modal-item" onclick="openLightboxFromModal(${i})">
          <img src="${url}" alt="" loading="lazy">
        </div>`
      ).join('');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closeGalleryModal = function () {
      document.getElementById('gallery-modal').classList.remove('open');
      document.body.style.overflow = '';
    };
    window.openLightboxFromModal = function (idx) {
      closeGalleryModal();
      setTimeout(() => openLightbox(idx), 60);
    };
    document.addEventListener('keydown', function (e) {
      const gm = document.getElementById('gallery-modal');
      if (gm && gm.classList.contains('open')) {
        if (e.key === 'Escape') closeGalleryModal();
        return;
      }
      const lb = document.getElementById('img-lightbox');
      if (!lb || !lb.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   lbNav(-1);
      if (e.key === 'ArrowRight')  lbNav(1);
    });

    };

    /* ─── Mobile: Yuklab olish (sifat tanlash) ─── */
    window.toggleDownloadDd = function (e) {
      if (e) e.stopPropagation();
      const dd = document.getElementById('mob-download-dd');
      const btn = document.getElementById('mob-download-btn');
      if (!dd || !btn) return;
      const open = dd.classList.toggle('open');
      btn.classList.toggle('active', open);
    };
    document.addEventListener('click', (e) => {
      const dd = document.getElementById('mob-download-dd');
      if (dd && dd.classList.contains('open') && !e.target.closest('.mob-watch-row')) {
        dd.classList.remove('open');
        const btn = document.getElementById('mob-download-btn');
        if (btn) btn.classList.remove('active');
      }
    });
    window.downloadQuality = function (quality) {
      const dd = document.getElementById('mob-download-dd');
      const btn = document.getElementById('mob-download-btn');
      if (dd) dd.classList.remove('open');
      if (btn) btn.classList.remove('active');
      showToast(quality + " — yuklab olish tez orada faollashtiriladi");
    };

    /* ─── Mobile review submit ─── */
    window.mobSubmitReview = async function () {
      if (typeof Auth === 'undefined' || !Auth.isLoggedIn()) {
        showToast('Sharh qoldirish uchun kiring'); return;
      }
      const input = document.getElementById('mob-review-input');
      const text = input ? input.value.trim() : '';
      if (!text) { showToast('Avval sharh yozing'); return; }
      if (!selectedStars) { showToast('Yulduz reytingini tanlang'); return; }
      try {
        await ReviewsAPI.create(movie.id, selectedStars, text);
        showToast("Sharh qo'shildi!");
        input.value = ''; selectedStars = 0;
        document.querySelectorAll('.mob-star-btn').forEach(b => b.classList.remove('active'));
        loadMobReviews();
      } catch (e) { showToast('Xato: ' + e.message); }
    };

    /* ─── Desktop review submit ─── */
    window.submitReview = async function () {
      if (typeof Auth === 'undefined' || !Auth.isLoggedIn()) {
        showToast('Sharh qoldirish uchun hisobingizga kiring');
        setTimeout(() => { window.location.href = '/pages/login.html'; }, 1200); return;
      }
      const input = document.getElementById('review-input');
      const text = input ? input.value.trim() : '';
      if (!text) { showToast('Avval sharh yozing'); return; }
      if (!selectedStars) { showToast('Yulduz reytingini tanlang'); return; }
      try {
        await ReviewsAPI.create(movie.id, selectedStars, text);
        showToast("Sharh qo'shildi!"); loadDesktopReviews();
      } catch (e) { showToast('Xato: ' + e.message); return; }
      input.value = ''; selectedStars = 0;
      document.querySelectorAll('.review-star-btn').forEach(b => b.classList.remove('active'));
    };

    /* ─── Helpful ─── */
    window.markHelpful = async function (id, btn) {
      if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
        try { await ReviewsAPI.helpful(id); } catch { }
      }
      const countEl = btn.querySelector('.helpful-count');
      countEl.textContent = parseInt(countEl.textContent) + 1;
      btn.style.color = 'rgba(255,255,255,0.7)';
      btn.style.pointerEvents = 'none';
      showToast('Foydali deb belgilandi');
    };

    /* ─── Hero trailer controls (desktop) ─── */
    window.toggleHeroTrailerMute = function () {
      const info = window._cpHeroTrailer;
      const t = document.getElementById('dp-trailer');
      if (!info || !t) return;
      window._cpHeroMuted = !window._cpHeroMuted;
      if (info.type === 'youtube') {
        const func = window._cpHeroMuted ? 'mute' : 'unMute';
        t.contentWindow.postMessage(JSON.stringify({ event: 'command', func, args: '' }), '*');
        if (!window._cpHeroMuted) t.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [80] }), '*');
      } else if (info.type === 'video') {
        t.muted = window._cpHeroMuted;
        if (!window._cpHeroMuted) t.volume = 0.8;
      }
      const m = document.getElementById('dp-vol-muted');
      const s = document.getElementById('dp-vol-on');
      if (m) m.style.display = window._cpHeroMuted ? '' : 'none';
      if (s) s.style.display = window._cpHeroMuted ? 'none' : '';
    };

    window.expandHeroTrailer = function () {
      const info = window._cpHeroTrailer;
      const t = document.getElementById('dp-trailer');
      if (!info || !t) return;
      const reqFs = t.requestFullscreen || t.webkitRequestFullscreen || t.webkitEnterFullscreen || t.msRequestFullscreen;
      if (info.type === 'video') {
        t.loop = false; t.muted = false; t.controls = true; t.volume = 0.9;
        if (reqFs) reqFs.call(t); t.play().catch(() => { });
      } else if (info.type === 'youtube') {
        const _org = window.location.origin;
        t.src = `https://www.youtube-nocookie.com/embed/${info.id}?autoplay=1&mute=0&controls=1&rel=0&playsinline=1&origin=${_org}&enablejsapi=1`;
        if (reqFs) reqFs.call(t);
      }
      window._cpHeroMuted = false;
      const m = document.getElementById('dp-vol-muted'); const s = document.getElementById('dp-vol-on');
      if (m) m.style.display = 'none'; if (s) s.style.display = '';
    };

    document.addEventListener('fullscreenchange', function () {
      if (document.fullscreenElement) return;
      const info = window._cpHeroTrailer; const t = document.getElementById('dp-trailer');
      if (!info || !t) return;
      if (info.type === 'youtube') {
        const _org = window.location.origin;
        t.src = `https://www.youtube-nocookie.com/embed/${info.id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${info.id}&rel=0&playsinline=1&origin=${_org}&enablejsapi=1`;
        setTimeout(() => t.classList.add('visible'), 600);
      } else if (info.type === 'video') {
        t.controls = false; t.loop = true; t.muted = true; t.play().catch(() => { });
      }
      window._cpHeroMuted = true;
      const m = document.getElementById('dp-vol-muted'); const s = document.getElementById('dp-vol-on');
      if (m) m.style.display = ''; if (s) s.style.display = 'none';
    });

    /* Barcha YouTube trailer iframe'lari (hero + mobil modal) avtomatik
       striming paytida kamida 1080p sifatda ishga tushishi uchun (agar
       1080p mavjud bo'lmasa, YouTube eng baland mavjud sifatga tushadi). */
    function forceTrailerHdQuality(e) {
      document.querySelectorAll('iframe.dp-hero-trailer, iframe.mob-trailer-frame').forEach(function (fr) {
        if (fr.contentWindow === e.source) {
          fr.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'setPlaybackQuality', args: ['hd1080'] }), '*');
        }
      });
    }

    window.addEventListener('message', function (e) {
      try {
        const data = JSON.parse(typeof e.data === 'string' ? e.data : '{}');
        if (data.event === 'onReady' || data.event === 'onStateChange') {
          forceTrailerHdQuality(e);
          return;
        }
        if (data.event !== 'onError') return;
        const t = document.getElementById('dp-trailer');
        if (t && t.tagName === 'IFRAME' && t.contentWindow === e.source) {
          t.style.display = 'none';
          const c = document.getElementById('dp-hero-controls');
          if (c) c.style.display = 'none';
        }
      } catch { }
    });

    /* ─── Actor Modal ─── */
    const ACTOR_BIOS = [
      'Drama va jangovar janrlarda chuqur, qatlamli talqinlari bilan tomoshabinlarni maftun etadigan ijrochi.',
      'Kuchli ijrolari va murakkab rollarni tanlash intiziomi bilan zamonaviy kino sanʼatini shakllantirgan koʻp qirrali iste\'dod.',
      'Ekrandagi ulugʻvor mavjudligi va har bir qahramonga chinlik olib kirish qobiliyati bilan mashhur.',
      'Oʻnlab yillar davomida avlodni belgilaydigan ijrolarni taqdim etib kelayotgan koʻp qirrali aktyor.',
      'Hikoya qilish chegaralarini kengaytiruvchi transformatsion rollar bilan dunyo miqyosida tan olingan.',
    ];

    window.openActorModal = function (name, gradient) {
      const inits = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      const films = [];
      const actorData = typeof ACTORS_DATA !== 'undefined'
        ? ACTORS_DATA.find(a => a.name.toLowerCase() === name.toLowerCase()) : null;
      const bio = actorData && actorData.bio ? actorData.bio : ACTOR_BIOS[name.length % ACTOR_BIOS.length];
      const avatarEl = document.getElementById('am-avatar');
      if (actorData && actorData.photo) {
        avatarEl.innerHTML = `<img src="${actorData.photo}" alt="${name}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;object-position:top;" onerror="this.parentElement.innerHTML='${inits}';this.parentElement.style.background='${gradient}'">`;
        avatarEl.style.background = 'transparent';
      } else { avatarEl.innerHTML = inits; avatarEl.style.background = gradient; }
      let metaHTML = '';
      if (actorData) {
        if (actorData.birthDate) {
          const d = new Date(actorData.birthDate);
          metaHTML += `<span style="font-size: 12.5px;color:var(--text-muted);margin-right:10px">📅 ${d.toLocaleDateString('uz-UZ', { year: 'numeric', month: 'long', day: 'numeric' })}</span>`;
        }
        if (actorData.birthPlace) metaHTML += `<span style="font-size: 12.5px;color:var(--text-muted);margin-right:10px">📍 ${actorData.birthPlace}</span>`;
      }
      document.getElementById('am-name').textContent = name;
      document.getElementById('am-bio').innerHTML = `${metaHTML ? `<div style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px">${metaHTML}</div>` : ''}<span>${bio}</span>${actorData ? `<a href="../pages/actor-profile.html?id=${actorData.id}" style="display:inline-flex;align-items:center;gap:5px;margin-top:12px;font-size: 13.5px;color:rgba(255,255,255,0.45);transition:color 0.15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.45)'">To'liq profil ko'rish →</a>` : ''}`;
      const grid = document.getElementById('am-grid');
      grid.innerHTML = films.length ? films.map(m => App.buildCard(m, '../')).join('') : '<div class="actor-modal-empty">Bu kutubxonada filmlar topilmadi.</div>';
      document.getElementById('actor-modal-overlay').classList.add('open');
    };

    window.closeActorModal = function (e) {
      if (e.target === document.getElementById('actor-modal-overlay'))
        document.getElementById('actor-modal-overlay').classList.remove('open');
    };
  </script>
</body>
