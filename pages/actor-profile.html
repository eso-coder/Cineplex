<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aktyor — CINEPLEX</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/perf-lite.js?v=2"></script>
  <link rel="stylesheet" href="../css/main.css?v=2">
  <style>
    /* ── Hero ── */
    .ap-hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .ap-hero-bg {
      position: absolute; inset: 0;
      background: #060608;
    }
    .ap-hero-bg-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: blur(40px) saturate(1.4);
      transform: scale(1.1);
      opacity: 0.22;
    }
    .ap-hero-grad {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,6,8,0.1) 0%,
        rgba(6,6,8,0.4) 40%,
        rgba(6,6,8,0.92) 75%,
        #060608 100%
      );
    }
    .ap-hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      gap: 48px;
      padding: 0 50px 60px;
      width: 100%;
    }
    .ap-photo-wrap {
      flex-shrink: 0;
      position: relative;
    }
    .ap-photo {
      width: 220px;
      height: 300px;
      border-radius: 20px;
      object-fit: cover;
      object-position: top;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.8);
      display: block;
    }
    .ap-photo-ph {
      width: 220px;
      height: 300px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 81px;
      font-weight: 900;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.8);
    }
    .ap-info { flex: 1; min-width: 0; }
    .ap-breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .ap-breadcrumb a { color: var(--text-dim); transition: color 0.15s; }
    .ap-breadcrumb a:hover { color: #fff; }
    .ap-breadcrumb svg { opacity: 0.4; }
    .ap-name {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .ap-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
    }
    .ap-meta-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--glass-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 14.5px;
      color: var(--text-dim);
    }
    .ap-meta-chip svg { color: var(--text-muted); flex-shrink: 0; }
    .ap-imdb-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f5c518;
      color: #000;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13.5px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .ap-imdb-badge:hover { opacity: 0.88; }
    .ap-bio-preview {
      font-size: 17px;
      line-height: 1.7;
      color: rgba(255,255,255,0.62);
      max-width: 680px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ap-back-btn {
      position: absolute;
      top: 82px; left: 50px;
      z-index: 10;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-dim);
      font-size: 14.5px; font-weight: 600;
      background: var(--glass-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
    }
    .ap-back-btn:hover { color: #fff; background: var(--glass-3); border-color: rgba(255,255,255,0.2); }

    /* ── Body ── */
    .ap-body {
      background: #060608;
      padding-bottom: 80px;
    }
    .ap-section {
      padding: 48px 50px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ap-section:last-child { border-bottom: none; }
    .ap-section-label {
      font-size: 12.5px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ap-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Full bio ── */
    .ap-full-bio {
      font-size: 17px;
      line-height: 1.78;
      color: rgba(255,255,255,0.62);
      max-width: 820px;
    }
    .ap-full-bio .read-more-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      font-family: inherit; font-size: 14.5px;
      cursor: pointer; padding: 0;
      margin-left: 8px;
      transition: color 0.15s;
    }
    .ap-full-bio .read-more-btn:hover { color: #fff; }

    /* ── Stats ── */
    .ap-stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 0;
    }
    .ap-stat-card {
      background: var(--glass-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .ap-stat-label {
      font-size: 12.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .ap-stat-value {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
    }

    /* ── Known For grid ── */
    .ap-known-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 16px;
    }
    .ap-known-card {
      background: var(--glass-1);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.16,1,0.3,1),
                  border-color 0.22s, box-shadow 0.22s;
    }
    .ap-known-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 14px 36px rgba(0,0,0,0.5);
    }
    .ap-known-img {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover; object-position: center;
      display: block; background: var(--glass-2);
    }
    .ap-known-ph {
      width: 100%; aspect-ratio: 2/3;
      display: flex; align-items: center; justify-content: center;
      background: var(--glass-2);
      color: var(--text-muted); font-size: 12.5px;
    }
    .ap-known-title {
      padding: 10px 12px;
      font-size: 14.5px; font-weight: 600;
      color: #fff; line-height: 1.3;
    }
    .ap-known-year {
      padding: 0 12px 10px;
      font-size: 12.5px; color: var(--text-muted);
    }

    /* ── Also in these movies (from our DB) ── */
    .ap-movies-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .ap-movies-row::-webkit-scrollbar { display: none; }

    /* ── Not found ── */
    .ap-not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      color: var(--text-muted);
    }
    .ap-not-found svg { margin-bottom: 20px; opacity: 0.25; }
    .ap-not-found h2 { font-size: 25px; color: var(--text-dim); margin-bottom: 10px; }

    @media (max-width: 768px) {
      .ap-hero-content { flex-direction: column; align-items: center; text-align: center; padding: 0 20px 40px; gap: 24px; }
      .ap-photo { width: 160px; height: 218px; }
      .ap-photo-ph { width: 160px; height: 218px; font-size: 58.5px; }
      .ap-name { font-size: 31.5px; }
      .ap-meta-row { justify-content: center; }
      .ap-back-btn { left: 20px; }
      .ap-section { padding: 36px 20px; }
      .ap-breadcrumb { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>
  <div id="ap-root"></div>

  <script src="../js/data.js"></script>
  <!-- actors_data.js ~1.5MB (1028 aktyor to'liq bio bilan) — bloklovchi
       yuklansa sekin tarmoqda sahifa "qotib qolgandek" ko'rinadi.
       defer bilan fonda yuklaymiz, iste'molchi kod DOMContentLoaded'da ishga tushadi. -->
  <script src="../js/actors_data.js" defer></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    App.initNavbar('actors', '../');
    App.initAnimations();

    const GRAD_PALETTE = [
      'linear-gradient(135deg,#1e3a8a,#7c3aed)',
      'linear-gradient(135deg,#9d174d,#ec4899)',
      'linear-gradient(135deg,#065f46,#0891b2)',
      'linear-gradient(135deg,#92400e,#b45309)',
      'linear-gradient(135deg,#1e40af,#06b6d4)',
      'linear-gradient(135deg,#6b21a8,#db2777)',
      'linear-gradient(135deg,#155e75,#0d9488)',
      'linear-gradient(135deg,#7f1d1d,#9d174d)',
    ];
    function gradFor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
      return GRAD_PALETTE[Math.abs(h) % GRAD_PALETTE.length];
    }
    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    const actorId = App.getParam('id');
    const actor = ACTORS_DATA.find(a => a.id === actorId);

    if (!actor) {
      document.getElementById('ap-root').innerHTML = `
        <div class="ap-not-found">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
          <h2>Aktyor topilmadi</h2>
          <p style="margin-bottom:24px">Bu sahifa mavjud emas yoki o'chirilgan.</p>
          <a href="actors.html" class="btn-play" style="text-decoration:none">Aktyorlar sahifasiga qaytish</a>
        </div>`;
    } else {
      document.title = actor.name + ' — CINEPLEX';

      const grad = gradFor(actor.name);
      const inits = initials(actor.name);
      const imdbUrl = `https://www.imdb.com/name/${actor.id}/`;

      /* Bio — truncate at 500 chars, show "Ko'proq" button */
      const bioText = actor.bio || 'Ma\'lumot mavjud emas.';
      const bioShort = bioText.length > 500 ? bioText.slice(0, 500) + '…' : bioText;
      const bioFull  = bioText;

      /* Stat chips */
      const chips = [];
      if (actor.birthDate) {
        const d = new Date(actor.birthDate);
        const age = new Date().getFullYear() - d.getFullYear();
        chips.push({ icon: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`, text: d.toLocaleDateString('uz-UZ', { year:'numeric', month:'long', day:'numeric' }) });
        chips.push({ icon: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>`, text: age + ' yosh' });
      }
      if (actor.birthPlace) {
        chips.push({ icon: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`, text: actor.birthPlace });
      }

      const chipsHTML = chips.map(c => `
        <div class="ap-meta-chip">
          ${c.icon}
          ${c.text}
        </div>`).join('');

      const dbMovies = [];

      const knownForHTML = (actor.knownFor || []).map(title => `
        <div class="ap-known-card">
          <div class="ap-known-ph">${title}</div>
          <div class="ap-known-title">${title}</div>
        </div>`).join('');

      const dbMoviesHTML = dbMovies.length ? `
        <div class="ap-section animate-in">
          <div class="ap-section-label">CINEPLEX-DAGi FILMLARI</div>
          <div class="ap-movies-row">
            ${dbMovies.map(m => App.buildCard(m, '../')).join('')}
          </div>
        </div>` : '';

      const photoEl = actor.photo
        ? `<img class="ap-photo" src="${actor.photo}" alt="${actor.name}" onerror="this.style.display='none';document.getElementById('ap-photo-ph').style.display='flex'">`
        : '';
      const phEl = `<div class="ap-photo-ph" id="ap-photo-ph" style="background:${grad};display:${actor.photo ? 'none' : 'flex'}">${inits}</div>`;

      document.getElementById('ap-root').innerHTML = `
        <!-- Back btn -->
        <a class="ap-back-btn animate-in" onclick="history.back();return false;" href="#">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
          Orqaga
        </a>

        <!-- Hero -->
        <div class="ap-hero animate-in">
          <div class="ap-hero-bg">
            ${actor.photo ? `<img class="ap-hero-bg-img" src="${actor.photo}" alt="">` : ''}
          </div>
          <div class="ap-hero-grad"></div>
          <div class="ap-hero-content">
            <div class="ap-photo-wrap">
              ${photoEl}${phEl}
            </div>
            <div class="ap-info">
              <div class="ap-breadcrumb">
                <a href="actors.html">Aktyorlar</a>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                <span>${actor.name}</span>
              </div>
              <div class="ap-name">${actor.name}</div>
              <div class="ap-meta-row">
                ${chipsHTML}
                <a class="ap-imdb-badge" href="${imdbUrl}" target="_blank" rel="noopener">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h16a1 1 0 011 1v16a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zm3.5 13V8H6v8h1.5zm3-8h-1.5v8H10.5V13l1.5 3h1l1.5-3v3h1.5V8H14l-1.5 4L11 8zm6.5 0h-1.5v8H17v-3h1.5a2.5 2.5 0 000-5H17z"/></svg>
                  IMDB
                </a>
              </div>
              <div class="ap-bio-preview">${bioShort}</div>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="ap-body">

          <!-- Full Bio -->
          <div class="ap-section animate-in">
            <div class="ap-section-label">TO'LIQ TARJIMAI HOL</div>
            <div class="ap-full-bio" id="bio-text">
              ${bioShort}
              ${bioText.length > 500 ? `<button class="read-more-btn" id="read-more-btn">Ko'proq o'qish ↓</button>` : ''}
            </div>
          </div>

          <!-- Known For -->
          ${actor.knownFor && actor.knownFor.length ? `
          <div class="ap-section animate-in">
            <div class="ap-section-label">MASHHUR FILMLARI</div>
            <div class="ap-known-grid">${knownForHTML}</div>
          </div>` : ''}

          <!-- DB Movies -->
          ${dbMoviesHTML}

          <!-- Stats -->
          <div class="ap-section animate-in">
            <div class="ap-section-label">MA'LUMOTLAR</div>
            <div class="ap-stats-row">
              <div class="ap-stat-card">
                <div class="ap-stat-label">IMDB ID</div>
                <div class="ap-stat-value" style="font-size: 16px;color:var(--text-dim)">${actor.id}</div>
              </div>
              ${actor.birthDate ? `<div class="ap-stat-card">
                <div class="ap-stat-label">Tug'ilgan sana</div>
                <div class="ap-stat-value">${new Date(actor.birthDate).toLocaleDateString('uz-UZ', { year:'numeric', month:'long', day:'numeric' })}</div>
              </div>` : ''}
              ${actor.birthPlace ? `<div class="ap-stat-card">
                <div class="ap-stat-label">Tug'ilgan joy</div>
                <div class="ap-stat-value" style="font-size: 16px">${actor.birthPlace}</div>
              </div>` : ''}
              <div class="ap-stat-card">
                <div class="ap-stat-label">Mashhur filmlari</div>
                <div class="ap-stat-value">${(actor.knownFor || []).length} ta</div>
              </div>
              <div class="ap-stat-card">
                <div class="ap-stat-label">Cineplex filmlari</div>
                <div class="ap-stat-value">${dbMovies.length} ta</div>
              </div>
            </div>
          </div>

        </div>
      `;

      App.initAnimations();

      /* Read more toggle */
      const rmBtn = document.getElementById('read-more-btn');
      if (rmBtn) {
        let expanded = false;
        rmBtn.addEventListener('click', () => {
          expanded = !expanded;
          document.getElementById('bio-text').innerHTML = expanded
            ? bioFull + `<button class="read-more-btn" id="read-more-btn" style="display:block;margin-top:10px">Qisqartirish ↑</button>`
            : bioShort + `<button class="read-more-btn" id="read-more-btn">Ko'proq o'qish ↓</button>`;
          document.getElementById('read-more-btn').addEventListener('click', () => {
            expanded = !expanded;
            document.getElementById('bio-text').innerHTML = expanded
              ? bioFull + `<button class="read-more-btn" id="read-more-btn" style="display:block;margin-top:10px">Qisqartirish ↑</button>`
              : bioShort + `<button class="read-more-btn" id="read-more-btn">Ko'proq o'qish ↓</button>`;
          });
        });
      }
    }
  });
  </script>
</body>
</html>
