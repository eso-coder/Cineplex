<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seriallar — CINEPLEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="catalog-header animate-in">
      <div>
        <div class="catalog-title">Seriallar</div>
        <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
      </div>
    </div>

    <div class="catalog-genre-bar animate-in" id="genre-bar" style="transition-delay:0.06s">
      <button class="genre-pill active" data-genre="all">Barchasi</button>
      <button class="genre-pill" data-genre="drama">Drama</button>
      <button class="genre-pill" data-genre="scifi">Fantastika</button>
      <button class="genre-pill" data-genre="thriller">Triller</button>
      <button class="genre-pill" data-genre="comedy">Komediya</button>
      <button class="genre-pill" data-genre="action">Jangovar</button>
    </div>

    <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.12s"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('series', '../');
    App.initAnimations();

    let allSeries = [];

    function render(list) {
      document.getElementById('catalog-grid').innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta serial';
    }

    (async () => {
      try {
        const data = await MoviesAPI.list({ type: 'series', limit: 500 });
        allSeries = (data.data && data.data.length) ? data.data : getSeriesOnly();
      } catch {
        allSeries = getSeriesOnly();
      }
      render(allSeries);
      App.initGenrePills('genre-bar', genre => {
        const filtered = genre === 'all' ? allSeries : allSeries.filter(m => (m.genre || []).includes(genre));
        render(filtered);
      });
    })();
  </script>
</body>
</html>
