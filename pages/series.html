<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Seriallar — CINEPLEX</title>
  <meta name="description" content="CINEPLEX'da qiziqarli seriallarni onlayn tomosha qiling — barcha mavsum va qismlar bir joyda, o'zbek tilida." />
  <link rel="canonical" href="https://www.cineplex.uz/pages/series.html" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/aurora-catalog.css">
</head>
<body class="catalog-page">
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="catalog-header animate-in">
      <div>
        <h1 class="catalog-title">Seriallar</h1>
        <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
      </div>
    </div>

    <!-- Spotify-uslubidagi janr kartalari -->
    <div class="category-grid animate-in" id="genre-bar" style="transition-delay:0.06s;margin-bottom:32px"></div>

    <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.12s"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('series', '../');
    App.initAnimations();

    let allSeries = [];

    function render(list) {
      document.getElementById('catalog-grid').innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta serial';
    }

    (async () => {
      try {
        const data = await MoviesAPI.list({ type: 'series', limit: 500 });
        allSeries = data.data || [];
      } catch {
        allSeries = [];
      }
      render(allSeries);
      App.buildGenreBar('genre-bar', allSeries, 'serial', genre => {
        const filtered = genre === 'all' ? allSeries : allSeries.filter(m => (m.genre || []).includes(genre));
        render(filtered);
        document.getElementById('catalog-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    })();
  </script>
</body>
</html>
