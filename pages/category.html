<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Janrlar — CINEPLEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>

    <!-- Hero -->
    <div class="category-hero animate-in" style="padding-left:30px;padding-right:30px">
      <div class="category-hero-title">Janrlar bo'yicha</div>
      <div class="category-hero-sub">Sevimli filmingizni janr bo'yicha toping</div>
    </div>

    <!-- Genre grid (Spotify-style) -->
    <div class="category-grid animate-in" id="genre-grid" style="transition-delay:0.08s"></div>

    <!-- Movies section -->
    <div class="cat-movies-section animate-in" style="transition-delay:0.16s" id="movies-section">
      <div class="section-header" style="padding:0 30px;margin-bottom:20px">
        <div class="section-title" id="cat-section-title">Barcha filmlar</div>
        <span id="cat-section-count" style="font-size:14px;color:rgba(255,255,255,0.45)"></span>
      </div>
      <div class="catalog-grid" id="cat-row"></div>
    </div>

    <!-- All genres listed -->
    <div style="padding:40px 30px 20px" class="animate-in">
      <div class="section-header" style="margin-bottom:20px">
        <div class="section-title">Barcha janrlar</div>
      </div>
      <div style="display:flex;gap:9px;flex-wrap:wrap" id="all-pills"></div>
    </div>

    <!-- ── ACTORS SECTION ── -->
    <div class="cat-actors-section animate-in" id="actors-section">
      <div class="section-header" style="padding:0 30px;margin-bottom:20px">
        <div class="section-title">Aktyorlar va Aktrisalar</div>
        <a href="actors.html" class="section-link">Barchasini ko'rish</a>
      </div>
      <div class="cat-actors-grid" id="cat-actors-grid"></div>
    </div>

  </main>

  <script src="../js/data.js"></script>
  <script src="../js/actors_data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('categories', '../');
    App.initAnimations();

    const GENRES = ['action','comedy','drama','scifi','fantasy','thriller','historical'];
    const GENRE_LABELS = { action:'Jangovar', comedy:'Komediya', drama:'Drama', scifi:'Fantastika', fantasy:'Fantaziya', thriller:'Triller', historical:'Tarixiy', all:'Barcha filmlar' };

    /* Spotify-uslubidagi rangli kartalar — har bir janr uchun jonli rang */
    const GENRE_THEME = {
      action:     { color: '#a8324a', tag: 'Mashhur'  },
      comedy:     { color: '#148a5f', tag: ''          },
      drama:      { color: '#477d95', tag: 'Trendda'   },
      scifi:      { color: '#7b2ff7', tag: ''          },
      fantasy:    { color: '#503aa8', tag: ''          },
      thriller:   { color: '#d9480f', tag: ''          },
      historical: { color: '#8a5a2b', tag: ''          },
      all:        { color: '#c2255c', tag: "Barchasini ko'rish" },
    };
    /* Poster topilmasa, zaxira rasmlar */
    const FALLBACK_POSTERS = {
      action:'https://rwvfilm.com/uploads/media/image/0001/02/2288cbf53f90b29cd77e29cf1716fe93a730a5b3.jpg',
      comedy:'https://rwvfilm.com/uploads/media/image/0001/03/thumb_2896_image_medium.jpg',
      drama:'https://rwvfilm.com/uploads/media/image/0001/05/thumb_4051_image_medium.jpg',
      scifi:'https://rwvfilm.com/uploads/media/image/0001/03/thumb_2883_image_medium.jpg',
      fantasy:'https://rwvfilm.com/uploads/media/image/0001/04/thumb_3841_image_medium.jpg',
      thriller:'https://rwvfilm.com/uploads/media/image/0001/03/thumb_2919_image_medium.jpg',
      historical:'https://rwvfilm.com/uploads/media/image/0001/02/a4de7120d6ec56f46ee8c2b6859a8b21ac88a8c6.jpg',
      all:'https://rwvfilm.com/uploads/media/image/0001/03/thumb_2793_image_medium.jpg',
    };

    let ALL_MOVIES = [];

    /* Janr uchun eng mashhur filmning posterini topish (views/rating bo'yicha) */
    function posterForGenre(genre) {
      const pool = genre === 'all'
        ? ALL_MOVIES
        : ALL_MOVIES.filter(m => (m.genre || []).includes(genre));
      const sorted = [...pool].sort((a, b) =>
        (parseFloat(b.rating) || 0) - (parseFloat(a.rating) || 0));
      const best = sorted.find(m => m.img);
      return (best && best.img) || FALLBACK_POSTERS[genre] || '';
    }

    /* Spotify-uslubidagi janr kartalarini qurish */
    function buildGenreCards() {
      const grid = document.getElementById('genre-grid');
      const order = [...GENRES, 'all'];
      grid.innerHTML = order.map(g => {
        const theme = GENRE_THEME[g] || { color:'#444', tag:'' };
        const count = g === 'all'
          ? ALL_MOVIES.length
          : ALL_MOVIES.filter(m => (m.genre || []).includes(g)).length;
        const poster = posterForGenre(g);
        return `
          <a class="category-card" data-genre="${g}" href="#movies-section"
             style="background:${theme.color}" onclick="filterGenre('${g}')">
            <div class="cat-name">${GENRE_LABELS[g]}</div>
            <div class="cat-count" id="count-${g}">${count} ta film</div>
            ${theme.tag ? `<span class="cat-tag">${theme.tag}</span>` : ''}
            ${poster ? `<img class="cat-poster" src="${poster}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
          </a>`;
      }).join('');
    }

    /* Aktyorlar bo'limini qurish (eng mashhur 12 ta) */
    function buildActorsRow() {
      const grid = document.getElementById('cat-actors-grid');
      if (!grid || typeof ACTORS_DATA === 'undefined') return;
      const GRAD = [
        'linear-gradient(135deg,#1e3a8a,#7c3aed)','linear-gradient(135deg,#9d174d,#ec4899)',
        'linear-gradient(135deg,#065f46,#0891b2)','linear-gradient(135deg,#92400e,#b45309)',
        'linear-gradient(135deg,#1e40af,#06b6d4)','linear-gradient(135deg,#6b21a8,#db2777)',
      ];
      const top = ACTORS_DATA.slice(0, 12);
      grid.innerHTML = top.map((a, i) => {
        const initials = a.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
        const grad = GRAD[i % GRAD.length];
        const known = (a.knownFor && a.knownFor.length) ? a.knownFor[0] : '';
        const img = a.photo
          ? `<img class="cat-actor-img" src="${a.photo}" alt="${a.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const ph = `<div class="cat-actor-ph" style="background:${grad};display:${a.photo?'none':'flex'}">${initials}</div>`;
        return `
          <a class="cat-actor-card" href="actor-profile.html?id=${encodeURIComponent(a.id)}">
            <div class="cat-actor-imgwrap">${img}${ph}</div>
            <div class="cat-actor-name">${a.name}</div>
            ${known ? `<div class="cat-actor-known">${known}</div>` : ''}
          </a>`;
      }).join('');
    }

    function filterGenre(genre) {
      const movies = genre === 'all' ? ALL_MOVIES : ALL_MOVIES.filter(m => (m.genre || []).includes(genre));
      const labelText = GENRE_LABELS[genre] || genre;
      document.getElementById('cat-section-title').textContent = labelText;
      document.getElementById('cat-section-count').textContent = movies.length + ' ta film';
      document.getElementById('cat-row').innerHTML = movies.map(m => App.buildCard(m, '../')).join('');
      document.querySelectorAll('.category-card').forEach(c => {
        c.classList.toggle('selected', c.dataset.genre === genre);
      });
    }

    (async () => {
      try {
        const data = await MoviesAPI.list({ limit: 500 });
        ALL_MOVIES = (data.data && data.data.length) ? data.data : MOVIES;
      } catch {
        ALL_MOVIES = MOVIES;
      }

      /* Spotify-uslubidagi janr kartalarini va aktyorlar bo'limini qurish */
      buildGenreCards();
      buildActorsRow();

      /* Build all-genre pills */
      const pillsEl = document.getElementById('all-pills');
      if (pillsEl) {
        (['all', ...GENRES]).forEach(g => {
          const btn = document.createElement('button');
          btn.className = 'genre-pill' + (g === 'all' ? ' active' : '');
          btn.textContent = GENRE_LABELS[g] || g;
          btn.dataset.genre = g;
          btn.onclick = () => {
            pillsEl.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            filterGenre(g);
            document.getElementById('movies-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
          };
          pillsEl.appendChild(btn);
        });
      }

      const paramGenre = App.getParam('genre');
      filterGenre(paramGenre || 'all');
    })();
  </script>
</body>
</html>
