<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Filmlar — CINEPLEX</title>
  <meta name="description" content="CINEPLEX'da eng so'nggi va mashhur filmlarni onlayn tomosha qiling — yuqori sifatda, o'zbek tilida." />
  <link rel="canonical" href="https://www.cineplex.uz/pages/movies.html" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/perf-lite.js?v=2"></script>
  <link rel="stylesheet" href="../css/main.css?v=4">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="../css/aurora-catalog.css">
</head>
<body class="catalog-page">
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="catalog-header animate-in">
      <div>
        <h1 class="catalog-title">Filmlar</h1>
        <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
      </div>
      <div style="position:relative">
        <div class="catalog-sort" id="sort-btn" onclick="toggleSortDd()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span id="sort-lbl">Saralash: Reyting ↓</span>
        </div>
        <div class="lang-dd" id="sort-dd" style="min-width:200px">
          <button class="lang-opt active" data-sort="rating-desc" onclick="setSort('rating-desc', 'Reyting ↓')">Reyting (yuqoridan)</button>
          <button class="lang-opt" data-sort="rating-asc" onclick="setSort('rating-asc', 'Reyting ↑')">Reyting (pastdan)</button>
          <button class="lang-opt" data-sort="year-desc" onclick="setSort('year-desc', 'Yil (yangi)')">Yil (yangidan)</button>
          <button class="lang-opt" data-sort="year-asc" onclick="setSort('year-asc', 'Yil (eski)')">Yil (eskidan)</button>
          <button class="lang-opt" data-sort="title-asc" onclick="setSort('title-asc', 'Nomi (A-Z)')">Nomi (A-Z)</button>
        </div>
      </div>
    </div>

    <!-- Spotify-uslubidagi janr kartalari -->
    <div class="category-grid animate-in" id="genre-bar" style="transition-delay:0.06s;margin-bottom:32px"></div>

    <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.12s"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('movies', '../');
    App.initAnimations();

    let allMovies = [];
    let currentGenre = 'all';
    let currentSort = 'rating-desc';

    const SORTERS = {
      'rating-desc': (a, b) => (b.rating || 0) - (a.rating || 0),
      'rating-asc':  (a, b) => (a.rating || 0) - (b.rating || 0),
      'year-desc':   (a, b) => (b.year || 0) - (a.year || 0),
      'year-asc':    (a, b) => (a.year || 0) - (b.year || 0),
      'title-asc':   (a, b) => (a.title || '').localeCompare(b.title || ''),
    };

    function render(list) {
      const grid = document.getElementById('catalog-grid');
      grid.innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta film';
    }

    function applyFiltersAndSort() {
      let list = currentGenre === 'all' ? allMovies : allMovies.filter(m => App.genreMatches(m, currentGenre));
      list = [...list].sort(SORTERS[currentSort] || SORTERS['rating-desc']);
      render(list);
    }

    window.toggleSortDd = function () {
      document.getElementById('sort-dd').classList.toggle('open');
    };

    window.setSort = function (key, label) {
      currentSort = key;
      document.getElementById('sort-lbl').textContent = 'Saralash: ' + label;
      document.getElementById('sort-dd').querySelectorAll('.lang-opt').forEach(el => {
        el.classList.toggle('active', el.dataset.sort === key);
      });
      document.getElementById('sort-dd').classList.remove('open');
      applyFiltersAndSort();
    };

    document.addEventListener('click', e => {
      if (!e.target.closest('#sort-btn') && !e.target.closest('#sort-dd')) {
        document.getElementById('sort-dd').classList.remove('open');
      }
    });

    (async () => {
      try {
        const data = await MoviesAPI.list({ type: 'movie', limit: 500 });
        // Himoya: CDN keshidan eski (filtrsiz) javob kelsa ham seriallar chiqmaydi
        allMovies = (data.data || []).filter(m => m.type !== 'series');
      } catch {
        allMovies = [];
      }
      applyFiltersAndSort();
      App.buildGenreBar('genre-bar', allMovies, 'film', genre => {
        currentGenre = genre;
        applyFiltersAndSort();
        document.getElementById('catalog-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    })();
  </script>
</body>
</html>
