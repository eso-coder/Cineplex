<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filmlar — CINEPLEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div class="ambient-bg"></div>
  <div id="navbar-placeholder"></div>

  <main>
    <div class="catalog-header animate-in">
      <div>
        <div class="catalog-title">Filmlar</div>
        <div class="catalog-count" id="count-label">Yuklanmoqda…</div>
      </div>
      <div class="catalog-sort" id="sort-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Saralash: Reyting ↓
      </div>
    </div>

    <div class="catalog-genre-bar animate-in" id="genre-bar" style="transition-delay:0.06s">
      <button class="genre-pill active" data-genre="all">Barchasi</button>
      <button class="genre-pill" data-genre="action">Jangovar</button>
      <button class="genre-pill" data-genre="drama">Drama</button>
      <button class="genre-pill" data-genre="comedy">Komediya</button>
      <button class="genre-pill" data-genre="scifi">Fantastika</button>
      <button class="genre-pill" data-genre="fantasy">Fantaziya</button>
      <button class="genre-pill" data-genre="historical">Tarixiy</button>
      <button class="genre-pill" data-genre="thriller">Triller</button>
    </div>

    <div class="catalog-grid animate-in" id="catalog-grid" style="transition-delay:0.12s"></div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    App.initNavbar('movies', '../');
    App.initAnimations();

    let allMovies = [];

    function render(list) {
      const grid = document.getElementById('catalog-grid');
      grid.innerHTML = list.map(m => App.buildCard(m, '../')).join('');
      document.getElementById('count-label').textContent = list.length + ' ta film';
    }

    (async () => {
      try {
        const data = await MoviesAPI.list({ type: 'movie', limit: 500 });
        allMovies = (data.data && data.data.length) ? data.data : getMoviesOnly();
      } catch {
        allMovies = getMoviesOnly();
      }
      render(allMovies);
      App.initGenrePills('genre-bar', genre => {
        const filtered = genre === 'all' ? allMovies : allMovies.filter(m => (m.genre || []).includes(genre));
        render(filtered);
      });
    })();
  </script>
</body>
</html>
